  --result-wrong-bg:#ffecf1;
  --result-wrong-bg-hover:#ffdfe8;
}
body.dark{
  --bg-grad-1:#1c1f27;
  --bg-grad-2:#2a2330;
  --bg-grad-3:#252233;
  --container-bg:#23262e;
  --text-main:#e3e4e9;
  --text-title:#a8b4ff;
  --accent:#7c9cff;
  --accent-soft:#5a6cc0;
  --h3-bg:#2d323c;
  --h3-bg-hover:#363c48;
  --li-bg:#2b2f38;
  --li-bg-hover:#363c48;
  --input-border:#414856;
  --input-bg:#2b2f38;
  --muted:#9aa0ac;
  --progress-track:#363c48;
  --shadow:rgba(0,0,0,.35);
  --shadow-strong:rgba(0,0,0,.5);
  --result-correct-bg:#2a3450;
  --result-correct-bg-hover:#33406a;
  --result-wrong-bg:#4a2a38;
  --result-wrong-bg-hover:#5a3344;

body{
  font-family:'Quicksand','Gowun Dodum','Malgun Gothic',sans-serif;
  font-size:15px;line-height:1.6;font-weight:500;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  background:linear-gradient(135deg,var(--bg-grad-1) 0%,var(--bg-grad-2) 50%,var(--bg-grad-3) 100%);
  background-attachment:fixed;
  margin:0;padding:24px 16px;min-height:100vh;
  transition:background .4s ease;
}
.container{
  max-width:720px;margin:auto;background:var(--container-bg);padding:32px 28px;
  border-radius:28px;box-shadow:0 18px 50px var(--shadow);
  color:var(--text-main);transition:background .3s ease,color .3s ease;
}
h2{
  text-align:center;color:var(--text-title);margin:0 0 4px;
  font-family:'Jua',sans-serif;font-size:29px;letter-spacing:.5px;line-height:1.3;
}
h3{
  cursor:pointer;background:var(--h3-bg);padding:14px 18px;border-radius:16px;
  margin:12px 0 0;color:var(--text-title);transition:.2s;user-select:none;
  display:flex;justify-content:space-between;align-items:center;
  font-family:'Jua',sans-serif;letter-spacing:.3px;font-size:16px;
}
h3:hover{background:var(--h3-bg-hover);transform:translateY(-1px)}
h3::after{content:'▾';font-size:14px;color:var(--accent-soft);transition:.25s}
h3.open-arrow::after{transform:rotate(180deg)}

.row{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0}
input,textarea{
  padding:12px 14px;border:2px solid var(--input-border);border-radius:14px;
  font-size:15px;outline:none;transition:.2s;
  background:var(--input-bg);color:var(--text-main);
  font-family:'Quicksand','Gowun Dodum','Malgun Gothic',sans-serif;
}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(124,156,255,.18)}
input[type=text],input:not([type]){flex:1;min-width:120px}
textarea{width:100%;height:92px;resize:vertical;font-family:inherit;line-height:1.5}

button{
  padding:11px 18px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#7c9cff,#9b8cff);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.18s;
  font-family:'Quicksand','Gowun Dodum','Malgun Gothic',sans-serif;
  box-shadow:0 4px 12px rgba(124,156,255,.3);
}
button:hover{filter:brightness(1.05);transform:translateY(-2px);box-shadow:0 7px 18px rgba(124,156,255,.4)}
@media (hover:none){button:hover{transform:none;box-shadow:0 4px 12px rgba(124,156,255,.3);filter:none}}
button:active{transform:translateY(0);box-shadow:0 3px 8px rgba(124,156,255,.3)}
button.danger{background:linear-gradient(135deg,#ff8a8a,#ff6b9d);box-shadow:0 4px 12px rgba(255,110,140,.3)}
button.danger:hover{box-shadow:0 7px 18px rgba(255,110,140,.4)}
button.small{padding:8px 12px;font-size:13px;border-radius:11px}

input[type=file]{
  flex:1;min-width:160px;padding:9px;background:var(--input-bg);border:2px dashed var(--accent-soft);
  color:var(--text-main);border-radius:14px;
}
input[type=file]::file-selector-button{
  padding:8px 13px;border:none;border-radius:11px;background:var(--accent);
  color:#fff;font-weight:700;cursor:pointer;margin-right:8px;
}

.section-content{display:none;animation:fadeIn .25s ease}
.section-content.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.flashcard{
  margin-top:18px;
  min-height:225px;
  cursor:pointer;
  background:linear-gradient(135deg,#7c9cff 0%,#a78bff 55%,#c89bff 100%);
  border-radius:24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:42px;
  text-align:center;
  color:#fff;
  box-shadow:0 12px 32px rgba(124,124,255,.4);
  transition:.25s cubic-bezier(.2,.8,.3,1);
  position:relative;
  overflow:hidden;
}
.flashcard::before{
  content:'';position:absolute;top:-40%;right:-15%;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,.12);
}
.flashcard:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 18px 40px rgba(124,124,255,.5)}
#front{font-size:26px;font-weight:700;font-family:'Quicksand','Gowun Dodum','Malgun Gothic',sans-serif;white-space:normal;overflow-wrap:break-word;word-break:keep-all;width:100%;text-align:center;position:relative;line-height:1.25;letter-spacing:.2px}
@media (max-width:480px){
#front{font-size:clamp(17px,6.6vw,26px)}
}
#back{
  font-size:18px;
  color:#fff3c4;
  margin-top:14px;
  display:none;
  font-weight:600;
  position:relative;
  text-align:center;
  width:100%;
  overflow-wrap:break-word;
  word-break:keep-all;
  line-height:1.3;
}
.flashcard.revealed #back{display:block;animation:fadeIn .3s ease}
.hint{font-size:13px;opacity:.85;margin-top:10px;position:relative}

.modes{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.modes button{flex:1;min-width:90px;background:var(--h3-bg);color:var(--text-main);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 8px;line-height:1.1;box-shadow:0 3px 10px var(--shadow)}
.modes button:hover{background:var(--h3-bg-hover);filter:none}
.modes .ico{font-size:26px}
.modes .lbl{font-size:14px;font-weight:700}

.progress-wrap{margin:18px 0;padding:16px;background:var(--h3-bg);border-radius:18px}
.progress-label{text-align:center;color:var(--muted);font-size:15px;margin-bottom:8px}
.progress-label b{color:var(--text-title)}
.progress-bar{
  width:100%;height:14px;border-radius:8px;background:var(--progress-track);overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.06);
}
.progress-fill{
  height:100%;border-radius:8px;
  background:linear-gradient(90deg,#7c9cff,#a78bff,#ff9bce);
  width:0%;transition:width .45s cubic-bezier(.2,.8,.3,1);
}

ul{list-style:none;margin:10px 0;padding:0}
li{
  margin:8px 0;background:var(--li-bg);padding:13px 15px;border-radius:14px;
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  font-size:14px;font-weight:600;line-height:1.5;transition:.15s;
}
li>span:first-child{overflow-wrap:break-word;word-break:keep-all;min-width:0;flex:1}
li:hover{background:var(--li-bg-hover);transform:translateX(2px)}
li.result-correct{background:var(--result-correct-bg);border-left:4px solid var(--accent)}
li.result-correct:hover{background:var(--result-correct-bg-hover)}
li.result-wrong{background:var(--result-wrong-bg);border-left:4px solid #ff6b9d}
li.result-wrong:hover{background:var(--result-wrong-bg-hover)}
li span:first-child{flex:1}
li .btns{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
li button{padding:6px 9px;font-size:13px;border-radius:10px;background:var(--h3-bg);color:var(--text-main);box-shadow:none;font-weight:600}
li button:hover{background:var(--h3-bg-hover);filter:none;transform:none}

.cnt{font-size:13px;color:var(--accent-soft);font-weight:400}
li input{flex:1;min-width:90px;font-size:14px}
#backupBox{height:92px;font-size:12px}

@media (max-width:480px){
  .container{padding:24px 18px;border-radius:22px}
  #allWordsList li{flex-direction:column;align-items:stretch;gap:8px}
  #allWordsList li span:first-child{text-align:center}
  #allWordsList li .btns{justify-content:center}
  li{font-size:14px}
}

/* 모바일 세로 공간 압축 */
@media (max-width:480px){
  body{padding:10px 10px}
  .container{padding:14px 14px}
  h2{font-size:22px;margin-bottom:2px}
  .flashcard{margin-top:10px;min-height:150px;padding:24px 27px;border-radius:18px}
  #front{font-size:clamp(16px,5.5vw,22px)}
  #back{font-size:15px;margin-top:8px}
  .hint{font-size:12px;margin-top:6px}
  #cardActions{margin-top:6px}
  #cardActions button{padding:8px 10px;font-size:13px}
  #quizPanel{margin-top:8px}
  .quiz-q-head{margin-bottom:6px;gap:6px}
  .quiz-q-tag{font-size:13px}
  .quiz-opts{gap:4px}
  .quiz-opt{padding:7px 10px;border-radius:10px;font-size:13px;gap:8px}
  .quiz-opt .num{width:22px;height:22px;font-size:12px}
  .quiz-dunno{margin-top:4px;padding:7px 10px;font-size:13px;border-radius:12px}
  #quizAfter{margin-top:8px}
  .quiz-toggle-row{margin-top:8px;gap:6px}
  .quiz-toggle-row .label{font-size:13px}
  .quiz-modes{gap:4px}
  .qmode{padding:7px 4px;font-size:12px;border-radius:11px}
  .modes{margin-top:8px;gap:8px}
  .modes button{padding:10px 6px;gap:4px}
  .modes .ico{font-size:20px}
  .modes .lbl{font-size:13px}
  .progress-wrap{margin:10px 0;padding:10px 14px}
  .progress-label{font-size:13px;margin-bottom:6px}
  .progress-bar{height:10px}
}

#allWordsList,#wrongsList,#masteredList,#dupesList{
  max-height:280px;overflow-y:auto;margin-top:6px;
  border:1.5px solid var(--input-border);border-radius:14px;padding:4px 6px;
  scrollbar-width:thin;scrollbar-color:var(--accent-soft) transparent;
}
#allWordsList::-webkit-scrollbar,#wrongsList::-webkit-scrollbar,
#masteredList::-webkit-scrollbar,#dupesList::-webkit-scrollbar{width:5px}
#allWordsList::-webkit-scrollbar-thumb,#wrongsList::-webkit-scrollbar-thumb,
#masteredList::-webkit-scrollbar-thumb,#dupesList::-webkit-scrollbar-thumb{
  background:var(--accent-soft);border-radius:4px}
.toast{
  position:fixed;left:50%;bottom:30px;
  transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,#3a3a44,#4a4458);color:#fff;padding:12px 22px;border-radius:26px;
  font-family:'Jua',sans-serif;font-size:15px;letter-spacing:.3px;
  opacity:0;pointer-events:none;z-index:9999;
  transition:opacity .25s ease,transform .25s ease;
  box-shadow:0 10px 28px rgba(0,0,0,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confetti{position:fixed;top:-30px;pointer-events:none;z-index:9998;will-change:transform}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.15}}

/* ===== 객관식 퀴즈 모드 ===== */
.quiz-toggle-row{
  display:flex;justify-content:center;align-items:center;gap:10px;
  margin-top:16px;flex-wrap:wrap;
}
.quiz-toggle-row .label{
  font-family:'Jua',sans-serif;color:var(--text-title);font-size:15px;letter-spacing:.3px;
}
.quiz-modes{display:flex;gap:6px;width:100%;max-width:430px;margin:0 auto}
.qmode{
  flex:1;border:none;cursor:pointer;border-radius:14px;padding:9px 4px;
  font-family:'Quicksand','Gowun Dodum','Malgun Gothic',sans-serif;font-weight:700;font-size:13px;
  color:#fff;transition:.18s;box-shadow:0 3px 10px var(--shadow);white-space:nowrap;
  background:linear-gradient(135deg,#b8bdcc,#9aa0b0);
}
.qmode.on{background:linear-gradient(135deg,#56c596,#3eb489);box-shadow:0 4px 12px rgba(62,180,137,.35)}
.qmode:hover{filter:brightness(1.05);transform:translateY(-1px)}
.qmode:active{transform:translateY(0)}

#quizPanel{margin-top:16px;animation:fadeIn .25s ease}
.quiz-q-tag{
  text-align:center;color:var(--muted);font-size:14px;margin-bottom:0;
  font-family:'Quicksand','Gowun Dodum','Malgun Gothic',sans-serif;font-weight:700;
}
.quiz-opts{display:flex;flex-direction:column;gap:10px}
.quiz-opt{
  width:100%;text-align:left;display:flex;align-items:center;gap:12px;
  padding:15px 16px;border:2px solid var(--input-border);border-radius:16px;
  background:var(--li-bg);color:var(--text-main);
  font-family:'Quicksand','Gowun Dodum','Malgun Gothic',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:.15s;box-shadow:0 3px 10px var(--shadow);line-height:1.35;
}
.quiz-opt .num{
  flex:0 0 auto;width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--h3-bg);color:var(--text-title);font-family:'Jua',sans-serif;font-size:15px;
}
.quiz-opt .txt{flex:1;min-width:0;overflow-wrap:break-word;word-break:keep-all}
.quiz-opt:hover:not(:disabled){background:var(--li-bg-hover);transform:translateY(-2px);box-shadow:0 6px 16px var(--shadow-strong)}
.quiz-opt:disabled{cursor:default}
.quiz-opt.correct{
  background:linear-gradient(135deg,#56c596,#3eb489);color:#fff;border-color:transparent;
  box-shadow:0 6px 18px rgba(62,180,137,.4);
}
.quiz-opt.correct .num{background:rgba(255,255,255,.25);color:#fff}
.quiz-opt.wrong{
  background:linear-gradient(135deg,#ff8a8a,#ff6b9d);color:#fff;border-color:transparent;
  box-shadow:0 6px 18px rgba(255,110,140,.4);
}
.quiz-opt.wrong .num{background:rgba(255,255,255,.25);color:#fff}
.quiz-opt.dim{opacity:.45}
#quizAfter{display:none;margin-top:14px;justify-content:center;gap:10px;flex-wrap:wrap}
.quiz-q-head{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.quiz-speak-inline{
  padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;
  font-family:'Quicksand','Gowun Dodum','Malgun Gothic',sans-serif;
  background:var(--h3-bg);color:var(--text-title);box-shadow:0 3px 10px var(--shadow);
}
.quiz-speak-inline:hover{background:var(--h3-bg-hover);filter:none}
.quiz-dunno{
  width:100%;margin-top:12px;padding:13px 16px;border-radius:16px;
  border:2px dashed var(--input-border);background:transparent;color:var(--muted);
  font-family:'Quicksand','Gowun Dodum','Malgun Gothic',sans-serif;font-size:15px;font-weight:700;
  box-shadow:none;cursor:pointer;transition:.15s;
}
.quiz-dunno:hover{background:var(--li-bg);color:var(--text-main);transform:translateY(-1px);box-shadow:none;filter:none}
.quiz-dunno:disabled{opacity:.45;cursor:default}
</style>
</head>
<body>
<div class="container">
<div class="row" style="justify-content:flex-end;margin-bottom:14px">
<button class="small" onclick="toggleSound()" id="soundBtn">🔊 소리 켜짐</button>
<button class="small" onclick="toggleDark()" id="darkBtn">🌙 다크모드</button>
</div>
<h2>민복이와 도형이의 영어 단어 연습장</h2>

<div class="row">
<input type="text" id="sheetUrl" placeholder="구글 시트 공유 링크를 붙여넣으세요">
</div>
<div class="row" style="flex-wrap:nowrap">
<button style="flex:1;min-width:0;padding:11px 6px;font-size:13px;white-space:nowrap;letter-spacing:-.3px" onclick="loadSheetTabs()">📑 시트 목록 불러오기</button>
<button class="danger" style="flex:1;min-width:0;padding:11px 6px;font-size:13px;white-space:nowrap;letter-spacing:-.3px" onclick="clearAll()">🗑 전체 초기화</button>

<div id="sheetTabs" style="margin-top:8px"></div>

<input type="number" id="rangeFrom" min="1" placeholder="처음" style="width:0;flex:1;min-width:0;padding:6px 6px;font-size:13px">
<span style="color:var(--muted);font-size:12px;flex-shrink:0">~</span>
<input type="number" id="rangeTo" min="1" placeholder="끝" style="width:0;flex:1;min-width:0;padding:6px 6px;font-size:13px">

<div class="modes">

<button onclick="randomMode('wrong')"><span class="ico">❌</span><span class="lbl">오답노트</span></button>

</div>

<div class="flashcard" id="card" onclick="cardClick()">
<div id="front">단어를 선택하세요</div>

</div>

<button onclick="event.stopPropagation();toggleWrongFlag(currentIndex);showCardActions()" id="cardWrongBtn" style="flex:1;min-width:0;padding:10px 4px;font-size:13px;white-space:nowrap;display:flex;align-items:center;justify-content:center">❌ 오답등록</button>
<button onclick="event.stopPropagation();nextCard()" id="cardNextBtn" style="flex:1;min-width:0;padding:10px 4px;font-size:13px;white-space:nowrap;display:flex;align-items:center;justify-content:center">➡️ 다음 단어</button>

<div class="progress-bar"><div class="progress-fill" id="wrongProgressFill" style="background:linear-gradient(90deg,#ff8a8a,#ff6b9d,#ffb347)"></div></div>
</div>


<h3 onclick="toggle('allWords',this)"><span>📖 전체 단어 <b id="cntAll" class="cnt"></b></span></h3>

<button class="small" style="flex:1;min-width:120px" onclick="bulkMaster(false)">⬜ 전부 학습 취소</button>

function dstr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayStr(){return dstr(new Date());}

const praises=['잘했어요! 🎉','최고예요! ⭐','멋져요! 💪','완벽해요! ✨','대단해요! 🌟'];

// ===== 효과음 (Web Audio로 직접 합성, 음원 파일 없음) =====
let soundOn=localStorage.getItem('soundOn')!=='0'; // 기본 켜짐
let audioCtx=null;
function getCtx(){
let AC=window.AudioContext||window.webkitAudioContext;
if(!AC) return null;
if(!audioCtx) audioCtx=new AC();
if(audioCtx.state==='suspended') audioCtx.resume();
return audioCtx;
}
// 단일 톤 (부드러운 엔벨로프로 클릭음 방지)
function tone(freq,start,dur,type,vol){
let ctx=getCtx(); if(!ctx) return;
let t0=ctx.currentTime+start;
let osc=ctx.createOscillator(), g=ctx.createGain();
osc.type=type||'sine';
osc.frequency.value=freq;
g.gain.setValueAtTime(0.0001,t0);
g.gain.exponentialRampToValueAtTime(vol||0.18,t0+0.012);
g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
osc.connect(g); g.connect(ctx.destination);
osc.start(t0); osc.stop(t0+dur+0.03);
}
function playSound(name){
if(!soundOn) return;
if(!getCtx()) return;
switch(name){
case 'tap':      tone(420,0,0.07,'sine',0.10); break;
case 'add':      tone(620,0,0.10,'triangle',0.16); tone(880,0.07,0.13,'triangle',0.15); break;
case 'flip':     tone(320,0,0.08,'sine',0.10); tone(500,0.04,0.10,'sine',0.09); break;
case 'correct':  tone(523.25,0,0.12,'triangle',0.18); tone(659.25,0.09,0.12,'triangle',0.18); tone(783.99,0.18,0.18,'triangle',0.2); break;
case 'wrong':    tone(311.13,0,0.16,'sine',0.16); tone(233.08,0.13,0.22,'sine',0.16); break;
case 'complete': tone(523.25,0,0.13,'triangle',0.18); tone(659.25,0.11,0.13,'triangle',0.18); tone(783.99,0.22,0.13,'triangle',0.18); tone(1046.5,0.33,0.30,'triangle',0.22); break;
case 'delete':   tone(260,0,0.10,'sine',0.13); tone(180,0.07,0.14,'sine',0.13); break;
case 'toggle':   tone(500,0,0.06,'square',0.07); break;
}
}

function parseCsvLine(line){
let out=[],cur='',inQ=false;
for(let i=0;i<line.length;i++){
let c=line[i];
if(inQ){
if(c==='"'){
if(line[i+1]==='"'){cur+='"';i++;}
else inQ=false;
}else cur+=c;
}else{
if(c==='"') inQ=true;
else if(c===',') {out.push(cur);cur='';}
else cur+=c;
}
}
out.push(cur);
return out;
}
function addFromCsvText(text, srcLabel){
let added=0, updated=0;
let label=srcLabel||'시트';
let seen=new Set();      // 이번 시트에서 본 영단어(소문자)
let dupMap=new Map();    // 소문자영단어 -> {eng, sheets:Set}
function flag(engL,eng,sheets){
let e=dupMap.get(engL);
if(!e){ e={eng:eng,sheets:new Set()}; dupMap.set(engL,e); }
sheets.forEach(s=>{ if(s) e.sheets.add(s); });
}
let lines=text.replace(/\r/g,'').split('\n');
lines.forEach((l,idx)=>{
if(!l.trim()) return;
let p=parseCsvLine(l);
if(p.length<2) return;
let eng=p[0].trim();
let kor=p.slice(1).map(s=>s.trim()).filter(s=>s).join(', ');
// 첫 번째 줄이 명백한 헤더(예: 영어/단어/뜻/한글/meaning 등)면 건너뜀
if(idx===0){
let h1=eng.toLowerCase(), h2=(p[1]||'').trim().toLowerCase();
let headerWords=['영어','단어','english','word','뜻','한글','의미','meaning','korean'];
if(headerWords.includes(h1) || headerWords.includes(h2)) return;
}
if(eng==='' || !kor) return;
let engL=eng.toLowerCase();
let ex=words.find(w=>w.eng.toLowerCase()===engL);
if(ex){
if(seen.has(engL)){
// 같은 시트 안에서 또 등장 → 시트 내부 중복
flag(engL,ex.eng,[label]);
}else if(ex.src && ex.src!==label){
// 다른 시트에 이미 있던 단어 → 시트 간 중복
flag(engL,ex.eng,[ex.src,label]);
}else if(!ex.src){
// 출처를 모르던 기존 단어 → 이번 시트를 출처로 채택(같은 시트 재불러오기 오탐 방지)
ex.src=label;
}
// 시트에서 뜻이 바뀌었으면 반영(학습 진도·오답 기록은 유지)
if(ex.kor!==kor){ ex.kor=kor; updated++; }
seen.add(engL);
return;
}
words.push({eng,kor,wrong:false,mastered:false,wrongResult:null,src:label});
added++;
seen.add(engL);
});
save();
let dups=[...dupMap.values()].map(e=>({eng:e.eng,sheets:[...e.sheets]}));
return {added,updated,dups};
}

// ===== 중복 단어 기록 (여러 시트에 겹쳐 들어온 영단어) =====
let dupes=JSON.parse(localStorage.getItem('dupes')||'[]'); // [{eng, sheets:[...], n}]
function saveDupes(){ localStorage.setItem('dupes',JSON.stringify(dupes)); }
function recordDupes(list){
(list||[]).forEach(d=>{
let e=dupes.find(x=>x.eng.toLowerCase()===d.eng.toLowerCase());
if(!e){ e={eng:d.eng,sheets:[],n:0}; dupes.push(e); }
e.n++;
(d.sheets||[]).forEach(s=>{ if(s && !e.sheets.includes(s)) e.sheets.push(s); });
});
saveDupes();
}
function removeDupe(i){ dupes.splice(i,1); saveDupes(); render(); }
function clearDupes(){ if(!dupes.length) return; if(!confirm('중복 단어 기록을 모두 지울까요?')) return; dupes=[]; saveDupes(); render(); showToast('중복 기록을 지웠어요'); }

box.innerHTML='<ul>'+dupes.map((d,i)=>
'<li><span><b>'+escapeHtml(d.eng)+'</b>'
+'<span style="color:var(--muted);font-size:12px;display:block;margin-top:2px">'
+(d.sheets.length?('📄 '+d.sheets.map(escapeHtml).join(' · ')):'시트 정보 없음')
+(d.n>1?('  ·  '+d.n+'회 감지'):'')
+'</span></span>'
+'<span class="btns"><button onclick="removeDupe('+i+')">🗑</button></span></li>').join('')+'</ul>';
}

// ===== 시트(탭) 선택해서 불러오기 =====
function parseSheetId(url){let m=url.match(/\/d\/([a-zA-Z0-9-_]+)/);return m?m[1]:null;}
function parseSheetGid(url){let m=url.match(/[#&?]gid=([0-9]+)/);return m?m[1]:null;}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// 직접 URL + (모바일 CORS 우회용) 프록시 URL 후보 만들기
function withProxies(urls){
let out=[];
// 캐시 무효화: 매번 고유 파라미터를 붙여 브라우저·구글·프록시의 옛 사본을 피함
let bust=u=>u+(u.includes('?')?'&':'?')+'_cb='+Date.now()+'x'+Math.floor(Math.random()*1e6);
let fresh=urls.map(bust);
fresh.forEach(u=>out.push(u)); // 직접 시도(캐시 무효화 포함)
fresh.forEach(u=>{
out.push('https://corsproxy.io/?url='+encodeURIComponent(u));
out.push('https://api.allorigins.win/raw?url='+encodeURIComponent(u));
});
return out;
}
// 후보 URL들을 순서대로 시도해 처음 성공한 본문 반환
async function fetchFirstOk(urls,validate){
let lastErr=null;
for(let u of urls){
try{
let r=await fetch(u,{cache:'no-store'});
if(!r.ok) throw new Error('status '+r.status);
let text=await r.text();
if(validate) validate(text);
return text;
}catch(e){lastErr=e;}
}
throw lastErr||new Error('all failed');
}

// 시트 안에 들어있는 탭(세부 시트) 목록 불러오기
let detectedTabs=[];
async function loadSheetTabs(){
let url=document.getElementById('sheetUrl').value.trim();
if(!url) return alert('구글 시트 링크를 입력해주세요');
let id=parseSheetId(url);
if(!id) return alert('올바른 구글 시트 링크가 아닙니다');
let box=document.getElementById('sheetTabs');
box.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px 2px">📑 시트 목록을 불러오는 중... ⏳</div>';
showToast('시트 목록을 불러오는 중... ⏳');
// 탭 정보(gid+이름)가 들어있는 HTML 페이지들
let htmlEndpoints=[
'https://docs.google.com/spreadsheets/d/'+id+'/htmlview',
'https://docs.google.com/spreadsheets/d/'+id+'/pubhtml'
];
let tabs=[];
try{
let html=await fetchFirstOk(withProxies(htmlEndpoints),function(text){
if(!/sheet-button-/.test(text)) throw new Error('no tabs');
});
tabs=parseSheetTabs(html);
}catch(e){tabs=[];}
renderSheetTabs(tabs);
}

// HTML에서 시트 탭(gid, 이름) 추출
function parseSheetTabs(html){
let tabs=[],seen={};
try{
let doc=new DOMParser().parseFromString(html,'text/html');
doc.querySelectorAll('[id^="sheet-button-"]').forEach(function(li){
let gid=li.id.replace('sheet-button-','');
if(!/^\d+$/.test(gid)) return;
let name=(li.textContent||'').trim();
if(name&&!seen[gid]){seen[gid]=1;tabs.push({gid:gid,name:name});}
});
}catch(e){}
if(!tabs.length){
let re=/sheet-button-(\d+)[^>]*>\s*(?:<[^>]*>\s*)*([^<]+)/g,m;
while((m=re.exec(html))){
let gid=m[1];
let tmp=document.createElement('textarea');tmp.innerHTML=m[2];
let name=tmp.value.trim();
if(name&&!seen[gid]){seen[gid]=1;tabs.push({gid:gid,name:name});}
}
}
return tabs;
}

// 탭 목록 버튼 + 직접 입력 UI 그리기
function renderSheetTabs(tabs){
detectedTabs=tabs||[];

function importSheetTab(i){let t=detectedTabs[i];if(!t) return;importGoogleSheet({gid:t.gid,sheet:t.name});}
function importManualSheet(){let name=(document.getElementById('manualSheetName')?.value||'').trim();if(!name) return alert('시트 탭 이름을 입력해 주세요');importGoogleSheet({sheet:name});}

function importGoogleSheet(opts){
opts=opts||{};
let url=document.getElementById('sheetUrl').value.trim();
if(!url) return alert('구글 시트 링크를 입력해주세요');
let m=url.match(/\/d\/([a-zA-Z0-9-_]+)/);
if(!m) return alert('올바른 구글 시트 링크가 아닙니다');
let id=m[1];
let gm=url.match(/[#&?]gid=([0-9]+)/);
// gid 우선순위: 선택한 탭 > URL의 gid > 0(첫 시트)
let gid=opts.gid||(gm?gm[1]:null)||'0';
let sheetName=opts.sheet||null;
// 구글 직접 엔드포인트들 (시트 이름이 있으면 이름 기반을 먼저 시도)
let directUrls=[];
if(sheetName){
directUrls.push(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&headers=0&sheet=${encodeURIComponent(sheetName)}`);
}
directUrls.push(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&headers=0&gid=${gid}`);
directUrls.push(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`);
directUrls.push(`https://docs.google.com/spreadsheets/d/${id}/pub?gid=${gid}&single=true&output=csv`);
// 모바일(특히 삼성 인터넷/크롬)에서 CORS로 직접 fetch가 막히는 경우를 위한 프록시 우회 경로
let urls=withProxies(directUrls);

let label=sheetName?('"'+sheetName+'" 시트를'):'구글 시트를';
showToast(label+' 불러오는 중... ⏳');
(async()=>{
let lastErr=null;
for(let u of urls){
try{
let r=await fetch(u,{cache:'no-store'});
if(!r.ok) throw new Error('status '+r.status);
let text=await r.text();
// 로그인/오류 페이지(HTML)가 돌아온 경우 거르기
if(/^\s*</.test(text) || /<!DOCTYPE|<html/i.test(text.slice(0,200))) throw new Error('html returned');
if(!text.trim()) throw new Error('empty');
let srcLabel=sheetName||('시트(gid '+gid+')');
let res=addFromCsvText(text, srcLabel);
let added=res.added, updated=res.updated, dups=res.dups||[];
if(dups.length) recordDupes(dups); // 중복 영단어 기록에 저장
if(added>0 || updated>0 || dups.length>0){
if(added>0||updated>0) playSound('add');
let parts=[];
if(added>0) parts.push('새 단어 '+added+'개');
if(updated>0) parts.push('뜻 수정 '+updated+'개');
if(dups.length>0) parts.push('중복 '+dups.length+'개 발견');
let msg=parts.join(', ');
showToast(msg+' 📥');
let shown=dups.slice(0,15).map(d=>'• '+d.eng+(d.sheets.length?(' ('+d.sheets.join(', ')+')'):'')).join('\n');
let extra=dups.length>15?('\n…외 '+(dups.length-15)+'개 더'):'';
let dupMsg=dups.length?('\n\n⚠️ 다른 시트와 겹치는 영단어 '+dups.length+'개를 발견했어요:\n'+shown+extra+'\n\n시트에서 하나만 남기고 정리하면 좋아요.\n(앱의 "🔁 중복 단어" 기록에도 저장했어요)'):'';
alert((sheetName?('"'+sheetName+'" 시트에서 '):'')+(msg||'변경 없음')+'을(를) 반영했습니다.'+dupMsg);
}else{
alert('변경된 내용이 없습니다. (시트가 이미 반영돼 있거나, 형식이 "영어, 뜻" 두 열인지 확인해 주세요)');
}
return;
}catch(e){lastErr=e;}
}
alert('불러오기 실패! 다음을 확인해 주세요.\n\n① 시트 공유 설정이 "링크가 있는 모든 사용자(뷰어)"인지\n② 첫 번째 열은 영어, 두 번째 열은 뜻인지\n\n그래도 안 되면 [파일 → 공유 → 웹에 게시]로 게시한 링크를 사용해 보세요.');
})();
}

function getDeck(mode){
let arr=words.map((w,i)=>({w,i,num:i+1}));
if(rangeFrom) arr=arr.filter(x=>x.num>=rangeFrom);
if(rangeTo) arr=arr.filter(x=>x.num<=rangeTo);
if(mode==='wrong'){
return arr.filter(x=>x.w.wrong && x.w.wrongResult!=='correct');
}
return arr.filter(x=>!x.w.mastered);
}

function randomMode(mode){

function loadQuizQuestion(){
clearTimeout(quizTimer);
quizAnswered=false;
document.getElementById('quizAfter').style.display='none';
let deck=getDeck(lastMode);
if(!deck.length){ quizDeckComplete(); return; }
// 선택한 모드에 맞는 출제 방향
function dirsFor(){
if(quizDir==='e2k') return ['e2k'];
if(quizDir==='k2e') return ['k2e'];
return Math.random()<0.5?['e2k','k2e']:['k2e','e2k']; // 랜덤: 우선/보정 방향
}
// 보기를 만들 수 있는 단어를 찾을 때까지 여러 단어를 시도
let order=shuffle(deck.slice());
let chosen=null;
for(let p=0;p<order.length && !chosen;p++){
let i=order[p].i, dirs=dirsFor();
for(let d=0;d<dirs.length;d++){
let built=buildOptions(i,dirs[d]);
if(built){ chosen={i:i,dir:dirs[d],correct:built.correct,opts:built.opts}; break; }
}
}
if(!chosen){
// 현재 방향으로 보기를 만들 단어가 부족 → 일반 카드로 대체
let pick=deck[Math.floor(Math.random()*deck.length)];
quizState=null;
document.getElementById('quizPanel').style.display='none';
document.getElementById('cardHint').style.display='';
showWord(words[pick.i],pick.i);
let why=quizDir==='e2k'?'영어 문제로 낼 보기가 부족해요 (뜻이 겹치지 않는 단어가 더 필요해요)'
:quizDir==='k2e'?'한글 문제로 낼 보기가 부족해요 (뜻이 겹치지 않는 단어가 더 필요해요)'
:'객관식 보기를 만들 단어가 부족해요 (뜻이 겹치지 않는 단어가 더 필요해요)';
showToast(why);
return;
}
currentIndex=chosen.i; // 발음 듣기에서 사용
quizState=chosen;
renderQuiz();
}

// 방향에 맞는 정답 1개 + 오답 3개(다른 단어들에서) 만들기. 실패 시 null
// 보기끼리 겹치거나, 문제의 정답이 여러 개가 되는 상황(뜻이 같은 동의어 등)을 방지
function buildOptions(i,dir){
let w=words[i];
let qField=dir==='e2k'?'eng':'kor'; // 문제(지문)로 보여줄 쪽
let aField=dir==='e2k'?'kor':'eng'; // 보기로 고를 쪽
let promptVal=(w[qField]||'').trim();
let correct=(w[aField]||'').trim();
if(!promptVal||!correct) return null;
let cP=promptVal.toLowerCase(), cA=correct.toLowerCase();
let seen=new Set([cA]); // 이미 쓰인 보기 텍스트(정답 포함) → 보기끼리 중복 방지
let pool=[];
words.forEach((ww,idx)=>{
if(idx===i) return;
let p=(ww[qField]||'').trim().toLowerCase();
let a=(ww[aField]||'').trim();
if(!a) return;
let al=a.toLowerCase();
if(al===cA) return;       // 정답과 같은 보기 제외 (예: 뜻이 같은 '큰')
if(p===cP) return;        // 문제 글자가 같은 단어 제외 (정답이 여러 개가 되는 동의어 방지)
if(seen.has(al)) return;  // 보기끼리 중복 텍스트 제외
seen.add(al);
pool.push(a);
});
shuffle(pool);
let distract=pool.slice(0,3);
if(distract.length<3) return null;
return {correct:correct,opts:shuffle([correct].concat(distract))};
}

function renderQuiz(){
let s=quizState, w=words[s.i];
document.getElementById('front').innerText=s.dir==='e2k'?w.eng:w.kor;
document.getElementById('back').innerText='';
document.getElementById('card').classList.remove('revealed');
document.getElementById('cardHint').style.display='none';
document.getElementById('cardActions').style.display='none';
document.getElementById('quizTag').innerText=s.dir==='e2k'?'알맞은 뜻을 골라보세요':'알맞은 영어 단어를 골라보세요';
let nums=['①','②','③','④'];
document.getElementById('quizOpts').innerHTML=s.opts.map((o,idx)=>
'<button class="quiz-opt" onclick="answerQuiz('+idx+')"><span class="num">'+nums[idx]+'</span><span class="txt">'+escapeHtml(o)+'</span></button>'
).join('');
var insp=document.getElementById('quizSpeakInline');
if(insp) insp.style.display=''; // 한글이 제시돼도 정답 영어 발음을 들을 수 있게
var dn=document.getElementById('quizDunnoBtn');
if(dn){ dn.style.display=''; dn.disabled=false; }
document.getElementById('quizAfter').style.display='none';
document.getElementById('quizPanel').style.display='block';
}

function answerQuiz(idx){
let s=quizState;
if(!s||quizAnswered) return;
quizAnswered=true;
let chosen=s.opts[idx];
let correct=chosen.toLowerCase()===s.correct.toLowerCase();
let i=s.i;
// 버튼 잠그고 색칠
document.querySelectorAll('#quizOpts .quiz-opt').forEach((b,bi)=>{
b.disabled=true;
if(s.opts[bi].toLowerCase()===s.correct.toLowerCase()) b.classList.add('correct');
else if(bi===idx) b.classList.add('wrong');
else b.classList.add('dim');
});
var dnb=document.getElementById('quizDunnoBtn'); if(dnb) dnb.style.display='none';
var inspb=document.getElementById('quizSpeakInline'); if(inspb) inspb.style.display='none';
// 학습 상태 반영
if(correct){
words[i].lastResult='correct';
if(lastMode==='wrong') words[i].wrongResult='correct'; // 오답노트에서 외움
else words[i].mastered=true;                           // 일반: 학습 완료
registerActivity();
playSound('correct');
showToast(praises[Math.floor(Math.random()*praises.length)]);
}else{
words[i].lastResult='wrong';
words[i].wrong=true;                                    // 오답노트 자동 등록
if(lastMode==='wrong') words[i].wrongResult='wrong';    // 계속 복습 대상 유지
else words[i].wrongResult=null;
playSound('wrong');
showToast('아쉬워요! 오답노트에 담았어요 ✏️');
}
save();
document.getElementById('quizAfter').style.display='flex';
// 정답이면 빠르게(0.8초), 오답이면 정답을 확인할 시간을 주려고 1.6초 유지
// 정답·오답 모두 0.3초로 빠르게 넘어감
let delay=300;
quizTimer=setTimeout(function(){ if(quizAnswered) loadQuizQuestion(); },delay);
}

function nextQuiz(){ clearTimeout(quizTimer); loadQuizQuestion(); }

// '모르겠어요' → 정답만 표시하고 오답노트에 담기
function quizDontKnow(){
let s=quizState;
if(!s||quizAnswered) return;
quizAnswered=true;
let i=s.i;
document.querySelectorAll('#quizOpts .quiz-opt').forEach((b,bi)=>{
b.disabled=true;
if(s.opts[bi].toLowerCase()===s.correct.toLowerCase()) b.classList.add('correct');
else b.classList.add('dim');
});
var dnb=document.getElementById('quizDunnoBtn'); if(dnb) dnb.style.display='none';
var inspb=document.getElementById('quizSpeakInline'); if(inspb) inspb.style.display='none';
words[i].lastResult='wrong';
words[i].wrong=true;                                 // 오답노트 자동 등록
if(lastMode==='wrong') words[i].wrongResult='wrong'; // 계속 복습 대상 유지
else words[i].wrongResult=null;
save();
playSound('wrong');
showToast('오답노트에 담았어요 ✏️ 정답을 확인해 보세요');
document.getElementById('quizAfter').style.display='flex';
quizTimer=setTimeout(function(){ if(quizAnswered) loadQuizQuestion(); },1100);
}

function quizDeckComplete(){
clearTimeout(quizTimer);
quizState=null;quizAnswered=false;currentIndex=-1;
document.getElementById('quizPanel').style.display='none';
document.getElementById('cardActions').style.display='none';
document.getElementById('cardHint').style.display='';
document.getElementById('front').innerText=lastMode==='wrong'?'🎉 오답노트 끝!':'🎉 모두 학습했어요!';
document.getElementById('back').innerText='';
document.getElementById('card').classList.remove('revealed');
confetti();
playSound('complete');
showToast(lastMode==='wrong'?'오답노트를 모두 복습했어요! 👏':'모두 학습했어요! 정말 대단해요! 🏆');
}

function markCorrect(i){
words[i].lastResult='correct';
save();
}
function markWrong(i){
words[i].wrong=true;
words[i].wrongResult=null;
words[i].lastResult='wrong';
save();
}

function clearAll(){
if(!words.length) return alert('단어가 없습니다');
if(!confirm('모든 단어를 삭제하고 초기화할까요? (연속 학습 일수와 오늘 학습 기록도 함께 초기화됩니다)')) return;
playSound('delete');
words=[];
currentIndex=-1;
stats={};
saveStats();
showWord({eng:'단어를 선택하세요',kor:'뜻'});
save();
}
function clearMastered(){
if(!words.some(w=>w.mastered)) return alert('학습 완료된 단어가 없습니다');
if(!confirm('학습 완료된 단어를 모두 다시 학습하도록 되돌릴까요?')) return;
playSound('delete');
words.forEach(w=>{if(w.mastered) w.mastered=false;});
save();
}

function bulkDelete(items){
if(!items.length) return alert('삭제할 단어가 없습니다');
if(!confirm(items.length+'개의 단어를 삭제할까요?')) return;
playSound('delete');
let set=new Set(items.map(x=>x.w));
let curWord=currentIndex>=0?words[currentIndex]:null;
words=words.filter(w=>!set.has(w));
currentIndex=curWord&&!set.has(curWord)?words.indexOf(curWord):-1;
editIndex=-1;
save();
}
function clearAllWords(){
let q=searchVal('searchBox');
bulkDelete(words.map((w,i)=>({w,i})).filter(x=>matchQ(x.w,q)));
}
function clearWrongs(){
let q=searchVal('wrongSearch');
let items=words.filter(w=>w.wrong&&matchQ(w,q));
if(!items.length) return alert('오답노트에 단어가 없습니다');
if(!confirm(items.length+'개의 단어를 오답노트에서 해제할까요? (전체 단어 목록에는 그대로 남아요)')) return;
playSound('delete');
items.forEach(w=>{w.wrong=false;w.wrongResult=null;});
save();
}
function del(i){
playSound('delete');
if(editIndex===i)editIndex=-1;
let curWord=currentIndex>=0?words[currentIndex]:null;
let removed=words[i];
words.splice(i,1);
// 학습 중이던 단어가 삭제됐으면 해제, 아니면 새 위치로 인덱스 보정
currentIndex=(curWord && curWord!==removed)?words.indexOf(curWord):-1;
save();
}
function toggleWrongFlag(i){
words[i].wrong=!words[i].wrong;
if(words[i].wrong) words[i].wrongResult=null; // 새로 담으면 복습 대상으로
save();
}
function wrongNoteCorrect(i){
// 오답노트 안에서 외운 것으로 처리 (학습 완료와는 별개)
words[i].wrongResult='correct';
registerActivity();
save();
playSound('add');
showToast('잘했어요! 오답노트에서 외웠어요 👏');
}
function wrongNoteAgain(i){
// 다시 틀림 → 계속 복습 대상으로 유지
words[i].wrongResult='wrong';
save();
}
function resetWrongProgress(){
let items=words.filter(w=>w.wrong);
if(!items.length) return showToast('오답노트가 비어있어요');
if(!confirm('오답노트 단어 '+items.length+'개를 모두 다시 복습할 단어로 초기화할까요?')) return;
items.forEach(w=>{w.wrongResult=null;});
save();
playSound('toggle');
showToast('오답노트를 다시 복습할 단어로 초기화했어요 ↺');
}
function bulkWrong(result){
let q=searchVal('wrongSearch');
let items=words.filter(w=>w.wrong&&matchQ(w,q));
if(!items.length) return alert('오답노트에 단어가 없습니다');
let label=result==='correct'?'외웠어요':'또 틀림';
if(!confirm(items.length+"개를 모두 '"+label+"'(으)로 표시할까요?")) return;
items.forEach(w=>{ w.wrongResult=result; });
if(result==='correct') registerActivity();
save();
if(result==='correct') playSound('add');
showToast(result==='correct'?'오답노트를 모두 외운 것으로 표시했어요 👏':'모두 다시 복습할 단어로 표시했어요 ✏️');
}
function toggleMaster(i){words[i].mastered=!words[i].mastered;if(words[i].mastered)registerActivity();save();}
function bulkMaster(state){
let q=searchVal('searchBox');
let items=words.filter(w=>matchQ(w,q));
if(!items.length) return alert('단어가 없습니다');
let label=state?'학습 완료':'학습 안 함';
if(!confirm(items.length+"개를 모두 '"+label+"'(으)로 표시할까요?")) return;
items.forEach(w=>{ w.mastered=state; });
if(state) registerActivity();
save();
if(state) playSound('add');
showToast(state?'전체 단어를 학습 완료로 표시했어요 🏆':'전체 단어를 학습 안 함으로 되돌렸어요');
}
function toggle(id,el){document.getElementById(id).classList.toggle('open');if(el)el.classList.toggle('open-arrow');}
function closeSection(id){
let c=document.getElementById(id);
if(!c) return;
c.classList.remove('open');
let h3=c.previousElementSibling;
if(h3&&h3.tagName==='H3') h3.classList.remove('open-arrow');
h3.scrollIntoView({behavior:'smooth',block:'start'});
}

function startEdit(i){editIndex=i;render();}
function cancelEdit(){editIndex=-1;render();}
function saveEdit(i){
let e=document.getElementById('editEng').value.trim();
let k=document.getElementById('editKor').value.trim();
if(!e||!k) return alert('영어와 뜻을 모두 입력하세요');
if(words.some((w,j)=>j!==i && w.eng.toLowerCase()===e.toLowerCase())) return alert('이미 있는 단어예요');
words[i].eng=e;words[i].kor=k;
editIndex=-1;
save();
}

function exportBackup(){
let data={words:words,stats:stats,version:1,exportedAt:new Date().toISOString()};
let json=JSON.stringify(data);
document.getElementById('backupBox').value=json;
try{
let a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
a.download='wordbook-backup.json';
a.click();
}catch(e){}
showToast('백업을 내보냈어요! 💾');
}
function restoreBackup(){
let raw=document.getElementById('backupBox').value.trim();
if(!raw) return alert('복원할 백업 데이터를 붙여넣어 주세요');
let data;
try{data=JSON.parse(raw);}catch(e){return alert('백업 데이터 형식이 올바르지 않습니다');}
if(!data||!Array.isArray(data.words)) return alert('백업 데이터에 단어가 없습니다');
if(!confirm('현재 단어를 백업 데이터로 덮어쓸까요? (지금 단어는 사라집니다)')) return;
words=data.words.map(w=>({eng:w.eng||'',kor:w.kor||'',wrong:!!w.wrong,mastered:!!w.mastered,lastResult:w.lastResult,wrongResult:w.wrongResult||null}));
if(data.stats&&typeof data.stats==='object'){stats=data.stats;saveStats();}
editIndex=-1;currentIndex=-1;
save();
showToast('백업을 복원했어요! ♻️');
}

function matchQ(w,q){return !q||w.eng.toLowerCase().includes(q)||w.kor.toLowerCase().includes(q);}
function searchVal(id){return (document.getElementById(id)?.value||'').trim().toLowerCase();}

function render(){
let all=document.getElementById('allWordsList');
let q=searchVal('searchBox');
let list=words.map((w,i)=>({w,i})).filter(x=>matchQ(x.w,q));
all.innerHTML='<ul>'+list.map(({w,i})=>{
if(i===editIndex){
return `<li><input id="editEng" value="${w.eng.replace(/"/g,'&quot;')}"><input id="editKor" value="${w.kor.replace(/"/g,'&quot;')}"><span class="btns"><button onclick="saveEdit(${i})">💾</button><button onclick="cancelEdit()">↩️</button></span></li>`;
}
return `<li class="${w.lastResult==='correct'?'result-correct':w.lastResult==='wrong'?'result-wrong':''}"><span>${w.eng} - ${w.kor}</span><span class="btns">
<button onclick="toggleWrongFlag(${i})">${w.wrong?'❌':'⭕'}</button>
<button onclick="toggleMaster(${i})">${w.mastered?'✅':'⬜'}</button>
<button onclick="startEdit(${i})">✏️</button>
<button onclick="markCorrect(${i})">정답</button>
<button onclick="markWrong(${i})">오답</button>
<button onclick="del(${i})">🗑</button></span></li>`;
}).join('')+'</ul>';

let wq=searchVal('wrongSearch');
document.getElementById('wrongsList').innerHTML='<ul>'+words.map((w,i)=>({w,i})).filter(x=>x.w.wrong&&matchQ(x.w,wq)).map(x=>`<li class="${x.w.wrongResult==='correct'?'result-correct':x.w.wrongResult==='wrong'?'result-wrong':''}" style="flex-direction:column;align-items:stretch;gap:6px"><span style="font-size:15px;font-weight:700">${x.w.eng} <span style="color:var(--muted);font-weight:500">— ${x.w.kor}</span></span><span class="btns" style="justify-content:stretch;gap:6px"><button style="flex:1" onclick="wrongNoteCorrect(${x.i})">⭕ 외웠어요</button><button style="flex:1" onclick="wrongNoteAgain(${x.i})">❌ 또 틀림</button><button style="flex:0 0 auto" onclick="del(${x.i})">🗑</button></span></li>`).join('')+'</ul>';
let mq=searchVal('masteredSearch');
document.getElementById('masteredList').innerHTML='<ul>'+words.map((w,i)=>({w,i})).filter(x=>x.w.mastered&&matchQ(x.w,mq)).map(x=>`<li><span>${x.w.eng} - ${x.w.kor}</span><span class="btns"><button onclick="toggleMaster(${x.i})">↩️ 학습취소</button><button onclick="del(${x.i})">🗑</button></span></li>`).join('')+'</ul>';
let total=words.length;
let mastered=words.filter(w=>w.mastered).length;
let pct=total?Math.round(mastered/total*100):0;
document.getElementById('progressText').innerText=mastered+' / '+total;
document.getElementById('progressPct').innerText=pct+'%';
document.getElementById('progressFill').style.width=pct+'%';
let wrongTotal=words.filter(w=>w.wrong).length;
let wrongDone=words.filter(w=>w.wrong&&w.wrongResult==='correct').length;
let wrongPct=wrongTotal?Math.round(wrongDone/wrongTotal*100):0;
document.getElementById('wrongProgressText').innerText=wrongDone+' / '+wrongTotal;
document.getElementById('wrongProgressPct').innerText=wrongPct+'%';
document.getElementById('wrongProgressFill').style.width=wrongPct+'%';
document.getElementById('cntAll').innerText='('+total+')';
document.getElementById('cntWrong').innerText='('+words.filter(w=>w.wrong).length+')';
document.getElementById('cntMastered').innerText='('+mastered+')';
document.getElementById('cntDupes').innerText='('+dupes.length+')';
renderDupes();
}
render();
updateDarkBtn();
updateQuizModeBtns();
updateSoundBtn();
updateBothModeBtn();
if(quizMode) document.getElementById('front').innerText='랜덤 단어 또는 오답노트를 눌러 시작하세요';

// 모든 버튼에 공통 탭 효과음 (객관식 보기는 정답/오답 소리가 따로 있어 제외)
document.addEventListener('click',function(e){
let b=e.target.closest('button');
if(b && !b.classList.contains('quiz-opt') && !b.classList.contains('quiz-dunno')) playSound('tap');
},true);

// 영어/뜻 입력칸에서 Enter 키로 바로 추가
['eng','kor'].forEach(id=>{
let el=document.getElementById(id);
if(el) el.addEventListener('keydown',e=>{if(e.key==='Enter')addWord();});
});

(function(){
let card=document.getElementById('card');
let sx=0,sy=0;
card.addEventListener('touchstart',e=>{
sx=e.touches[0].clientX; sy=e.touches[0].clientY;
});
card.addEventListener('touchend',e=>{
let dx=e.changedTouches[0].clientX-sx;
let dy=e.changedTouches[0].clientY-sy;
if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){
if(quizMode){ if(quizState && quizAnswered) nextQuiz(); }
else if(dx<0) nextCard();   // ← 왼쪽 스와이프: 다음 단어
else prevCard();             // → 오른쪽 스와이프: 이전 단어
}
});
})();
</script>

<script>
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
</body>
</html>
