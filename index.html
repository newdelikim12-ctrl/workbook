<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="단어 연습장">
<meta name="theme-color" content="#a8edea">
<title>민복이와 도형이의 영어 단어 연습장</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
:root{
  --bg-grad-1:#a8edea;
  --bg-grad-2:#fed6e3;
  --container-bg:#ffffff;
  --text-main:#2d3436;
  --text-title:#5b6cce;
  --h3-bg:#f0f4f8;
  --h3-bg-hover:#e3ecf5;
  --li-bg:#f7f9fb;
  --li-bg-hover:#eef3f8;
  --input-border:#dfe6e9;
  --input-bg:#ffffff;
  --muted:#636e72;
  --progress-track:#eef3f8;
  --shadow:rgba(0,0,0,.08);
}
body.dark{
  --bg-grad-1:#1e2228;
  --bg-grad-2:#2c3138;
  --container-bg:#262b33;
  --text-main:#dcdde1;
  --text-title:#a3b1ff;
  --h3-bg:#323844;
  --h3-bg-hover:#3a4150;
  --li-bg:#2f343d;
  --li-bg-hover:#3a4150;
  --input-border:#454c58;
  --input-bg:#2f343d;
  --muted:#9aa3ab;
  --progress-track:#3a4150;
  --shadow:rgba(0,0,0,.4);
}
body{
  font-family:'Gaegu','Malgun Gothic',sans-serif;
  background:linear-gradient(135deg,var(--bg-grad-1) 0%,var(--bg-grad-2) 100%);
  margin:0;padding:20px;min-height:100vh;
  transition:background .3s ease;
}
.container{
  max-width:760px;margin:auto;background:var(--container-bg);padding:30px;
  border-radius:20px;box-shadow:0 10px 30px var(--shadow);
  color:var(--text-main);transition:background .3s ease,color .3s ease;
}
h2{text-align:center;color:var(--text-title);margin-top:0;font-family:'Jua',sans-serif;font-size:30px;letter-spacing:1px}
h3{
  cursor:pointer;background:var(--h3-bg);padding:12px 16px;border-radius:10px;
  margin:14px 0 0;color:var(--text-title);transition:.2s;user-select:none;
  display:flex;justify-content:space-between;align-items:center;
  font-family:'Jua',sans-serif;letter-spacing:.5px;
}
h3:hover{background:var(--h3-bg-hover)}
h3::after{content:'▾';font-size:14px;color:#95a5a6;transition:.2s}
h3.open-arrow::after{transform:rotate(180deg)}

.row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
input,textarea{
  padding:10px 12px;border:1px solid var(--input-border);border-radius:10px;
  font-size:14px;outline:none;transition:.2s;
  background:var(--input-bg);color:var(--text-main);
}
input:focus,textarea:focus{border-color:#74b9ff;box-shadow:0 0 0 3px rgba(116,185,255,.2)}
input[type=text],input:not([type]){flex:1;min-width:120px}
textarea{width:100%;height:90px;resize:vertical;font-family:inherit}

button{
  padding:10px 16px;border:none;border-radius:10px;background:#74b9ff;
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;
}
button:hover{background:#5aa8ff;transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.danger{background:#ff7675}
button.danger:hover{background:#ff5e5c}
button.small{padding:6px 10px;font-size:13px;border-radius:8px}

input[type=file]{
  flex:1;min-width:160px;padding:8px;background:var(--input-bg);border:1px dashed #b2bec3;
  color:var(--text-main);
}
input[type=file]::file-selector-button{
  padding:7px 12px;border:none;border-radius:8px;background:#74b9ff;
  color:#fff;font-weight:600;cursor:pointer;margin-right:8px;
}

.section-content{display:none;animation:fadeIn .25s ease}
.section-content.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.flashcard{
  margin-top:16px;
  min-height:130px;
  cursor:pointer;
  background:linear-gradient(135deg,#74b9ff,#a29bfe);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  text-align:center;
  color:#fff;
  box-shadow:0 6px 18px rgba(116,185,255,.35);
  transition:.2s;
}
.flashcard:hover{transform:translateY(-2px)}
#front{font-size:28px;font-weight:700;font-family:'Jua',sans-serif;white-space:nowrap;width:100%;text-align:center}
@media (max-width:480px){
#front{font-size:clamp(16px,7vw,28px)}
}
#back{
  font-size:20px;
  color:#ffeaa7;
  margin-top:12px;
  display:none;
  font-weight:600;
}
.flashcard.revealed #back{display:block}
.hint{font-size:12px;opacity:.8;margin-top:8px}

.modes{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.modes button{flex:1;background:var(--h3-bg);color:var(--text-main)}
.modes button:hover{background:var(--h3-bg-hover)}

.progress-wrap{margin:14px 0}
.progress-label{text-align:center;color:var(--muted);font-size:14px;margin-bottom:6px}
.progress-label b{color:var(--text-title)}
.progress-bar{
  width:100%;height:12px;border-radius:6px;background:var(--progress-track);overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:6px;
  background:linear-gradient(90deg,#74b9ff,#a29bfe);
  width:0%;transition:width .3s ease;
}

ul{list-style:none;margin:8px 0;padding:0}
li{
  margin:6px 0;background:var(--li-bg);padding:10px 12px;border-radius:10px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:14px;transition:.15s;
}
li:hover{background:var(--li-bg-hover)}
li.result-correct{background:#eaf2ff;border-left:4px solid #4a90e2}
li.result-correct:hover{background:#dcebff}
li.result-wrong{background:#ffeceb;border-left:4px solid #ff5e5c}
li.result-wrong:hover{background:#ffdfdd}
li span:first-child{flex:1}
li .btns{display:flex;gap:4px;flex-shrink:0}
li button{padding:5px 8px;font-size:13px;border-radius:8px;background:var(--h3-bg);color:var(--text-main)}
li button:hover{background:var(--h3-bg-hover)}

.stats-line{text-align:center;color:var(--muted);font-size:14px;margin-top:8px}
.stats-line b{color:#e17055;font-size:16px}
.cnt{font-size:13px;color:#95a5a6;font-weight:400}
li input{flex:1;min-width:90px;font-size:14px}
#backupBox{height:90px;font-size:12px}

.toast{
  position:fixed;left:50%;bottom:28px;
  transform:translateX(-50%) translateY(20px);
  background:#2d3436;color:#fff;padding:11px 20px;border-radius:22px;
  font-family:'Jua',sans-serif;font-size:15px;letter-spacing:.5px;
  opacity:0;pointer-events:none;z-index:9999;
  transition:opacity .25s ease,transform .25s ease;
  box-shadow:0 8px 22px rgba(0,0,0,.28);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confetti{position:fixed;top:-30px;pointer-events:none;z-index:9998;will-change:transform}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.15}}
</style>
</head>
<body>
<div class="container">
<div class="row" style="justify-content:flex-end;margin-bottom:14px">
<button class="small" onclick="toggleDark()" id="darkBtn">🌙 다크모드</button>
</div>
<h2>📚 민복이와 도형이의 영어 단어 연습장</h2>

<div class="row">
<input id="eng" placeholder="English">
<input id="kor" placeholder="뜻">
<button onclick="addWord()">➕ 추가</button>
</div>

<textarea id="bulk" placeholder="여러 단어를 한 줄에 하나씩 붙여넣으세요&#10;apple,사과&#10;banana,바나나"></textarea>
<div class="row">
<button onclick="bulkAdd()">📋 일괄 추가</button>
</div>

<div class="row">
<input type="text" id="sheetUrl" placeholder="구글 시트 공유 링크를 붙여넣으세요">
<button onclick="importGoogleSheet()">📥 구글시트 불러오기</button>
</div>

<div class="row" style="justify-content:flex-end">
<button class="danger" onclick="clearAll()">🗑 전체 초기화</button>
</div>

<div class="flashcard" id="card" onclick="this.classList.toggle('revealed')">
<div id="front">단어를 선택하세요</div>
<div id="back">뜻</div>
<div class="hint">카드를 클릭하면 뜻이 표시됩니다</div>
</div>
<div class="row" id="cardActions" style="display:none;justify-content:center">
<button onclick="event.stopPropagation();speakWord()" id="cardSpeakBtn">🔊 발음 듣기</button>
<button onclick="event.stopPropagation();toggleFav(currentIndex);showCardActions()" id="cardFavBtn">⭐ 즐겨찾기</button>
<button onclick="event.stopPropagation();toggleWrongFlag(currentIndex);showCardActions()" id="cardWrongBtn">❌ 오답노트</button>
<button onclick="event.stopPropagation();nextCard()" id="cardNextBtn">➡️ 다음 (학습 완료)</button>
</div>

<div class="modes">
<button onclick="randomMode('all')">🎲 랜덤 단어</button>
<button onclick="randomMode('fav')">⭐ 즐겨찾기</button>
<button onclick="randomMode('wrong')">❌ 오답</button>
</div>

<div class="progress-wrap">
<div class="progress-label">학습 진도율: <b id="progressText">0 / 0</b> (<span id="progressPct">0%</span>)</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="stats-line">🔥 연속 <b id="streakDays">0</b>일 · 오늘 학습 <b id="todayLearned">0</b>개</div>
</div>


<h3 onclick="toggle('allWords',this)"><span>📖 전체 단어 <b id="cntAll" class="cnt"></b></span></h3>
<div id="allWords" class="section-content">
<div class="row" style="margin-top:10px">
<input type="text" id="searchBox" placeholder="🔍 단어 또는 뜻 검색" oninput="render()">
<button class="danger small" onclick="clearAllWords()">🗑 전체 삭제</button>
</div>
<div id="allWordsList"></div>
</div>

<h3 onclick="toggle('favorites',this)"><span>⭐ 즐겨찾기 <b id="cntFav" class="cnt"></b></span></h3>
<div id="favorites" class="section-content">
<div class="row" style="margin-top:10px">
<input type="text" id="favSearch" placeholder="🔍 즐겨찾기 검색" oninput="render()">
<button class="danger small" onclick="clearFavorites()">🗑 전체 삭제</button>
</div>
<div id="favoritesList"></div>
</div>

<h3 onclick="toggle('wrongs',this)"><span>❌ 오답노트 <b id="cntWrong" class="cnt"></b></span></h3>
<div id="wrongs" class="section-content">
<div class="row" style="margin-top:10px">
<input type="text" id="wrongSearch" placeholder="🔍 오답노트 검색" oninput="render()">
<button class="danger small" onclick="clearWrongs()">🗑 전체 삭제</button>
</div>
<div id="wrongsList"></div>
</div>

<h3 onclick="toggle('mastered',this)"><span>✅ 학습 완료 <b id="cntMastered" class="cnt"></b></span></h3>
<div id="mastered" class="section-content">
<div class="row" style="margin-top:10px">
<input type="text" id="masteredSearch" placeholder="🔍 학습 완료 검색" oninput="render()">
<button class="danger small" onclick="clearMastered()">↩️ 전체 학습취소</button>
</div>
<div id="masteredList"></div>
</div>

<h3 onclick="toggle('backup',this)"><span>💾 데이터 백업</span></h3>
<div id="backup" class="section-content">
<p style="color:var(--muted);font-size:13px;margin:10px 0 6px">단어는 이 브라우저에만 저장됩니다. 기록을 지우거나 기기를 바꾸기 전에 백업하세요.</p>
<div class="row">
<button onclick="exportBackup()">💾 백업 내보내기</button>
<button onclick="restoreBackup()">♻️ 백업 복원</button>
</div>
<textarea id="backupBox" placeholder="[백업 내보내기]를 누르면 백업 데이터가 여기에 표시되고 파일로도 저장됩니다. 복원하려면 이전에 백업한 데이터를 여기에 붙여넣고 [백업 복원]을 누르세요."></textarea>
</div>

</div>

<div id="toast" class="toast"></div>

<script>
let words=JSON.parse(localStorage.getItem('words')||'[]');
let stats=JSON.parse(localStorage.getItem('stats')||'{}');
let editIndex=-1;

function saveStats(){localStorage.setItem('stats',JSON.stringify(stats));}
function dstr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayStr(){return dstr(new Date());}
function yesterdayStr(){let d=new Date();d.setDate(d.getDate()-1);return dstr(d);}

function registerActivity(){
let t=todayStr();
if(stats.lastDate!==t){
stats.streak=(stats.lastDate===yesterdayStr())?((stats.streak||0)+1):1;
stats.lastDate=t;
stats.todayDate=t;
stats.todayCount=0;
}
stats.todayCount=(stats.todayCount||0)+1;
saveStats();
}
function updateStats(){
let t=todayStr(),y=yesterdayStr();
let streak=(stats.lastDate===t||stats.lastDate===y)?(stats.streak||0):0;
let today=(stats.todayDate===t)?(stats.todayCount||0):0;
document.getElementById('streakDays').innerText=streak;
document.getElementById('todayLearned').innerText=today;
}

const praises=['잘했어요! 🎉','최고예요! ⭐','멋져요! 💪','완벽해요! ✨','대단해요! 🌟'];
let toastTimer;
function showToast(msg){
let t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
clearTimeout(toastTimer);
toastTimer=setTimeout(()=>t.classList.remove('show'),1500);
}
function confetti(){
let emojis=['🎉','⭐','✨','🌟','🎈','💫','🏆'];
for(let i=0;i<16;i++){
let s=document.createElement('span');
s.className='confetti';
s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
s.style.left=Math.random()*100+'vw';
s.style.fontSize=(16+Math.random()*18)+'px';
s.style.animation='fall '+(1.6+Math.random()*1.6)+'s linear forwards';
document.body.appendChild(s);
setTimeout(()=>s.remove(),3400);
}
}

function toggleDark(){
document.body.classList.toggle('dark');
localStorage.setItem('darkMode',document.body.classList.contains('dark')?'1':'0');
updateDarkBtn();
}
function updateDarkBtn(){
document.getElementById('darkBtn').innerText=document.body.classList.contains('dark')?'☀️ 라이트모드':'🌙 다크모드';
}
if(localStorage.getItem('darkMode')==='1') document.body.classList.add('dark');

function save(){localStorage.setItem('words',JSON.stringify(words));render();}
function duplicate(e){return words.some(w=>w.eng.toLowerCase()==e.toLowerCase())}

function addWord(){
let eng=document.getElementById('eng').value.trim();
let kor=document.getElementById('kor').value.trim();
if(!eng||!kor||duplicate(eng)) return;
words.push({eng,kor,favorite:false,wrong:false,mastered:false});
document.getElementById('eng').value='';
document.getElementById('kor').value='';
save();
}

function bulkAdd(){
let added=0;
document.getElementById('bulk').value.split('\n').forEach(l=>{
let p=l.split(/[,\t]/);
if(p.length>=2 && p[0].trim() && !duplicate(p[0].trim())){
let eng=p[0].trim();
let kor=p.slice(1).map(s=>s.trim()).filter(s=>s).join(', ');
if(kor){words.push({eng,kor,favorite:false,wrong:false,mastered:false});added++;}
}
});
document.getElementById('bulk').value='';
save();
if(added) showToast(added+'개 단어를 추가했어요! 📋');
else alert('추가할 단어가 없습니다. (형식: 영어,뜻 — 한 줄에 하나씩)');
}

function addFromCsvText(text){
let added=0;
text.split('\n').forEach(l=>{
let p=l.split(',');
if(p.length>=2 && p[0].trim()!="영어" && p[0].trim()!="" && !duplicate(p[0].trim())){
let eng=p[0].trim();
let kor=p.slice(1).map(s=>s.trim()).filter(s=>s).join(', ');
words.push({eng,kor,favorite:false,wrong:false,mastered:false});
added++;
}
});
save();
return added;
}

function importGoogleSheet(){
let url=document.getElementById('sheetUrl').value.trim();
if(!url) return alert('구글 시트 링크를 입력해주세요');
let m=url.match(/\/d\/([a-zA-Z0-9-_]+)/);
if(!m) return alert('올바른 구글 시트 링크가 아닙니다');
let id=m[1];
let gid='0';
let gm=url.match(/gid=([0-9]+)/);
if(gm) gid=gm[1];
let csvUrl=`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
fetch(csvUrl).then(r=>{
if(!r.ok) throw new Error('fetch failed');
return r.text();
}).then(text=>{
let added=addFromCsvText(text);
alert(added+'개의 단어를 불러왔습니다');
}).catch(()=>{
alert('불러오기 실패! 구글 시트의 공유 설정을 "링크가 있는 모든 사용자(보기 가능)"로 변경한 후 다시 시도해주세요.');
});
}

let currentIndex=-1;
let lastMode='all';
function speakWord(){
if(currentIndex<0) return;
let text=words[currentIndex].eng;
if(!('speechSynthesis' in window)) return alert('이 기기에서는 음성 기능을 지원하지 않습니다');
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang='en-US';
speechSynthesis.speak(u);
}

function showWord(w,i){
currentIndex=i!==undefined?i:-1;
document.getElementById('front').innerText=w.eng;
document.getElementById('back').innerText=w.kor;
document.getElementById('card').classList.remove('revealed');
showCardActions();
}
function showCardActions(){
let box=document.getElementById('cardActions');
if(currentIndex<0){box.style.display='none';return;}
box.style.display='flex';
let w=words[currentIndex];
document.getElementById('cardFavBtn').innerText=w.favorite?'⭐ 즐겨찾기 해제':'⭐ 즐겨찾기';
document.getElementById('cardWrongBtn').innerText=w.wrong?'❌ 오답노트 해제':'❌ 오답노트';
}

function getDeck(mode){
let arr=words.map((w,i)=>({w,i}));
arr=arr.filter(x=>!x.w.mastered);
if(mode==='fav') arr=arr.filter(x=>x.w.favorite);
if(mode==='wrong') arr=arr.filter(x=>x.w.wrong);
return arr;
}

function randomMode(mode){
lastMode=mode;
let arr=getDeck(mode);
if(!arr.length) return alert('단어 없음');
let pick=arr[Math.floor(Math.random()*arr.length)];
showWord(pick.w,pick.i);
}

function nextCard(){
// 현재 보고 있던 카드를 자동으로 '학습 완료'로 표시 (진도율 상승)
if(currentIndex>=0 && words[currentIndex] && !words[currentIndex].mastered){
words[currentIndex].mastered=true;
registerActivity();
save();
showToast(praises[Math.floor(Math.random()*praises.length)]+' (오늘 '+(stats.todayCount||0)+'개)');
}
// 같은 모드에서 아직 학습하지 않은 단어 중 다음 카드 선택
let arr=getDeck(lastMode);
if(!arr.length){
currentIndex=-1;
document.getElementById('front').innerText='🎉 모두 학습했어요!';
document.getElementById('back').innerText='';
document.getElementById('card').classList.remove('revealed');
showCardActions();
confetti();
showToast('모두 학습했어요! 정말 대단해요! 🏆');
return;
}
let pick=arr[Math.floor(Math.random()*arr.length)];
showWord(pick.w,pick.i);
}

function markCorrect(i){
words[i].lastResult='correct';
save();
}
function markWrong(i){
words[i].wrong=true;
words[i].lastResult='wrong';
save();
}

function clearAll(){
if(!words.length) return alert('단어가 없습니다');
if(!confirm('모든 단어를 삭제하고 초기화할까요?')) return;
words=[];
currentIndex=-1;
showWord({eng:'단어를 선택하세요',kor:'뜻'});
save();
}
function clearMastered(){
if(!words.some(w=>w.mastered)) return alert('학습 완료된 단어가 없습니다');
if(!confirm('학습 완료된 단어를 모두 다시 학습하도록 되돌릴까요?')) return;
words.forEach(w=>{if(w.mastered) w.mastered=false;});
save();
}

function bulkDelete(items){
if(!items.length) return alert('삭제할 단어가 없습니다');
if(!confirm(items.length+'개의 단어를 삭제할까요?')) return;
let set=new Set(items.map(x=>x.w));
let curWord=currentIndex>=0?words[currentIndex]:null;
words=words.filter(w=>!set.has(w));
currentIndex=curWord&&!set.has(curWord)?words.indexOf(curWord):-1;
editIndex=-1;
save();
}
function clearAllWords(){
let q=searchVal('searchBox');
bulkDelete(words.map((w,i)=>({w,i})).filter(x=>matchQ(x.w,q)));
}
function clearFavorites(){
let q=searchVal('favSearch');
bulkDelete(words.map((w,i)=>({w,i})).filter(x=>x.w.favorite&&matchQ(x.w,q)));
}
function clearWrongs(){
let q=searchVal('wrongSearch');
bulkDelete(words.map((w,i)=>({w,i})).filter(x=>x.w.wrong&&matchQ(x.w,q)));
}
function del(i){if(editIndex===i)editIndex=-1;words.splice(i,1);save();}
function toggleFav(i){words[i].favorite=!words[i].favorite;save();}
function toggleWrongFlag(i){words[i].wrong=!words[i].wrong;save();}
function toggleMaster(i){words[i].mastered=!words[i].mastered;if(words[i].mastered)registerActivity();save();}
function toggle(id,el){document.getElementById(id).classList.toggle('open');if(el)el.classList.toggle('open-arrow');}

function startEdit(i){editIndex=i;render();}
function cancelEdit(){editIndex=-1;render();}
function saveEdit(i){
let e=document.getElementById('editEng').value.trim();
let k=document.getElementById('editKor').value.trim();
if(!e||!k) return alert('영어와 뜻을 모두 입력하세요');
if(words.some((w,j)=>j!==i && w.eng.toLowerCase()===e.toLowerCase())) return alert('이미 있는 단어예요');
words[i].eng=e;words[i].kor=k;
editIndex=-1;
save();
}

function exportBackup(){
let data={words:words,stats:stats,version:1,exportedAt:new Date().toISOString()};
let json=JSON.stringify(data);
document.getElementById('backupBox').value=json;
try{
let a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
a.download='wordbook-backup.json';
a.click();
}catch(e){}
showToast('백업을 내보냈어요! 💾');
}
function restoreBackup(){
let raw=document.getElementById('backupBox').value.trim();
if(!raw) return alert('복원할 백업 데이터를 붙여넣어 주세요');
let data;
try{data=JSON.parse(raw);}catch(e){return alert('백업 데이터 형식이 올바르지 않습니다');}
if(!data||!Array.isArray(data.words)) return alert('백업 데이터에 단어가 없습니다');
if(!confirm('현재 단어를 백업 데이터로 덮어쓸까요? (지금 단어는 사라집니다)')) return;
words=data.words.map(w=>({eng:w.eng||'',kor:w.kor||'',favorite:!!w.favorite,wrong:!!w.wrong,mastered:!!w.mastered,lastResult:w.lastResult}));
if(data.stats&&typeof data.stats==='object'){stats=data.stats;saveStats();}
editIndex=-1;currentIndex=-1;
save();
showToast('백업을 복원했어요! ♻️');
}

function matchQ(w,q){return !q||w.eng.toLowerCase().includes(q)||w.kor.toLowerCase().includes(q);}
function searchVal(id){return (document.getElementById(id)?.value||'').trim().toLowerCase();}

function render(){
let all=document.getElementById('allWordsList');
let q=searchVal('searchBox');
let list=words.map((w,i)=>({w,i})).filter(x=>matchQ(x.w,q));
all.innerHTML='<ul>'+list.map(({w,i})=>{
if(i===editIndex){
return `<li><input id="editEng" value="${w.eng.replace(/"/g,'&quot;')}"><input id="editKor" value="${w.kor.replace(/"/g,'&quot;')}"><span class="btns"><button onclick="saveEdit(${i})">💾</button><button onclick="cancelEdit()">↩️</button></span></li>`;
}
return `<li class="${w.lastResult==='correct'?'result-correct':w.lastResult==='wrong'?'result-wrong':''}"><span>${w.eng} - ${w.kor}</span><span class="btns">
<button onclick="toggleFav(${i})">${w.favorite?'⭐':'☆'}</button>
<button onclick="toggleWrongFlag(${i})">${w.wrong?'❌':'⭕'}</button>
<button onclick="toggleMaster(${i})">${w.mastered?'✅':'⬜'}</button>
<button onclick="startEdit(${i})">✏️</button>
<button onclick="markCorrect(${i})">정답</button>
<button onclick="markWrong(${i})">오답</button>
<button onclick="del(${i})">🗑</button></span></li>`;
}).join('')+'</ul>';

let fq=searchVal('favSearch');
document.getElementById('favoritesList').innerHTML='<ul>'+words.map((w,i)=>({w,i})).filter(x=>x.w.favorite&&matchQ(x.w,fq)).map(x=>`<li><span>${x.w.eng} - ${x.w.kor}</span><span class="btns"><button onclick="del(${x.i})">🗑</button></span></li>`).join('')+'</ul>';
let wq=searchVal('wrongSearch');
document.getElementById('wrongsList').innerHTML='<ul>'+words.map((w,i)=>({w,i})).filter(x=>x.w.wrong&&matchQ(x.w,wq)).map(x=>`<li><span>${x.w.eng} - ${x.w.kor}</span><span class="btns"><button onclick="del(${x.i})">🗑</button></span></li>`).join('')+'</ul>';
let mq=searchVal('masteredSearch');
document.getElementById('masteredList').innerHTML='<ul>'+words.map((w,i)=>({w,i})).filter(x=>x.w.mastered&&matchQ(x.w,mq)).map(x=>`<li><span>${x.w.eng} - ${x.w.kor}</span><span class="btns"><button onclick="toggleMaster(${x.i})">↩️ 학습취소</button><button onclick="del(${x.i})">🗑</button></span></li>`).join('')+'</ul>';
let total=words.length;
let mastered=words.filter(w=>w.mastered).length;
let pct=total?Math.round(mastered/total*100):0;
document.getElementById('progressText').innerText=mastered+' / '+total;
document.getElementById('progressPct').innerText=pct+'%';
document.getElementById('progressFill').style.width=pct+'%';
document.getElementById('cntAll').innerText='('+total+')';
document.getElementById('cntFav').innerText='('+words.filter(w=>w.favorite).length+')';
document.getElementById('cntWrong').innerText='('+words.filter(w=>w.wrong).length+')';
document.getElementById('cntMastered').innerText='('+mastered+')';
updateStats();
}
render();
updateDarkBtn();

(function(){
let card=document.getElementById('card');
let sx=0,sy=0;
card.addEventListener('touchstart',e=>{
sx=e.touches[0].clientX; sy=e.touches[0].clientY;
});
card.addEventListener('touchend',e=>{
let dx=e.changedTouches[0].clientX-sx;
let dy=e.changedTouches[0].clientY-sy;
if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){
nextCard();
}
});
})();
</script>
</body>
</html>
