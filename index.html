function getActiveDeck(){ return decks.find(x=>x.id===activeDeckId); }

// ===== 목록학습 페이지 =====
function lsCurrentList(){
  let q=searchVal('lsSearch');
  return words.map((w,i)=>({w,i})).filter(({w,i})=>{
    if(lsFilter==='unlearned' && w.mastered) return false;
    if(lsFilter==='wrong' && !(w.wrong&&w.wrongResult!=='correct')) return false;
    if(lsFilter==='mastered' && !w.mastered) return false;
    return matchQ(w,q,i);
  });
}
function lsBulk(action){
  let items=lsCurrentList();
  if(!items.length) return alert('적용할 단어가 없어요');
  let labels={master:'학습 완료',unmaster:'학습 취소',clearWrong:'오답 해제'};
  if(!confirm('현재 목록의 '+items.length+'개 단어를 모두 \''+labels[action]+'\' 처리할까요?')) return;
  items.forEach(({w})=>{
    if(action==='master') w.mastered=true;
    else if(action==='unmaster') w.mastered=false;
    else if(action==='clearWrong'){ w.wrong=false; w.wrongResult=null; }
  });
  save();
  playSound(action==='clearWrong'?'delete':action==='master'?'add':'toggle');
  let done={master:'학습 완료로 표시했어요 🏆',unmaster:'학습 취소했어요 ↩️',clearWrong:'오답노트에서 해제했어요 🧹'};
  showToast(items.length+'개를 '+done[action]);
}
function lsSetFilter(name){
  lsFilter=name;
  lsEditIndex=-1;
  localStorage.setItem('lsFilter',lsFilter);
  renderListStudy();
}
function lsToggleHideAll(){
  let box=document.getElementById('lsList');
  let btn=document.getElementById('lsEyeBtn');
  if(!box) return;
  let nowHidden=box.classList.toggle('ls-hideMean');
  // 전체 토글 시 개별로 펼쳐둔 기록 초기화
  lsPeeked.clear();
  box.querySelectorAll('.kor-mean.peek').forEach(s=>s.classList.remove('peek'));
  if(btn) btn.innerHTML=nowHidden?icon('eye')+' 전체 뜻 보이기':icon('eyeoff')+' 뜻 가리기';
}
function renderListStudy(){
  let view=document.getElementById('listStudyView');
  let box=document.getElementById('lsList');
  if(!view||!box) return;
  // 다른 탭에 있을 땐 작업 생략(목록학습 진입 시 showTab에서 호출)
  if(view.style.display==='none') return;
  // 카운트
  let total=words.length;
  let cntMastered=words.filter(w=>w.mastered).length;
  let cntWrong=words.filter(w=>w.wrong&&w.wrongResult!=='correct').length;
  let cntUnlearned=words.filter(w=>!w.mastered).length;
  document.getElementById('lsCntAll').textContent=total;
  document.getElementById('lsCntUnlearned').textContent=cntUnlearned;
  document.getElementById('lsCntWrong').textContent=cntWrong;
  document.getElementById('lsCntMastered').textContent=cntMastered;
  let pct=total?Math.round(cntMastered/total*100):0;
  document.getElementById('lsProg').textContent=cntMastered+' / '+total+' ('+pct+'%)';
  document.getElementById('lsProgFill').style.width=pct+'%';
  let dk=getActiveDeck();
  document.getElementById('lsDeckName').textContent=dk?dk.name:'목록학습';
  // 필터 칩 활성표시
  let chips={all:'lsChipAll',unlearned:'lsChipUnlearned',wrong:'lsChipWrong',mastered:'lsChipMastered'};
  Object.keys(chips).forEach(k=>{
    let el=document.getElementById(chips[k]);
    if(el) el.classList.toggle('on',k===lsFilter);
  });
  // 전체 오답해제는 오답 필터에서만 표시
  let cwBtn=document.getElementById('lsBulkClearWrong');
  if(cwBtn) cwBtn.style.display=(lsFilter==='wrong')?'':'none';
  // 목록 구성
  let listed=lsCurrentList();
  let prevScroll=window.scrollY;
  let jb=document.getElementById('lsJump');
  if(!listed.length){
    box.innerHTML='<div class="ls-empty">'+(total?'조건에 맞는 단어가 없어요 🔍':'먼저 단어를 추가하거나 시트를 불러와 주세요 📥')+'</div>';
    if(jb){ jb.innerHTML=''; jb.style.display='none'; }
    return;
  }
  box.innerHTML='<ul>'+listed.map(({w,i})=>lsRowHtml(w,i)).join('')+'</ul>';
  // 60 단위 점프 바 구성 (60·120·180·240·300·360…)
  let jumpBar=document.getElementById('lsJump');
  if(jumpBar){
    let maxNum=listed[listed.length-1].i+1;
    if(maxNum>=60){
      let marks=[];
      for(let h=60;h<=maxNum;h+=60) marks.push(h);
      jumpBar.innerHTML=marks.map(n=>'<button onclick="lsJumpTo('+n+')">'+n+'</button>').join('');
      jumpBar.style.display='';
    }else{
      jumpBar.innerHTML=''; jumpBar.style.display='none';
    }
  }
  // 표시 변경으로 스크롤이 튀지 않도록 복원
  window.scrollTo(0,prevScroll);
}
function lsJumpTo(n){
  let rows=document.querySelectorAll('#lsList .ls-row');
  let target=null;
  for(let r of rows){ if((+r.dataset.i)+1>=n){ target=r; break; } }
  if(!target) target=rows[rows.length-1];
  if(!target) return;
  // 헤더가 고정이 아니므로 상단에서 살짝만 띄움
  let y=target.getBoundingClientRect().top+window.scrollY-12;
  window.scrollTo({top:Math.max(0,y),behavior:'smooth'});
}
function lsWrongCorrect(i){
  words[i].wrongResult='correct'; // 학습완료로는 보내지 않고 오답 복습 완료만 표시
  save();
  playSound('add');
  showToast('오답 복습 완료로 표시했어요 ⭕');
}
function lsStartEdit(i){ lsEditIndex=i; renderListStudy(); }
function lsCancelEdit(){ lsEditIndex=-1; renderListStudy(); }
function lsSaveEdit(i){
  let e=(document.getElementById('lsEditEng')?.value||'').trim();
  let k=(document.getElementById('lsEditKor')?.value||'').trim();
  let ex=(document.getElementById('lsEditEx')?.value||'').trim();
  if(!e||!k) return alert('영어와 뜻을 모두 입력하세요');
  if(words.some((w,j)=>j!==i && w.eng.toLowerCase()===e.toLowerCase())) return alert('이미 있는 단어예요');
  words[i].eng=e; words[i].kor=k; words[i].example=ex;
  lsEditIndex=-1;
  save();
  showToast('단어를 수정했어요 ✏️');
}
function lsTogglePeek(el,i){
  if(el.classList.toggle('peek')){
    lsPeeked.add(i);
    // '전체' 필터에서만 뜻 확인 시 자동 학습완료 (안외움 등에서는 완료로 가지 않음)
    if(lsFilter==='all' && words[i] && !words[i].mastered){ words[i].mastered=true; save(); }
  } else {
    lsPeeked.delete(i);
  }
}

      <div style="display:flex;gap:6px"><div class="input-clear" style="flex:1;min-width:0"><input id="lsEditEx" placeholder="예문 (선택사항)" value="${escapeHtml(w.example||'')}" style="width:100%"><button class="clear-x" onclick="document.getElementById('lsEditEx').value='';document.getElementById('lsEditEx').focus()" aria-label="지우기">✕</button></div><button onclick="exampleFill('lsEditEx','${speakAttr(w.eng)}')" style="flex:0 0 auto;box-shadow:none;padding:8px 10px">${icon('msg')}</button></div>

      <span class="ls-num">${i+1}</span>

      <a class="ls-dict" href="https://en.dict.naver.com/#/search?query=${encodeURIComponent(w.eng)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" aria-label="네이버 사전에서 보기" title="네이버 사전"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
      <span class="kor-mean${lsPeeked.has(i)?' peek':''}" onclick="event.stopPropagation();lsTogglePeek(this,${i})">${escapeHtml(w.kor)}</span>

      ${lsFilter==='all'?`<button onclick="lsStartEdit(${i})">✏️</button>`:''}

      ${(w.wrong&&w.wrongResult!=='correct')?`<button style="white-space:nowrap" onclick="lsWrongCorrect(${i})">🏆 외웠어요</button>`:''}

function switchDeck(id,targetTab){
  saveDeckData();
  activeDeckId = id;
  let d = decks.find(x=>x.id===id) || decks[0];
  words = d.words||[]; stats = d.stats||{}; dupes = d.dupes||[];
  currentIndex=-1; editIndex=-1; cardHistory=[]; recentSeen=[];
  rangeFrom=null; rangeTo=null;
  lsPeeked.clear(); lsEditIndex=-1; // 단어장이 바뀌면 펼쳐둔 뜻·수정 상태 초기화(인덱스 무효화)
  // 퀴즈/카드 UI 정리(다른 단어장의 퀴즈 화면·타이머가 남지 않도록)
  clearTimeout(quizTimer); quizState=null; quizAnswered=false;
  document.getElementById('quizPanel').style.display='none';
  document.getElementById('cardHint').style.display='';
  document.getElementById('rangeFrom').value='';
  document.getElementById('rangeTo').value='';
  pushRecentDeck(id);
  saveDecks();
  render();
  renderDeckPanel();
  renderRecentDecks();
  let card=document.getElementById('card');
  document.getElementById('front').innerText='단어를 선택하세요';
  document.getElementById('back').innerText='카드를 클릭하면 뜻이 표시됩니다';
  card.classList.remove('revealed');
  showCardActions();
  // 단어장 바에서 고르면 현재 탭 유지, 단어장 관리에서 고르면 학습으로 이동
  showTab(targetTab || localStorage.getItem('activeTab') || 'study');
  showToast('📚 '+d.name);
}

function createDeck(){
  let name=prompt('새 단어장 이름을 입력하세요');
  if(!name||!name.trim()) return;
  let d={id:'deck_'+Date.now(),name:name.trim(),words:[],stats:{},dupes:[]};
  decks.push(d);
  switchDeck(d.id,'study');
}

function renameDeck(id){
  let d=decks.find(x=>x.id===id); if(!d) return;
  let name=prompt('새 이름을 입력하세요',d.name);
  if(!name||!name.trim()) return;
  d.name=name.trim();
  saveDecks();
  renderDeckPanel();
  renderRecentDecks();
  showToast('이름을 변경했어요');
}

function deleteDeck(id){
  if(decks.length<=1) return showToast('단어장이 하나뿐이라 삭제할 수 없어요');
  let d=decks.find(x=>x.id===id);
  if(!confirm((d?d.name:'단어장')+'을(를) 삭제할까요? 안에 있는 단어도 모두 사라져요')) return;
  decks=decks.filter(x=>x.id!==id);
  if(activeDeckId===id) switchDeck(decks[0].id);
  else { saveDecks(); renderDeckPanel(); renderRecentDecks(); }
  showToast('단어장을 삭제했어요');
}

function showTab(tab){
  let study=document.getElementById('studyView');
  let panel=document.getElementById('deckPanel');
  let listV=document.getElementById('listStudyView');
  let tabStudy=document.getElementById('tabStudy');
  let tabDecks=document.getElementById('tabDecks');
  let tabList=document.getElementById('tabList');
  // 모든 뷰 숨기고 탭 비활성화
  study.style.display='none'; panel.style.display='none'; listV.style.display='none';
  tabStudy.classList.remove('tab-active'); tabDecks.classList.remove('tab-active'); tabList.classList.remove('tab-active');
  if(tab==='decks'){
    panel.style.display=''; tabDecks.classList.add('tab-active');
    renderDeckPanel();
  }else if(tab==='list'){
    listV.style.display=''; tabList.classList.add('tab-active');
    renderListStudy();
    window.scrollTo(0,0);
    setTimeout(updateLsScrollBtns,0);
  }else{
    tab='study';
    study.style.display=''; tabStudy.classList.add('tab-active');
  }
  // 학습 탭에서만 당겨서 새로고침 허용
  let lock=(tab!=='study');
  document.documentElement.classList.toggle('lock-refresh',lock);
  document.body.classList.toggle('lock-refresh',lock);
  try{ localStorage.setItem('activeTab',tab); }catch(e){}
}

function renderDeckPanel(){
  let box=document.getElementById('deckList');
  if(!box) return;
  box.innerHTML=decks.map(d=>{
    let cnt=d.words?d.words.length:0;
    let mastered=d.words?d.words.filter(w=>w.mastered).length:0;
    let pct=cnt?Math.round(mastered/cnt*100):0;
    let isActive=d.id===activeDeckId;
    return `<div class="deck-card${isActive?' deck-active':''}" data-id="${d.id}" onclick="deckCardClick('${d.id}')">
      <div class="deck-card-header">
        <span class="deck-name"><span class="deck-grip">⠿</span>${escapeHtml(d.name)}</span>
        <span class="deck-actions" onclick="event.stopPropagation()">
          <button class="small" onclick="renameDeck('${d.id}')" style="padding:4px 10px;font-size:12px;box-shadow:none">✏️</button>
          <button class="small danger" onclick="deleteDeck('${d.id}')" style="padding:4px 10px;font-size:12px;box-shadow:none">🗑</button>
        </span>
      </div>
      <div class="deck-meta">${cnt}개 단어 · 학습완료 ${mastered}개 (${pct}%)</div>
      <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${isActive?'<div class="deck-badge">✅ 학습 중</div>':''}
    </div>`;
  }).join('');
}

// ===== 단어장 길게눌러 드래그로 순서 변경 =====
let deckDrag={el:null,timer:null,pid:null,sx:0,sy:0,dragging:false,suppress:false};
function deckCardClick(id){ if(deckDrag.suppress) return; switchDeck(id,'study'); }
function deckEndDrag(commit){
  clearTimeout(deckDrag.timer);
  if(deckDrag.el){
    deckDrag.el.style.transform='';
    deckDrag.el.classList.remove('deck-dragging');
    if(deckDrag.dragging && commit){
      let ids=[...document.querySelectorAll('#deckList .deck-card')].map(c=>c.dataset.id);
      // DOM과 decks가 어긋났으면(동시 재렌더 등) 커밋 생략해 순서가 깨지지 않게
      if(ids.length===decks.length && decks.every(d=>ids.indexOf(d.id)>=0)){
        decks.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id));
        saveDecks(); renderDeckPanel(); renderRecentDecks();
        deckDrag.suppress=true; setTimeout(()=>{deckDrag.suppress=false;},350);
        showToast('단어장 순서를 바꿨어요 ↕️');
      }
    }
  }
  deckDrag.el=null; deckDrag.dragging=false; deckDrag.pid=null;
}
(function(){
  let list=document.getElementById('deckList');
  if(!list) return;
  // 길게 누를 때 글자 선택/검색 메뉴가 뜨지 않도록 차단
  list.addEventListener('contextmenu',function(e){ if(e.target.closest('.deck-card')) e.preventDefault(); });
  list.addEventListener('selectstart',function(e){ if(e.target.closest('.deck-card')) e.preventDefault(); });
  // 드래그 중일 때만 페이지 스크롤 차단(평소엔 정상 스크롤)
  document.addEventListener('touchmove',function(e){ if(deckDrag.dragging) e.preventDefault(); },{passive:false});
  list.addEventListener('pointerdown',function(e){
    let card=e.target.closest('.deck-card');
    if(!card || e.target.closest('.deck-actions')) return;
    deckDrag.el=card; deckDrag.pid=e.pointerId; deckDrag.sx=e.clientX; deckDrag.sy=e.clientY; deckDrag.baseY=e.clientY; deckDrag.dragging=false;
    deckDrag.timer=setTimeout(function(){
      if(!deckDrag.el) return;
      deckDrag.dragging=true;
      deckDrag.baseY=deckDrag.sy;
      card.classList.add('deck-dragging');
      try{ card.setPointerCapture(deckDrag.pid); }catch(_){}
      if(navigator.vibrate) navigator.vibrate(20);
    },220);
  });
  list.addEventListener('pointermove',function(e){
    if(!deckDrag.el) return;
    if(!deckDrag.dragging){
      // 드래그 시작 전 많이 움직이면 스크롤로 간주하고 취소(여유 16px)
      if(Math.abs(e.clientX-deckDrag.sx)>16||Math.abs(e.clientY-deckDrag.sy)>16){ clearTimeout(deckDrag.timer); deckDrag.el=null; }
      return;
    }
    e.preventDefault();
    let y=e.clientY;
    // 카드가 손가락을 따라 움직이도록 (살짝 확대해 들린 느낌)
    deckDrag.el.style.transform='translateY('+(y-deckDrag.baseY)+'px) scale(1.03)';
    // 끌고 있는 카드의 중심이 이웃 카드 중심을 넘으면 자리 교체
    let dr=deckDrag.el.getBoundingClientRect();
    let dragMid=dr.top+dr.height/2;
    let sibs=[...list.querySelectorAll('.deck-card:not(.deck-dragging)')];
    for(let s of sibs){
      let r=s.getBoundingClientRect();
      let mid=r.top+r.height/2;
      let elBefore=(deckDrag.el.compareDocumentPosition(s)&Node.DOCUMENT_POSITION_FOLLOWING)!==0; // el이 s보다 앞
      if(elBefore && dragMid>mid){ list.insertBefore(s, deckDrag.el); deckDrag.baseY=y; deckDrag.el.style.transform='translateY(0px) scale(1.03)'; break; }
      if(!elBefore && dragMid<mid){ list.insertBefore(deckDrag.el, s); deckDrag.baseY=y; deckDrag.el.style.transform='translateY(0px) scale(1.03)'; break; }
    }
  });
  list.addEventListener('pointerup',function(){ deckEndDrag(true); });
  list.addEventListener('pointercancel',function(){ deckEndDrag(false); });
})();

// ===== 상단 좌우 스와이프로 탭 전환 =====
(function(){
const ORDER=['study','list','decks'];
let tx=0,ty=0,valid=false;
function currentTab(){ return localStorage.getItem('activeTab')||'study'; }
document.addEventListener('touchstart',function(e){
  let t=e.touches[0];
  tx=t.clientX; ty=t.clientY;
  // 화면 상단 영역에서 시작한 스와이프만 탭 전환으로 인식
  // (가로 스크롤 요소·입력칸·버튼·카드 위에서 시작한 건 제외)
  let el=e.target;
  let blocked=el.closest&&el.closest('.ls-jump,#recentDecksBar,input,textarea,button,#card,#board,.flashcard');
  valid = ty<150 && !blocked;
},{passive:true});
document.addEventListener('touchend',function(e){
  if(!valid) return;
  valid=false;
  let dx=e.changedTouches[0].clientX-tx;
  let dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){
    let i=ORDER.indexOf(currentTab());
    if(i<0) i=0;
    let n=ORDER.length;
    // 순환(wrap): ←왼쪽 스와이프=다음(학습→목록학습→단어장→학습) / →오른쪽=이전
    let ni=dx<0 ? (i+1)%n : (i-1+n)%n;
    showTab(ORDER[ni]);
  }
});
})();

// ===== 드로잉 칠판 =====
let drawColor='#ffffff';
let drawSize=3;
let isDrawing=false;
let lastX=0,lastY=0;

function initCanvas(){
  let canvas=document.getElementById('drawCanvas');
  if(!canvas||canvas._init) return;
  canvas._init=true;
  let dpr=window.devicePixelRatio||1;
  let w=canvas.getBoundingClientRect().width;
  let h=Math.round(w*0.65);
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.height=h+'px';
  let ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.lineCap='round'; ctx.lineJoin='round';
  function getPos(e){
    let r=canvas.getBoundingClientRect();
    let s=e.touches?e.touches[0]:e;
    return [s.clientX-r.left, s.clientY-r.top];
  }
  function startDraw(e){isDrawing=true;[lastX,lastY]=getPos(e);}
  function moveDraw(e){
    if(!isDrawing) return;
    let [x,y]=getPos(e);
    ctx.strokeStyle=drawColor; ctx.lineWidth=drawSize;
    ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke();
    lastX=x; lastY=y;
  }
  canvas.addEventListener('mousedown',startDraw);
  canvas.addEventListener('mousemove',moveDraw);
  canvas.addEventListener('mouseup',()=>isDrawing=false);
  canvas.addEventListener('mouseleave',()=>isDrawing=false);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();startDraw(e);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();moveDraw(e);},{passive:false});
  canvas.addEventListener('touchend',()=>isDrawing=false);
}
function clearCanvas(){
  let c=document.getElementById('drawCanvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}
function setDrawColor(c){ drawColor=c; drawSize=c==='#ffffff'?3:4; }
function toggleDrawBoard(){
  let board=document.getElementById('drawBoard');
  let btn=document.getElementById('drawBoardBtn');
  let open=board.style.display==='none'||!board.style.display;
  board.style.display=open?'block':'none';
  btn.innerHTML=open?icon('edit')+' 칠판 닫기':icon('edit')+' 칠판 열기';
  if(open) setTimeout(initCanvas,50);
}
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      reg.addEventListener('updatefound',function(){
        var newSW=reg.installing;
        newSW.addEventListener('statechange',function(){
          if(newSW.state==='installed'&&navigator.serviceWorker.controller){
            // 서비스워커가 바뀐 경우에도 업데이트 배너로 안내
            if(typeof showUpdateBanner==='function') showUpdateBanner();
          }
        });
      });
    }).catch(function(){});
  });
}

// ===== 버전 기반 업데이트 확인 =====
var _updateReady=false, _lastCheck=0;
function showUpdateBanner(){
  _updateReady=true;
  var b=document.getElementById('updateBanner');
  if(b) b.classList.add('show');
}
function applyUpdate(){
  // 캐시 우회를 위해 서비스워커도 갱신 후 강력 새로고침
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistration().then(function(reg){ if(reg) reg.update(); }).catch(function(){});
  }
  location.reload();
}
function checkForUpdate(force){
  var now=Date.now();
  if(!force && now-_lastCheck<30000) return; // 30초에 한 번만
  _lastCheck=now;
  if(_updateReady) return; // 이미 안내 중
  fetch('index.html?_v='+now,{cache:'no-store'}).then(function(r){return r.text();}).then(function(html){
    var m=html.match(/APP_VERSION='([^']+)'/);
    if(m && m[1] && m[1]!==APP_VERSION) showUpdateBanner();
  }).catch(function(){});
}
window.addEventListener('load',function(){ setTimeout(function(){checkForUpdate(true);},1500); });
document.addEventListener('visibilitychange',function(){ if(!document.hidden) checkForUpdate(false); });
</script>
