<title>민복이와 도형이의 영어 단어 연습장</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
:root{
  --bg-grad-1:#c5f0e8;
  --bg-grad-2:#ffe0ec;
  --bg-grad-3:#e7e0ff;
  --container-bg:#fffdfb;
  --text-main:#3a3a44;
  --text-title:#6c7ae0;
  --accent:#7c9cff;
  --accent-soft:#a9b9ff;
  --h3-bg:#f3f5fd;
  --h3-bg-hover:#e8ecfb;
  --li-bg:#f8f9fe;
  --li-bg-hover:#eef1fc;
  --input-border:#e6e8f2;
  --input-bg:#ffffff;
  --muted:#8a8f9c;
  --progress-track:#edeffa;
  --shadow:rgba(108,122,224,.12);
  --shadow-strong:rgba(108,122,224,.18);
}
body.dark{
  --bg-grad-1:#1c1f27;
  --bg-grad-2:#2a2330;
  --bg-grad-3:#252233;
  --container-bg:#23262e;
  --text-main:#e3e4e9;
  --text-title:#a8b4ff;
  --accent:#7c9cff;
  --accent-soft:#5a6cc0;
  --h3-bg:#2d323c;
  --h3-bg-hover:#363c48;
  --li-bg:#2b2f38;
  --li-bg-hover:#363c48;
  --input-border:#414856;
  --input-bg:#2b2f38;
  --muted:#9aa0ac;
  --progress-track:#363c48;
  --shadow:rgba(0,0,0,.35);
  --shadow-strong:rgba(0,0,0,.5);
}
body{
  font-family:'Gaegu','Malgun Gothic',sans-serif;
  background:linear-gradient(135deg,var(--bg-grad-1) 0%,var(--bg-grad-2) 50%,var(--bg-grad-3) 100%);
  background-attachment:fixed;
  margin:0;padding:24px 16px;min-height:100vh;
  transition:background .4s ease;
}
.container{
  max-width:720px;margin:auto;background:var(--container-bg);padding:32px 28px;
  border-radius:28px;box-shadow:0 18px 50px var(--shadow);
  color:var(--text-main);transition:background .3s ease,color .3s ease;
}
h2{
  text-align:center;color:var(--text-title);margin:0 0 4px;
  font-family:'Jua',sans-serif;font-size:29px;letter-spacing:.5px;line-height:1.3;
}
h3{
  cursor:pointer;background:var(--h3-bg);padding:14px 18px;border-radius:16px;
  margin:12px 0 0;color:var(--text-title);transition:.2s;user-select:none;
  display:flex;justify-content:space-between;align-items:center;
  font-family:'Jua',sans-serif;letter-spacing:.3px;font-size:16px;
}
h3:hover{background:var(--h3-bg-hover);transform:translateY(-1px)}
h3::after{content:'▾';font-size:14px;color:var(--accent-soft);transition:.25s}
h3.open-arrow::after{transform:rotate(180deg)}

.row{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0}
input,textarea{
  padding:12px 14px;border:2px solid var(--input-border);border-radius:14px;
  font-size:15px;outline:none;transition:.2s;
  background:var(--input-bg);color:var(--text-main);
  font-family:'Gaegu','Malgun Gothic',sans-serif;
}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(124,156,255,.18)}
input[type=text],input:not([type]){flex:1;min-width:120px}
textarea{width:100%;height:92px;resize:vertical;font-family:inherit;line-height:1.5}

button{
  padding:11px 18px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#7c9cff,#9b8cff);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.18s;
  font-family:'Gaegu','Malgun Gothic',sans-serif;
  box-shadow:0 4px 12px rgba(124,156,255,.3);
}
button:hover{filter:brightness(1.05);transform:translateY(-2px);box-shadow:0 7px 18px rgba(124,156,255,.4)}
button:active{transform:translateY(0);box-shadow:0 3px 8px rgba(124,156,255,.3)}
button.danger{background:linear-gradient(135deg,#ff8a8a,#ff6b9d);box-shadow:0 4px 12px rgba(255,110,140,.3)}
button.danger:hover{box-shadow:0 7px 18px rgba(255,110,140,.4)}
button.small{padding:8px 12px;font-size:13px;border-radius:11px}

input[type=file]{
  flex:1;min-width:160px;padding:9px;background:var(--input-bg);border:2px dashed var(--accent-soft);
  color:var(--text-main);border-radius:14px;
}
input[type=file]::file-selector-button{
  padding:8px 13px;border:none;border-radius:11px;background:var(--accent);
  color:#fff;font-weight:700;cursor:pointer;margin-right:8px;
}

.section-content{display:none;animation:fadeIn .25s ease}
.section-content.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.flashcard{
  margin-top:18px;
  min-height:150px;
  cursor:pointer;
  background:linear-gradient(135deg,#7c9cff 0%,#a78bff 55%,#c89bff 100%);
  border-radius:24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:28px;
  text-align:center;
  color:#fff;
  box-shadow:0 12px 32px rgba(124,124,255,.4);
  transition:.25s cubic-bezier(.2,.8,.3,1);
  position:relative;
  overflow:hidden;
}
.flashcard::before{
  content:'';position:absolute;top:-40%;right:-15%;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,.12);
}
.flashcard:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 18px 40px rgba(124,124,255,.5)}
#front{font-size:30px;font-weight:700;font-family:'Jua',sans-serif;white-space:normal;overflow-wrap:break-word;word-break:break-word;width:100%;text-align:center;position:relative;line-height:1.25}
@media (max-width:480px){
#front{font-size:clamp(18px,7.5vw,30px)}
}
#back{
  font-size:21px;
  color:#fff3c4;
  margin-top:14px;
  display:none;
  font-weight:600;
  position:relative;
  text-align:center;
  width:100%;
  overflow-wrap:break-word;
  word-break:break-word;
  line-height:1.3;
}
.flashcard.revealed #back{display:block;animation:fadeIn .3s ease}
.hint{font-size:13px;opacity:.85;margin-top:10px;position:relative}

.modes{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.modes button{flex:1;min-width:90px;background:var(--h3-bg);color:var(--text-main);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 8px;line-height:1.1;box-shadow:0 3px 10px var(--shadow)}
.modes button:hover{background:var(--h3-bg-hover);filter:none}
.modes .ico{font-size:26px}
.modes .lbl{font-size:14px;font-weight:700}

.progress-wrap{margin:18px 0;padding:16px;background:var(--h3-bg);border-radius:18px}
.progress-label{text-align:center;color:var(--muted);font-size:15px;margin-bottom:8px}
.progress-label b{color:var(--text-title)}
.progress-bar{
  width:100%;height:14px;border-radius:8px;background:var(--progress-track);overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.06);
}
.progress-fill{
  height:100%;border-radius:8px;
  background:linear-gradient(90deg,#7c9cff,#a78bff,#ff9bce);
  width:0%;transition:width .45s cubic-bezier(.2,.8,.3,1);
}

ul{list-style:none;margin:10px 0;padding:0}
li{
  margin:8px 0;background:var(--li-bg);padding:12px 14px;border-radius:14px;
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  font-size:15px;transition:.15s;
}
li>span:first-child{overflow-wrap:break-word;word-break:break-word;min-width:0;flex:1}
li:hover{background:var(--li-bg-hover);transform:translateX(2px)}
li.result-correct{background:#e9f0ff;border-left:4px solid var(--accent)}
li.result-correct:hover{background:#dde8ff}
li.result-wrong{background:#ffecf1;border-left:4px solid #ff6b9d}
li.result-wrong:hover{background:#ffdfe8}
li span:first-child{flex:1}
li .btns{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
li button{padding:6px 9px;font-size:13px;border-radius:10px;background:var(--h3-bg);color:var(--text-main);box-shadow:none;font-weight:600}
li button:hover{background:var(--h3-bg-hover);filter:none;transform:none}

.stats-line{text-align:center;color:var(--muted);font-size:15px;margin-top:10px}
.stats-line b{color:#ff8a5c;font-size:17px}
.cnt{font-size:13px;color:var(--accent-soft);font-weight:400}
li input{flex:1;min-width:90px;font-size:14px}
#backupBox{height:92px;font-size:12px}

@media (max-width:480px){
  .container{padding:24px 18px;border-radius:22px}
  #allWordsList li{flex-direction:column;align-items:stretch;gap:8px}
  #allWordsList li span:first-child{text-align:center}
  #allWordsList li .btns{justify-content:center}
  li{font-size:14px}
}

.toast{
  position:fixed;left:50%;bottom:30px;
  transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,#3a3a44,#4a4458);color:#fff;padding:12px 22px;border-radius:26px;
  font-family:'Jua',sans-serif;font-size:15px;letter-spacing:.3px;
  opacity:0;pointer-events:none;z-index:9999;
  transition:opacity .25s ease,transform .25s ease;
  box-shadow:0 10px 28px rgba(0,0,0,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confetti{position:fixed;top:-30px;pointer-events:none;z-index:9998;will-change:transform}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.15}}
</style>
</head>
<body>
<div class="container">
<div class="row" style="justify-content:flex-end;margin-bottom:14px">
<button class="small" onclick="toggleDark()" id="darkBtn">🌙 다크모드</button>
</div>
<h2>민복이와 도형이의 영어 단어 연습장</h2>

<div class="row">
<input id="eng" placeholder="English">
<input id="kor" placeholder="뜻">
</div>

<div class="row" style="justify-content:center;margin-top:4px">
<button onclick="addWord()">➕ 추가</button>
</div>

<div id="bulkRows" style="max-height:260px;overflow-y:auto;overflow-x:hidden;margin-top:14px;padding:4px;border:2px dashed var(--accent-soft);border-radius:16px"></div>
<div class="row" style="justify-content:center;margin-top:10px">
<button class="small" onclick="addBulkRow()">➕ 행 추가</button>
<button onclick="bulkAdd()">📋 일괄 추가</button>
</div>

<div class="row">
<input type="text" id="sheetUrl" placeholder="구글 시트 공유 링크를 붙여넣으세요">
</div>
<div class="row" style="flex-wrap:nowrap">
<button style="flex:1;min-width:0;padding:11px 6px;font-size:13px;white-space:nowrap;letter-spacing:-.3px" onclick="loadSheetTabs()">📑 시트 목록 불러오기</button>
<button class="danger" style="flex:1;min-width:0;padding:11px 6px;font-size:13px;white-space:nowrap;letter-spacing:-.3px" onclick="clearAll()">🗑 전체 초기화</button>
</div>

<script>
let words=JSON.parse(localStorage.getItem('words')||'[]');
let stats=JSON.parse(localStorage.getItem('stats')||'{}');
let editIndex=-1;

function saveStats(){localStorage.setItem('stats',JSON.stringify(stats));}
function dstr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayStr(){return dstr(new Date());}
function yesterdayStr(){let d=new Date();d.setDate(d.getDate()-1);return dstr(d);}

function registerActivity(){
let t=todayStr();
if(stats.lastDate!==t){
stats.streak=(stats.lastDate===yesterdayStr())?((stats.streak||0)+1):1;
stats.lastDate=t;
stats.todayDate=t;
stats.todayCount=0;
}
stats.todayCount=(stats.todayCount||0)+1;
saveStats();
}
function updateStats(){
let t=todayStr(),y=yesterdayStr();
let streak=(stats.lastDate===t||stats.lastDate===y)?(stats.streak||0):0;
let today=(stats.todayDate===t)?(stats.todayCount||0):0;
document.getElementById('streakDays').innerText=streak;
document.getElementById('todayLearned').innerText=today;
}

const praises=['잘했어요! 🎉','최고예요! ⭐','멋져요! 💪','완벽해요! ✨','대단해요! 🌟'];
let toastTimer;
function showToast(msg){
let t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
clearTimeout(toastTimer);
toastTimer=setTimeout(()=>t.classList.remove('show'),1500);
}
function confetti(){
let emojis=['🎉','⭐','✨','🌟','🎈','💫','🏆'];
for(let i=0;i<16;i++){
let s=document.createElement('span');
s.className='confetti';
s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
s.style.left=Math.random()*100+'vw';
s.style.fontSize=(16+Math.random()*18)+'px';
s.style.animation='fall '+(1.6+Math.random()*1.6)+'s linear forwards';
document.body.appendChild(s);
setTimeout(()=>s.remove(),3400);
}
}

function toggleDark(){
document.body.classList.toggle('dark');
localStorage.setItem('darkMode',document.body.classList.contains('dark')?'1':'0');
updateDarkBtn();
}
function updateDarkBtn(){
document.getElementById('darkBtn').innerText=document.body.classList.contains('dark')?'☀️ 라이트모드':'🌙 다크모드';
}
if(localStorage.getItem('darkMode')==='1') document.body.classList.add('dark');

function save(){localStorage.setItem('words',JSON.stringify(words));render();}
function duplicate(e){return words.some(w=>w.eng.toLowerCase()==e.toLowerCase())}

function addWord(){
let eng=document.getElementById('eng').value.trim();
let kor=document.getElementById('kor').value.trim();
if(!eng||!kor) return alert('영어와 뜻을 모두 입력해 주세요');
if(duplicate(eng)) return alert('이미 있는 단어예요: '+eng);
words.push({eng,kor,wrong:false,mastered:false,wrongResult:null});
document.getElementById('eng').value='';
document.getElementById('kor').value='';
save();
showToast('단어를 추가했어요! ➕');
}

function addBulkRow(eng='',kor=''){
let box=document.getElementById('bulkRows');
let div=document.createElement('div');
div.className='row';
div.style.margin='6px 0';
div.style.flexWrap='nowrap';
div.innerHTML=`<input type="text" class="bulkEng" placeholder="English" value="${eng.replace(/"/g,'&quot;')}" style="min-width:0">`+
`<input type="text" class="bulkKor" placeholder="뜻" value="${kor.replace(/"/g,'&quot;')}" style="min-width:0">`+
`<button class="small" onclick="this.parentElement.remove()" style="flex:0 0 auto">🗑</button>`;
box.appendChild(div);
}
function ensureBulkRows(){
let box=document.getElementById('bulkRows');
if(!box.children.length){for(let i=0;i<3;i++) addBulkRow();}
}

function bulkAdd(){
let rows=document.querySelectorAll('#bulkRows .row');
let added=0;
rows.forEach(r=>{
let eng=r.querySelector('.bulkEng').value.trim();
let kor=r.querySelector('.bulkKor').value.trim();
if(eng&&kor&&!duplicate(eng)){
words.push({eng,kor,wrong:false,mastered:false,wrongResult:null});
added++;
}
});
if(added){
document.getElementById('bulkRows').innerHTML='';
for(let i=0;i<3;i++) addBulkRow();
save();
showToast(added+'개 단어를 추가했어요! 📋');
}else{
alert('추가할 단어가 없습니다. (영어와 뜻을 모두 입력했는지, 중복은 아닌지 확인해 주세요)');
}
}

function parseCsvLine(line){
let out=[],cur='',inQ=false;
for(let i=0;i<line.length;i++){
let c=line[i];
if(inQ){
if(c==='"'){
if(line[i+1]==='"'){cur+='"';i++;}
else inQ=false;
}else cur+=c;
}else{
if(c==='"') inQ=true;
else if(c===',') {out.push(cur);cur='';}
else cur+=c;
}
}
out.push(cur);
return out;
}
function addFromCsvText(text){
let added=0;
let lines=text.replace(/\r/g,'').split('\n');
lines.forEach((l,idx)=>{
if(!l.trim()) return;
let p=parseCsvLine(l);
if(p.length<2) return;
let eng=p[0].trim();
let kor=p.slice(1).map(s=>s.trim()).filter(s=>s).join(', ');
// 첫 번째 줄이 명백한 헤더(예: 영어/단어/뜻/한글/meaning 등)면 건너뜀
if(idx===0){
let h1=eng.toLowerCase(), h2=(p[1]||'').trim().toLowerCase();
let headerWords=['영어','단어','english','word','뜻','한글','의미','meaning','korean'];
if(headerWords.includes(h1) || headerWords.includes(h2)) return;
}
if(eng==='' || !kor || duplicate(eng)) return;
words.push({eng,kor,wrong:false,mastered:false,wrongResult:null});
added++;
});
save();
return added;
}

// ===== 구글 시트 주소 기록 =====
let sheetUrls=JSON.parse(localStorage.getItem('sheetUrls')||'[]');
function saveSheetUrls(){localStorage.setItem('sheetUrls',JSON.stringify(sheetUrls));}
function addSheetUrl(url){
url=url.trim();
if(!url) return;
sheetUrls=sheetUrls.filter(u=>u!==url); // 중복 제거
sheetUrls.unshift(url);                 // 최근 것을 맨 위로
if(sheetUrls.length>10) sheetUrls=sheetUrls.slice(0,10);
saveSheetUrls();
renderSheetHistory();
}
function removeSheetUrl(i){
sheetUrls.splice(i,1);
saveSheetUrls();
renderSheetHistory();
}
function clearSheetUrls(){
if(!sheetUrls.length) return;
if(!confirm('저장된 구글 시트 주소 기록을 모두 지울까요?')) return;
sheetUrls=[];
saveSheetUrls();
renderSheetHistory();
}
function useSheetUrl(i){
document.getElementById('sheetUrl').value=sheetUrls[i];
importGoogleSheet();
}
function shortUrl(u){
let m=u.match(/\/d\/([a-zA-Z0-9-_]+)/);
let id=m?m[1]:u;
return (id.length>16?id.slice(0,16)+'…':id);
}
function renderSheetHistory(){
let box=document.getElementById('sheetHistory');
if(!box) return;
if(!sheetUrls.length){box.innerHTML='';return;}
box.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin:8px 2px 4px">'
+'<span style="color:var(--muted);font-size:13px">📌 저장된 시트 주소</span>'
+'<button class="small danger" onclick="clearSheetUrls()" style="padding:5px 9px;font-size:12px">기록 전체 삭제</button></div>'
+'<ul>'+sheetUrls.map((u,i)=>
'<li style="font-size:13px"><span style="font-size:13px" title="'+u.replace(/"/g,'&quot;')+'">📄 '+shortUrl(u)+'</span>'
+'<span class="btns"><button onclick="useSheetUrl('+i+')">📥 불러오기</button>'
+'<button onclick="removeSheetUrl('+i+')">🗑</button></span></li>').join('')+'</ul>';
}

// ===== 시트(탭) 선택해서 불러오기 =====
function parseSheetId(url){let m=url.match(/\/d\/([a-zA-Z0-9-_]+)/);return m?m[1]:null;}
function parseSheetGid(url){let m=url.match(/[#&?]gid=([0-9]+)/);return m?m[1]:null;}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// 직접 URL + (모바일 CORS 우회용) 프록시 URL 후보 만들기
function withProxies(urls){
let out=[];
urls.forEach(u=>out.push(u));
urls.forEach(u=>{
out.push('https://corsproxy.io/?url='+encodeURIComponent(u));
out.push('https://api.allorigins.win/raw?url='+encodeURIComponent(u));
});
return out;
}
// 후보 URL들을 순서대로 시도해 처음 성공한 본문 반환
async function fetchFirstOk(urls,validate){
let lastErr=null;
for(let u of urls){
try{
let r=await fetch(u);
if(!r.ok) throw new Error('status '+r.status);
let text=await r.text();
if(validate) validate(text);
return text;
}catch(e){lastErr=e;}
}
throw lastErr||new Error('all failed');
}

// 시트 안에 들어있는 탭(세부 시트) 목록 불러오기
let detectedTabs=[];
async function loadSheetTabs(){
let url=document.getElementById('sheetUrl').value.trim();
if(!url) return alert('구글 시트 링크를 입력해주세요');
let id=parseSheetId(url);
if(!id) return alert('올바른 구글 시트 링크가 아닙니다');
let box=document.getElementById('sheetTabs');
box.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px 2px">📑 시트 목록을 불러오는 중... ⏳</div>';
showToast('시트 목록을 불러오는 중... ⏳');
// 탭 정보(gid+이름)가 들어있는 HTML 페이지들
let htmlEndpoints=[
'https://docs.google.com/spreadsheets/d/'+id+'/htmlview',
'https://docs.google.com/spreadsheets/d/'+id+'/pubhtml'
];
let tabs=[];
try{
let html=await fetchFirstOk(withProxies(htmlEndpoints),function(text){
if(!/sheet-button-/.test(text)) throw new Error('no tabs');
});
tabs=parseSheetTabs(html);
}catch(e){tabs=[];}
renderSheetTabs(tabs);
}

// HTML에서 시트 탭(gid, 이름) 추출
function parseSheetTabs(html){
let tabs=[],seen={};
try{
let doc=new DOMParser().parseFromString(html,'text/html');
doc.querySelectorAll('[id^="sheet-button-"]').forEach(function(li){
let gid=li.id.replace('sheet-button-','');
if(!/^\d+$/.test(gid)) return;
let name=(li.textContent||'').trim();
if(name&&!seen[gid]){seen[gid]=1;tabs.push({gid:gid,name:name});}
});
}catch(e){}
if(!tabs.length){
let re=/sheet-button-(\d+)[^>]*>\s*(?:<[^>]*>\s*)*([^<]+)/g,m;
while((m=re.exec(html))){
let gid=m[1];
let tmp=document.createElement('textarea');tmp.innerHTML=m[2];
let name=tmp.value.trim();
if(name&&!seen[gid]){seen[gid]=1;tabs.push({gid:gid,name:name});}
}
}
return tabs;
}

// 탭 목록 버튼 + 직접 입력 UI 그리기
function renderSheetTabs(tabs){
detectedTabs=tabs||[];
let box=document.getElementById('sheetTabs');
let urlGid=parseSheetGid(document.getElementById('sheetUrl').value.trim());
let html='<div style="border:2px solid var(--accent-soft);border-radius:16px;padding:12px;margin-top:4px">';
if(detectedTabs.length){
html+='<div style="color:var(--text-title);font-family:Jua,sans-serif;font-size:14px;margin-bottom:8px">📑 가져올 시트(탭)를 선택하세요</div>';
html+='<div style="display:flex;flex-wrap:wrap;gap:8px">';
html+=detectedTabs.map(function(t,i){
let active=urlGid&&urlGid===t.gid;
return '<button class="small" onclick="importSheetTab('+i+')" style="'+(active?'background:linear-gradient(135deg,#7c9cff,#9b8cff);color:#fff;':'')+'">📄 '+escapeHtml(t.name)+'</button>';
}).join('');
html+='</div>';
}else{
html+='<div style="color:var(--text-title);font-family:Jua,sans-serif;font-size:14px;margin-bottom:6px">📑 시트 목록을 자동으로 불러오지 못했어요</div>';
html+='<div style="color:var(--muted);font-size:12px">아래에 시트 탭 이름을 직접 입력하거나, 첫 번째 시트를 바로 불러올 수 있어요.</div>';
}
html+='<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--input-border)">';
html+='<div style="color:var(--muted);font-size:12px;margin-bottom:6px">시트 탭 이름을 직접 입력해서 불러오기</div>';
html+='<div class="row" style="flex-wrap:nowrap;margin:0">';
html+='<input type="text" id="manualSheetName" placeholder="예: 1과, Unit1, Sheet2" style="min-width:0">';
html+='<button class="small" style="flex:0 0 auto" onclick="importManualSheet()">📥 불러오기</button>';
html+='</div>';
html+='<button class="small" onclick="importGoogleSheet()" style="width:100%;margin-top:8px;background:var(--h3-bg);color:var(--text-main);box-shadow:none">📄 첫 번째 시트 그대로 불러오기</button>';
html+='</div>';
html+='</div>';
box.innerHTML=html;
}

function importSheetTab(i){let t=detectedTabs[i];if(!t) return;importGoogleSheet({gid:t.gid,sheet:t.name});}
function importManualSheet(){let name=(document.getElementById('manualSheetName')?.value||'').trim();if(!name) return alert('시트 탭 이름을 입력해 주세요');importGoogleSheet({sheet:name});}

function importGoogleSheet(opts){
opts=opts||{};
let url=document.getElementById('sheetUrl').value.trim();
if(!url) return alert('구글 시트 링크를 입력해주세요');
let m=url.match(/\/d\/([a-zA-Z0-9-_]+)/);
if(!m) return alert('올바른 구글 시트 링크가 아닙니다');
let id=m[1];
let gm=url.match(/[#&?]gid=([0-9]+)/);
// gid 우선순위: 선택한 탭 > URL의 gid > 0(첫 시트)
let gid=opts.gid||(gm?gm[1]:null)||'0';
let sheetName=opts.sheet||null;
// 구글 직접 엔드포인트들 (시트 이름이 있으면 이름 기반을 먼저 시도)
let directUrls=[];
if(sheetName){
directUrls.push(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&headers=0&sheet=${encodeURIComponent(sheetName)}`);
}
directUrls.push(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&headers=0&gid=${gid}`);
directUrls.push(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`);
directUrls.push(`https://docs.google.com/spreadsheets/d/${id}/pub?gid=${gid}&single=true&output=csv`);
// 모바일(특히 삼성 인터넷/크롬)에서 CORS로 직접 fetch가 막히는 경우를 위한 프록시 우회 경로
let urls=withProxies(directUrls);

let label=sheetName?('"'+sheetName+'" 시트를'):'구글 시트를';
showToast(label+' 불러오는 중... ⏳');
(async()=>{
let lastErr=null;
for(let u of urls){
try{
let r=await fetch(u);
if(!r.ok) throw new Error('status '+r.status);
let text=await r.text();
// 로그인/오류 페이지(HTML)가 돌아온 경우 거르기
if(/^\s*</.test(text) || /<!DOCTYPE|<html/i.test(text.slice(0,200))) throw new Error('html returned');
if(!text.trim()) throw new Error('empty');
let added=addFromCsvText(text);
addSheetUrl(url); // 성공한 주소를 기록에 저장
if(added>0){
showToast(added+'개 단어를 불러왔어요! 📥');
alert((sheetName?('"'+sheetName+'" 시트에서 '):'')+added+'개의 단어를 불러왔습니다');
}else{
alert('새로 추가된 단어가 없습니다. (이미 있는 단어이거나, 시트의 형식이 "영어, 뜻" 두 열인지 확인해 주세요)');
}
return;
}catch(e){lastErr=e;}
}
alert('불러오기 실패! 다음을 확인해 주세요.\n\n① 시트 공유 설정이 "링크가 있는 모든 사용자(뷰어)"인지\n② 첫 번째 열은 영어, 두 번째 열은 뜻인지\n\n그래도 안 되면 [파일 → 공유 → 웹에 게시]로 게시한 링크를 사용해 보세요.');
})();
}

let currentIndex=-1;
let lastMode='all';
function speakWord(){
if(currentIndex<0) return;
let text=words[currentIndex].eng;
if(!('speechSynthesis' in window)) return alert('이 기기에서는 음성 기능을 지원하지 않습니다');
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(text);
u.lang='en-US';
speechSynthesis.speak(u);
}

function showWord(w,i){
currentIndex=i!==undefined?i:-1;
document.getElementById('front').innerText=w.eng;
document.getElementById('back').innerText=w.kor;
document.getElementById('card').classList.remove('revealed');
showCardActions();
}
function showCardActions(){
let box=document.getElementById('cardActions');
if(currentIndex<0){box.style.display='none';return;}
box.style.display='flex';
let w=words[currentIndex];
document.getElementById('cardWrongBtn').innerText=w.wrong?'❌ 오답노트 해제':'❌ 오답노트';
let nb=document.getElementById('cardNextBtn');
if(nb) nb.innerText=lastMode==='wrong'?'➡️ 다음 (외웠어요)':'➡️ 다음 (학습 완료)';
}

function getDeck(mode){
let arr=words.map((w,i)=>({w,i}));
if(mode==='wrong'){
// 오답노트는 학습완료 여부와 무관하게, 아직 '외웠어요' 처리 안 된 오답 단어만
return arr.filter(x=>x.w.wrong && x.w.wrongResult!=='correct');
}
// 일반 학습은 학습 완료된 단어 제외
return arr.filter(x=>!x.w.mastered);
}

function randomMode(mode){
lastMode=mode;
let arr=getDeck(mode);
if(!arr.length){
if(mode==='wrong') return alert('복습할 오답노트 단어가 없어요! 👍');
if(words.length===0) return alert('먼저 단어를 추가해 주세요');
return alert('학습할 단어가 없어요. 모두 학습 완료했어요! 🎉');
}
let pick=arr[Math.floor(Math.random()*arr.length)];
showWord(pick.w,pick.i);
}

function nextCard(){
if(currentIndex>=0 && words[currentIndex]){
if(lastMode==='wrong'){
// 오답노트 학습: 학습 완료가 아니라 '오답노트 안에서' 외운 것으로 처리
words[currentIndex].wrongResult='correct';
registerActivity();
save();
}else if(!words[currentIndex].mastered){
// 일반 학습: 학습 완료로 표시 (진도율 상승)
words[currentIndex].mastered=true;
registerActivity();
save();
}
}
// 같은 모드에서 다음 카드 선택
let arr=getDeck(lastMode);
if(!arr.length){
currentIndex=-1;
document.getElementById('front').innerText=lastMode==='wrong'?'🎉 오답노트 끝!':'🎉 모두 학습했어요!';
document.getElementById('back').innerText='';
document.getElementById('card').classList.remove('revealed');
showCardActions();
confetti();
showToast(lastMode==='wrong'?'오답노트를 모두 복습했어요! 👏':'모두 학습했어요! 정말 대단해요! 🏆');
return;
}
let pick=arr[Math.floor(Math.random()*arr.length)];
showWord(pick.w,pick.i);
}

function markCorrect(i){
words[i].lastResult='correct';
save();
}
function markWrong(i){
words[i].wrong=true;
words[i].wrongResult=null;
words[i].lastResult='wrong';
save();
}

function clearAll(){
if(!words.length) return alert('단어가 없습니다');
if(!confirm('모든 단어를 삭제하고 초기화할까요? (연속 학습 일수와 오늘 학습 기록도 함께 초기화됩니다)')) return;
words=[];
currentIndex=-1;
stats={};
saveStats();
showWord({eng:'단어를 선택하세요',kor:'뜻'});
save();
}
function clearMastered(){
if(!words.some(w=>w.mastered)) return alert('학습 완료된 단어가 없습니다');
if(!confirm('학습 완료된 단어를 모두 다시 학습하도록 되돌릴까요?')) return;
words.forEach(w=>{if(w.mastered) w.mastered=false;});
save();
}

function bulkDelete(items){
if(!items.length) return alert('삭제할 단어가 없습니다');
if(!confirm(items.length+'개의 단어를 삭제할까요?')) return;
let set=new Set(items.map(x=>x.w));
let curWord=currentIndex>=0?words[currentIndex]:null;
words=words.filter(w=>!set.has(w));
currentIndex=curWord&&!set.has(curWord)?words.indexOf(curWord):-1;
editIndex=-1;
save();
}
function clearAllWords(){
let q=searchVal('searchBox');
bulkDelete(words.map((w,i)=>({w,i})).filter(x=>matchQ(x.w,q)));
}
function clearWrongs(){
let q=searchVal('wrongSearch');
let items=words.filter(w=>w.wrong&&matchQ(w,q));
if(!items.length) return alert('오답노트에 단어가 없습니다');
if(!confirm(items.length+'개의 단어를 오답노트에서 해제할까요? (전체 단어 목록에는 그대로 남아요)')) return;
items.forEach(w=>{w.wrong=false;w.wrongResult=null;});
save();
}
function del(i){
if(editIndex===i)editIndex=-1;
let curWord=currentIndex>=0?words[currentIndex]:null;
let removed=words[i];
words.splice(i,1);
// 학습 중이던 단어가 삭제됐으면 해제, 아니면 새 위치로 인덱스 보정
currentIndex=(curWord && curWord!==removed)?words.indexOf(curWord):-1;
save();
}
function toggleWrongFlag(i){
words[i].wrong=!words[i].wrong;
if(words[i].wrong) words[i].wrongResult=null; // 새로 담으면 복습 대상으로
save();
}
function wrongNoteCorrect(i){
// 오답노트 안에서 외운 것으로 처리 (학습 완료와는 별개)
words[i].wrongResult='correct';
registerActivity();
save();
showToast('잘했어요! 오답노트에서 외웠어요 👏');
}
function wrongNoteAgain(i){
// 다시 틀림 → 계속 복습 대상으로 유지
words[i].wrongResult='wrong';
save();
}
function toggleMaster(i){words[i].mastered=!words[i].mastered;if(words[i].mastered)registerActivity();save();}
function toggle(id,el){document.getElementById(id).classList.toggle('open');if(el)el.classList.toggle('open-arrow');}

function startEdit(i){editIndex=i;render();}
function cancelEdit(){editIndex=-1;render();}
function saveEdit(i){
let e=document.getElementById('editEng').value.trim();
let k=document.getElementById('editKor').value.trim();
if(!e||!k) return alert('영어와 뜻을 모두 입력하세요');
if(words.some((w,j)=>j!==i && w.eng.toLowerCase()===e.toLowerCase())) return alert('이미 있는 단어예요');
words[i].eng=e;words[i].kor=k;
editIndex=-1;
save();
}

function exportBackup(){
let data={words:words,stats:stats,version:1,exportedAt:new Date().toISOString()};
let json=JSON.stringify(data);
document.getElementById('backupBox').value=json;
try{
let a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
a.download='wordbook-backup.json';
a.click();
}catch(e){}
showToast('백업을 내보냈어요! 💾');
}
function restoreBackup(){
let raw=document.getElementById('backupBox').value.trim();
if(!raw) return alert('복원할 백업 데이터를 붙여넣어 주세요');
let data;
try{data=JSON.parse(raw);}catch(e){return alert('백업 데이터 형식이 올바르지 않습니다');}
if(!data||!Array.isArray(data.words)) return alert('백업 데이터에 단어가 없습니다');
if(!confirm('현재 단어를 백업 데이터로 덮어쓸까요? (지금 단어는 사라집니다)')) return;
words=data.words.map(w=>({eng:w.eng||'',kor:w.kor||'',wrong:!!w.wrong,mastered:!!w.mastered,lastResult:w.lastResult,wrongResult:w.wrongResult||null}));
if(data.stats&&typeof data.stats==='object'){stats=data.stats;saveStats();}
editIndex=-1;currentIndex=-1;
save();
showToast('백업을 복원했어요! ♻️');
}

function matchQ(w,q){return !q||w.eng.toLowerCase().includes(q)||w.kor.toLowerCase().includes(q);}
function searchVal(id){return (document.getElementById(id)?.value||'').trim().toLowerCase();}

function render(){
let all=document.getElementById('allWordsList');
let q=searchVal('searchBox');
let list=words.map((w,i)=>({w,i})).filter(x=>matchQ(x.w,q));
all.innerHTML='<ul>'+list.map(({w,i})=>{
if(i===editIndex){
return `<li><input id="editEng" value="${w.eng.replace(/"/g,'&quot;')}"><input id="editKor" value="${w.kor.replace(/"/g,'&quot;')}"><span class="btns"><button onclick="saveEdit(${i})">💾</button><button onclick="cancelEdit()">↩️</button></span></li>`;
}
return `<li class="${w.lastResult==='correct'?'result-correct':w.lastResult==='wrong'?'result-wrong':''}"><span>${w.eng} - ${w.kor}</span><span class="btns">
<button onclick="toggleWrongFlag(${i})">${w.wrong?'❌':'⭕'}</button>
<button onclick="toggleMaster(${i})">${w.mastered?'✅':'⬜'}</button>
<button onclick="startEdit(${i})">✏️</button>
<button onclick="markCorrect(${i})">정답</button>
<button onclick="markWrong(${i})">오답</button>
<button onclick="del(${i})">🗑</button></span></li>`;
}).join('')+'</ul>';

let wq=searchVal('wrongSearch');
document.getElementById('wrongsList').innerHTML='<ul>'+words.map((w,i)=>({w,i})).filter(x=>x.w.wrong&&matchQ(x.w,wq)).map(x=>`<li class="${x.w.wrongResult==='correct'?'result-correct':x.w.wrongResult==='wrong'?'result-wrong':''}"><span>${x.w.eng} - ${x.w.kor}</span><span class="btns"><button onclick="wrongNoteCorrect(${x.i})">⭕ 외웠어요</button><button onclick="wrongNoteAgain(${x.i})">❌ 또 틀림</button><button onclick="toggleWrongFlag(${x.i})">🗑</button></span></li>`).join('')+'</ul>';
let mq=searchVal('masteredSearch');
document.getElementById('masteredList').innerHTML='<ul>'+words.map((w,i)=>({w,i})).filter(x=>x.w.mastered&&matchQ(x.w,mq)).map(x=>`<li><span>${x.w.eng} - ${x.w.kor}</span><span class="btns"><button onclick="toggleMaster(${x.i})">↩️ 학습취소</button><button onclick="del(${x.i})">🗑</button></span></li>`).join('')+'</ul>';
let total=words.length;
let mastered=words.filter(w=>w.mastered).length;
let pct=total?Math.round(mastered/total*100):0;
document.getElementById('progressText').innerText=mastered+' / '+total;
document.getElementById('progressPct').innerText=pct+'%';
document.getElementById('progressFill').style.width=pct+'%';
document.getElementById('cntAll').innerText='('+total+')';
document.getElementById('cntWrong').innerText='('+words.filter(w=>w.wrong).length+')';
document.getElementById('cntMastered').innerText='('+mastered+')';
updateStats();
}
render();
ensureBulkRows();
updateDarkBtn();
renderSheetHistory();

// 영어/뜻 입력칸에서 Enter 키로 바로 추가
['eng','kor'].forEach(id=>{
let el=document.getElementById(id);
if(el) el.addEventListener('keydown',e=>{if(e.key==='Enter')addWord();});
});

(function(){
let card=document.getElementById('card');
let sx=0,sy=0;
card.addEventListener('touchstart',e=>{
sx=e.touches[0].clientX; sy=e.touches[0].clientY;
});
card.addEventListener('touchend',e=>{
let dx=e.changedTouches[0].clientX-sx;
let dy=e.changedTouches[0].clientY-sy;
if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){
nextCard();
}
});
})();
</script>
</body>
</html>
