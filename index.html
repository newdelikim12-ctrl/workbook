<title>민복이와 도형이의 영어 단어 연습장</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{box-sizing:border-box}
.ic{width:1.1em;height:1.1em;vertical-align:-.18em;flex-shrink:0}
.ico .ic{width:1em;height:1em;vertical-align:-.12em}
:root{
  --bg-grad-1:#d9d4ca;
  --bg-grad-2:#d3cec3;
  --bg-grad-3:#dad5cb;
  --container-bg:#efece4;
  --text-main:#2e2c27;
  --text-title:#474d63;
  --accent:#56618f;
  --accent-soft:#8b93b8;
  --danger:#b25c68;
  --card-grad-1:#2b303b;
  --card-grad-2:#363d4d;
  --card-grad-3:#41496030;
  --h3-bg:#e6e2d8;
  --h3-bg-hover:#dedad0;
  --li-bg:#e9e5dc;
  --li-bg-hover:#e1ddd3;
  --input-border:#d4cfc3;
  --input-bg:#f4f1ea;
  --muted:#807b6f;
  --progress-track:#ddd8cd;
  --shadow:rgba(62,56,45,.14);
  --shadow-strong:rgba(62,56,45,.2);
  --result-correct-bg:#e3e3e6;
  --result-correct-bg-hover:#dbdbe0;
  --result-wrong-bg:#e8dcd9;
  --result-wrong-bg-hover:#e0d1cd;
}
body.dark{
  --bg-grad-1:#101216;
  --bg-grad-2:#13151a;
  --bg-grad-3:#101216;
  --container-bg:#191c22;
  --text-main:#dfe2e8;
  --text-title:#aeb9e8;
  --accent:#8b9cf2;
  --accent-soft:#5566b8;
  --danger:#d4576a;
  --card-grad-1:#232833;
  --card-grad-2:#2b3140;
  --card-grad-3:#333b4e;
  --h3-bg:#20242c;
  --h3-bg-hover:#282d37;
  --li-bg:#1f232b;
  --li-bg-hover:#272c36;
  --input-border:#333945;
  --input-bg:#1f232b;
  --muted:#8b919e;
  --progress-track:#2a2f39;
  --shadow:rgba(0,0,0,.4);
  --shadow-strong:rgba(0,0,0,.55);
  --result-correct-bg:#232c44;
  --result-correct-bg-hover:#2a3450;
  --result-wrong-bg:#3a2530;
  --result-wrong-bg-hover:#462c39;
}
html,body{touch-action:manipulation}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Malgun Gothic',sans-serif;
  font-size:15px;line-height:1.6;font-weight:500;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  background:linear-gradient(135deg,var(--bg-grad-1) 0%,var(--bg-grad-2) 50%,var(--bg-grad-3) 100%);
  background-attachment:fixed;
  margin:0;padding:24px 16px;min-height:100vh;
  transition:background .4s ease;
}
/* 목록학습·단어장 탭에서만 당겨서 새로고침 억제(학습 탭은 새로고침 허용) */
html.lock-refresh,body.lock-refresh{overscroll-behavior-y:contain}
.container{
  max-width:720px;margin:auto;background:var(--container-bg);padding:32px 28px;
  border-radius:28px;box-shadow:0 18px 50px var(--shadow);
  color:var(--text-main);transition:background .3s ease,color .3s ease;
}
h2{
  text-align:center;color:var(--text-title);margin:0 0 4px;
  font-weight:800;font-size:23px;letter-spacing:-.3px;line-height:1.35;
  word-break:keep-all;
}
h3{
  cursor:pointer;background:var(--h3-bg);padding:14px 18px;border-radius:16px;
  margin:12px 0 0;color:var(--text-title);transition:.2s;user-select:none;
  display:flex;justify-content:space-between;align-items:center;
  font-weight:700;letter-spacing:-.2px;font-size:15px;
}
h3:hover{background:var(--h3-bg-hover);transform:translateY(-1px)}
h3::after{content:'▾';font-size:14px;color:var(--accent-soft);transition:.25s}
h3.open-arrow::after{transform:rotate(180deg)}

.row{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0}
input,textarea{
  padding:12px 14px;border:2px solid var(--input-border);border-radius:14px;
  font-size:15px;outline:none;transition:.2s;
  background:var(--input-bg);color:var(--text-main);
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Malgun Gothic',sans-serif;
}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(82,102,216,.15)}
input[type=text],input:not([type]){flex:1;min-width:120px}

/* 입력창 + 지우기(X) 버튼 래퍼 */
.input-clear{position:relative;flex:1;min-width:120px;display:flex;align-items:center}
.input-clear input{width:100%;flex:1;padding-right:40px}
.clear-x{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:24px;height:24px;padding:0;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  background:var(--input-border);color:var(--text-main);
  font-size:13px;line-height:1;box-shadow:none;cursor:pointer;
  opacity:.55;transition:.15s;
}
.clear-x:hover{opacity:1;background:var(--danger);color:#fff;filter:none;transform:translateY(-50%)}
.clear-x:active{transform:translateY(-50%) scale(.9)}
/* 입력값이 없으면(placeholder 표시중) X 숨김 */
.input-clear input:placeholder-shown + .clear-x{opacity:0;pointer-events:none}
textarea{width:100%;height:92px;resize:vertical;font-family:inherit;line-height:1.5}

button{
  padding:11px 18px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#5b6796,#4c5680);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.18s;
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Malgun Gothic',sans-serif;
  box-shadow:0 4px 12px rgba(76,86,128,.2);
}
button:hover{filter:brightness(1.05);transform:translateY(-2px);box-shadow:0 7px 18px rgba(76,86,128,.22)}
@media (hover:none){button:hover{transform:none;box-shadow:0 4px 12px rgba(76,86,128,.2);filter:none}}
button:active{transform:translateY(0);box-shadow:0 3px 8px rgba(76,86,128,.2)}
button.danger{background:linear-gradient(135deg,#a85f6b,#92505c);box-shadow:0 4px 12px rgba(146,80,92,.22)}
button.danger:hover{box-shadow:0 7px 18px rgba(146,80,92,.28)}
button.small{padding:8px 12px;font-size:13px;border-radius:11px}

input[type=file]{
  flex:1;min-width:160px;padding:9px;background:var(--input-bg);border:2px dashed var(--accent-soft);
  color:var(--text-main);border-radius:14px;
}
input[type=file]::file-selector-button{
  padding:8px 13px;border:none;border-radius:11px;background:var(--accent);
  color:#fff;font-weight:700;cursor:pointer;margin-right:8px;
}

.section-content{display:none;animation:fadeIn .25s ease}
.section-content.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.flashcard{
  margin-top:18px;
  min-height:280px;
  cursor:pointer;
  background:linear-gradient(150deg,#232833 0%,#2b3140 55%,#3a4258 100%);
  border-radius:24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:42px;
  text-align:center;
  color:#fff;
  box-shadow:0 18px 44px rgba(20,24,32,.45);
  transition:.25s cubic-bezier(.2,.8,.3,1);
  position:relative;
  overflow:hidden;
}
#cardDirBtn{
  position:absolute;top:10px;right:10px;z-index:2;
  display:inline-flex;align-items:center;gap:3px;
  padding:5px 10px;border:none;border-radius:999px;
  background:rgba(255,255,255,.22);color:#fff;
  font-size:11px;font-weight:700;letter-spacing:.02em;
  box-shadow:none;cursor:pointer;backdrop-filter:blur(2px);
  transition:.15s;
}
#cardDirBtn:hover{background:rgba(255,255,255,.34);filter:none;transform:none}
#cardDirBtn:active{transform:scale(.92)}
#cardDirBtn .lbl{font-size:11px}
.flashcard:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 18px 40px rgba(34,38,46,.4)}
#front{font-size:35px;font-weight:700;font-family:'Pretendard Variable',Pretendard,-apple-system,'Malgun Gothic',sans-serif;white-space:normal;overflow-wrap:break-word;word-break:keep-all;width:100%;text-align:center;position:relative;line-height:1.25;letter-spacing:.2px}
@media (max-width:480px){
#front{font-size:clamp(24px,7.5vw,35px)}
}
#back{
  font-size:20px;
  color:#fff3c4;
  margin-top:14px;
  display:none;
  font-weight:600;
  position:relative;
  text-align:center;
  width:100%;
  overflow-wrap:break-word;
  word-break:keep-all;
  line-height:1.3;
}
.flashcard.revealed #back{display:block;animation:fadeIn .3s ease}
.hint{font-size:13px;opacity:.85;margin-top:10px;position:relative}

.modes{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.modes button{flex:1;min-width:90px;background:var(--h3-bg);color:var(--text-main);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px 8px;line-height:1.1;box-shadow:0 3px 10px var(--shadow)}
.modes button:hover{background:var(--h3-bg-hover);filter:none}
.modes .ico{font-size:26px}
.modes .lbl{font-size:14px;font-weight:700}

.progress-wrap{margin:18px 0;padding:16px;background:var(--h3-bg);border-radius:18px}
.progress-label{text-align:center;color:var(--muted);font-size:15px;margin-bottom:8px}
.progress-label b{color:var(--text-title)}
.progress-bar{
  width:100%;height:14px;border-radius:8px;background:var(--progress-track);overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.06);
}
.progress-fill{
  height:100%;border-radius:8px;
  background:linear-gradient(90deg,#5b6796,#7f8ab5);
  width:0%;transition:width .45s cubic-bezier(.2,.8,.3,1);
}

ul{list-style:none;margin:10px 0;padding:0}
li{
  margin:8px 0;background:var(--li-bg);padding:13px 15px;border-radius:14px;
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  font-size:14px;font-weight:600;line-height:1.5;transition:.15s;
}
li>span:first-child{overflow-wrap:break-word;word-break:keep-all;min-width:0;flex:1}
li:hover{background:var(--li-bg-hover);transform:translateX(2px)}
li.result-correct{background:var(--result-correct-bg);border-left:4px solid var(--accent)}
li.result-correct:hover{background:var(--result-correct-bg-hover)}
li.result-wrong{background:var(--result-wrong-bg);border-left:4px solid var(--danger)}
li.result-wrong:hover{background:var(--result-wrong-bg-hover)}
li span:first-child{flex:1}
li .btns{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
li button{padding:6px 9px;font-size:13px;border-radius:10px;background:var(--h3-bg);color:var(--text-main);box-shadow:none;font-weight:600}
li button:hover{background:var(--h3-bg-hover);filter:none;transform:none}

.cnt{font-size:13px;color:var(--accent-soft);font-weight:400}
li input{flex:1;min-width:90px;font-size:14px}
#backupBox{height:92px;font-size:12px}

/* 통일된 단어 행 카드 스타일 (전체단어/오답노트/학습완료) */
.wl-row{margin:8px 0;background:var(--li-bg);border:1.5px solid var(--input-border);border-radius:16px;padding:13px 13px;transition:.15s}
.wl-row:hover{background:var(--li-bg);transform:none}
.wl-row.result-correct{background:var(--result-correct-bg);border-color:var(--accent)}
.wl-row.result-wrong{background:var(--result-wrong-bg);border-color:var(--danger)}
.wl-row .wl-top{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700;color:var(--text-main)}
.wl-row .wl-num{width:40px;height:26px;flex:0 0 40px;display:inline-flex;align-items:center;justify-content:center;border-radius:9px;background:rgba(82,102,216,.12);color:var(--accent);font-size:12px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.wl-row .wl-eng{flex:1 1 auto;min-width:0;text-align:left;word-break:break-word;color:var(--text-main)}
.wl-row .wl-kor{flex:0 0 auto;max-width:46%;text-align:right;font-weight:600;color:var(--text-main);word-break:keep-all}
.wl-row .speakable{color:var(--text-main);border-bottom-color:rgba(76,86,128,.25)}
/* 뜻 가리기(전역 toggleMeaning)가 메인 목록 뜻에도 적용되도록 */
body.hide-mean .wl-kor:not(.peek){background:rgba(82,102,216,.08);filter:blur(7px);cursor:pointer;user-select:none;border-radius:6px;padding:0 6px;display:inline-block;width:76px;max-width:76px;flex:0 0 76px;overflow:hidden;white-space:nowrap}
body.hide-mean .wl-kor.peek{filter:none;background:transparent;padding:0}

@media (max-width:480px){
  .container{padding:24px 18px;border-radius:22px}
  li{font-size:14px}
}

/* 모바일 세로 공간 압축 */
@media (max-width:480px){
  body{padding:10px 10px}
  .container{padding:14px 14px}
  h2{font-size:22px;margin-bottom:2px}
  .flashcard{margin-top:10px;min-height:210px;padding:28px 26px;border-radius:20px}
  #front{font-size:clamp(24px,7vw,32px)}
  #back{font-size:19px;margin-top:10px}
  .hint{font-size:12px;margin-top:6px}
  #cardActions{margin-top:6px}
  #cardActions button{padding:11px 10px;font-size:14px}
  #quizPanel{margin-top:8px}
  .quiz-q-head{margin-bottom:6px;gap:6px}
  .quiz-q-tag{font-size:13px}
  .quiz-opts{gap:4px}
  .quiz-opt{padding:7px 10px;border-radius:10px;font-size:13px;gap:8px}
  .quiz-opt .num{width:22px;height:22px;font-size:12px}
  .quiz-dunno{margin-top:4px;padding:7px 10px;font-size:13px;border-radius:12px}
  #quizAfter{margin-top:8px}
  .quiz-toggle-row{margin-top:8px;gap:6px}
  .quiz-toggle-row .label{font-size:13px}
  .quiz-modes{gap:4px}
  .qmode{padding:7px 4px;font-size:12px;border-radius:11px}
  .modes{margin-top:8px;gap:8px}
  .modes button{padding:10px 6px;gap:4px}
  .modes .ico{font-size:20px}
  .modes .lbl{font-size:13px}
  .progress-wrap{margin:10px 0;padding:10px 14px}
  .progress-label{font-size:13px;margin-bottom:6px}
  .progress-bar{height:10px}
}

#allWordsList,#wrongsList,#masteredList,#dupesList{
  max-height:360px;overflow-y:auto;margin-top:6px;
  border:1.5px solid var(--input-border);border-radius:14px;padding:4px 6px;
  scrollbar-width:thin;scrollbar-color:var(--accent-soft) transparent;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
}
/* 한글 뜻 가리기 토글 */
.kor-mean{transition:filter .15s,opacity .15s;border-radius:5px;padding:0 2px}
/* 목록의 영어 단어 탭하면 발음 */
.speakable{
  cursor:pointer;border-bottom:1.5px dotted var(--accent-soft);
  padding-bottom:1px;transition:.15s;
}
.speakable:hover{border-bottom-color:var(--accent);color:var(--accent)}
/* 플래시카드(그라디언트 카드)에서는 흰색 밑줄 유지 */
.flashcard .speakable{border-bottom-color:rgba(255,255,255,.45)}
.flashcard .speakable:hover{border-bottom-color:#fff;color:#aee9ff}
.speakable:active{opacity:.6}
.speakable::after{content:'🔊';font-size:11px;margin-left:4px;opacity:.65;vertical-align:middle}
.list-scroll-btns{display:flex;gap:6px;margin-top:6px}
.list-scroll-btns button{flex:1;padding:5px;font-size:13px;background:var(--h3-bg);color:var(--muted);box-shadow:none;border-radius:10px;border:1.5px solid var(--input-border)}
#dupesList li{
  margin:5px 0;padding:8px 10px;font-size:13px;border-radius:10px;
}
#dupesList li span:first-child{font-size:13px}
#wrongsList li button,#masteredList li button,#dupesList li button{padding:5px 8px;font-size:12px}
.fold-btn{
  display:block;width:100%;margin-top:10px;padding:7px 0;
  background:none;border:1.5px solid var(--input-border);border-radius:12px;
  color:var(--muted);font-size:13px;font-weight:600;letter-spacing:.5px;
  box-shadow:none;cursor:pointer;transition:.15s;
}
.fold-btn:hover{background:var(--li-bg-hover);color:var(--text-main);transform:none;filter:none;box-shadow:none}
#allWordsList::-webkit-scrollbar,#wrongsList::-webkit-scrollbar,
#masteredList::-webkit-scrollbar,#dupesList::-webkit-scrollbar{width:5px}
#allWordsList::-webkit-scrollbar-thumb,#wrongsList::-webkit-scrollbar-thumb,
#masteredList::-webkit-scrollbar-thumb,#dupesList::-webkit-scrollbar-thumb{
  background:var(--accent-soft);border-radius:4px}
.toast{
  position:fixed;left:50%;bottom:30px;
  transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,#22262e,#2e3440);color:#fff;padding:12px 22px;border-radius:26px;
  font-weight:700;font-size:14px;letter-spacing:-.1px;
  opacity:0;pointer-events:none;z-index:9999;
  transition:opacity .25s ease,transform .25s ease;
  box-shadow:0 10px 28px rgba(0,0,0,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confetti{position:fixed;top:-30px;pointer-events:none;z-index:9998;will-change:transform}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.15}}

/* ===== 객관식 퀴즈 모드 ===== */
.quiz-toggle-row{
  display:flex;justify-content:center;align-items:center;gap:10px;
  margin-top:16px;flex-wrap:wrap;
}
.quiz-toggle-row .label{
  font-weight:800;color:var(--text-title);font-size:14px;letter-spacing:-.1px;
}
.quiz-modes{display:flex;gap:6px;width:100%;max-width:430px;margin:0 auto}
.qmode{
  flex:1;border:none;cursor:pointer;border-radius:14px;padding:9px 4px;
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Malgun Gothic',sans-serif;font-weight:700;font-size:13px;
  color:#fff;transition:.18s;box-shadow:0 3px 10px var(--shadow);white-space:nowrap;
  background:linear-gradient(135deg,#b8bdcc,#9aa0b0);
}
.qmode.on{background:linear-gradient(135deg,#5f8f7f,#4d766a);box-shadow:0 4px 12px rgba(77,118,106,.3)}
.qmode:hover{filter:brightness(1.05);transform:translateY(-1px)}
.qmode:active{transform:translateY(0)}

#quizPanel{margin-top:16px;animation:fadeIn .25s ease}
.quiz-q-tag{
  text-align:center;color:var(--muted);font-size:14px;margin-bottom:0;
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Malgun Gothic',sans-serif;font-weight:700;
}
.quiz-opts{display:flex;flex-direction:column;gap:10px}
.quiz-opt{
  width:100%;text-align:left;display:flex;align-items:center;gap:12px;
  padding:15px 16px;border:2px solid var(--input-border);border-radius:16px;
  background:var(--li-bg);color:var(--text-main);
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Malgun Gothic',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:.15s;box-shadow:0 3px 10px var(--shadow);line-height:1.35;
}
.quiz-opt .num{
  flex:0 0 auto;width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--h3-bg);color:var(--text-title);font-weight:800;font-size:14px;
}
.quiz-opt .txt{flex:1;min-width:0;overflow-wrap:break-word;word-break:keep-all}
.quiz-opt:hover:not(:disabled){background:var(--li-bg-hover);transform:translateY(-2px);box-shadow:0 6px 16px var(--shadow-strong)}
.quiz-opt:disabled{cursor:default}
.quiz-opt.correct{
  background:linear-gradient(135deg,#5f8f7f,#4d766a);color:#fff;border-color:transparent;
  box-shadow:0 6px 18px rgba(62,180,137,.4);
}
.quiz-opt.correct .num{background:rgba(255,255,255,.25);color:#fff}
.quiz-opt.wrong{
  background:linear-gradient(135deg,#a85f6b,#92505c);color:#fff;border-color:transparent;
  box-shadow:0 6px 18px rgba(146,80,92,.28);
}
.quiz-opt.wrong .num{background:rgba(255,255,255,.25);color:#fff}
.quiz-opt.dim{opacity:.45}
#quizAfter{display:none;margin-top:14px;justify-content:center;gap:10px;flex-wrap:wrap}
.quiz-q-head{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.quiz-speak-inline{
  padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Malgun Gothic',sans-serif;
  background:var(--h3-bg);color:var(--text-title);box-shadow:0 3px 10px var(--shadow);
}
.quiz-speak-inline:hover{background:var(--h3-bg-hover);filter:none}
.quiz-dunno{
  width:100%;margin-top:12px;padding:13px 16px;border-radius:16px;
  border:2px dashed var(--input-border);background:transparent;color:var(--muted);
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Malgun Gothic',sans-serif;font-size:15px;font-weight:700;
  box-shadow:none;cursor:pointer;transition:.15s;
}
.quiz-dunno:hover{background:var(--li-bg);color:var(--text-main);transform:translateY(-1px);box-shadow:none;filter:none}
.quiz-dunno:disabled{opacity:.45;cursor:default}
/* Bottom tab bar */
#tabBar{
  display:flex;align-items:stretch;
  background:var(--container-bg);
  border:1.5px solid var(--input-border);
  border-radius:18px;
  margin:18px 16px 24px;
  overflow:hidden;
}
.tab-btn{
  flex:1;min-width:0;display:flex;flex-direction:row;align-items:center;justify-content:center;
  gap:6px;padding:13px 4px;
  background:none;border:none;border-radius:0;box-shadow:none;
  font-size:14px;color:var(--muted);font-weight:600;cursor:pointer;white-space:nowrap;
  transition:background .15s,color .15s;
}
.tab-btn .ico{font-size:18px;line-height:1}
.tab-btn:active{filter:none}
.tab-active{color:var(--accent)!important;background:color-mix(in srgb,var(--accent) 10%,transparent)}
#tabBar .tab-divider{
  width:1.5px;background:var(--input-border);align-self:stretch;
}
/* 학습 탭 상단 단어장 선택 바 */
#recentDecksBar,#lsDeckBar{scrollbar-width:none;-webkit-overflow-scrolling:touch}
#recentDecksBar::-webkit-scrollbar,#lsDeckBar::-webkit-scrollbar{display:none}
.deckbar-chip{flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:999px;border:1.5px solid var(--input-border);background:var(--li-bg);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;box-shadow:none;white-space:nowrap;transition:background .15s,color .15s}
.deckbar-chip:hover{background:var(--li-bg-hover);filter:none;transform:none;box-shadow:none}
.deckbar-chip.on{background:linear-gradient(135deg,#5b6796,#4c5680);color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(76,86,128,.25)}
/* Deck panel cards */
.deck-card{
  background:var(--li-bg);border:1.5px solid var(--input-border);
  border-radius:18px;padding:18px 16px;margin-bottom:12px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .18s;
  touch-action:pan-y; /* 평소엔 세로 스크롤 허용(드래그 중에만 JS로 스크롤 차단) */
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
}
.deck-card *{ -webkit-user-select:none;user-select:none;-webkit-touch-callout:none; }
.deck-card:active{transform:scale(.98)}
.deck-card.deck-dragging{touch-action:none;opacity:.97;box-shadow:0 16px 36px rgba(76,86,128,.3);border-color:var(--accent);position:relative;z-index:10;cursor:grabbing;transition:none}
.deck-active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(82,102,216,.18)}
.deck-card-header{display:flex;align-items:center;justify-content:space-between;gap:8px}
.deck-name{font-size:16px;font-weight:700;color:var(--text-title);font-weight:800;display:flex;align-items:center;min-width:0}
.deck-grip{color:var(--accent);font-size:20px;margin-right:10px;flex-shrink:0;opacity:1}
.deck-meta{font-size:13px;color:var(--muted);margin-top:4px}
.deck-badge{margin-top:8px;font-size:12px;color:var(--accent);font-weight:700}
.deck-actions{display:flex;gap:4px}
/* Add bottom padding to study view so content isn't hidden behind tab bar */
.container{padding-bottom:16px}
/* ===== 목록학습 페이지 ===== */
#listStudyView{max-width:720px;margin:18px auto 0;background:var(--container-bg);border-radius:28px;box-shadow:0 18px 50px var(--shadow);color:var(--text-main)}
#lsHeader{background:var(--container-bg);border-bottom:1.5px solid var(--input-border);border-radius:28px 28px 0 0;padding:16px 18px;display:flex;flex-direction:column;gap:10px}
#lsHeader .ls-title{display:flex;align-items:center;justify-content:space-between;gap:10px}
#lsHeader .ls-deckname{font-weight:800;font-size:17px;color:var(--text-title);display:flex;align-items:center;gap:6px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#lsHeader .ls-prog{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap}
#lsList{padding:8px 16px 22px}
#lsList ul{list-style:none;margin:0;padding:0}
.ls-row{margin:10px 0;background:var(--li-bg);border:1.5px solid var(--input-border);border-radius:16px;transition:.15s}
/* 단어 탭 시 텍스트 선택 팝업(복사/웹검색) 방지 */
.ls-row,.ls-row *,.wl-row,.wl-row *{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.ls-row input,.wl-row input{-webkit-user-select:text;user-select:text}
.ls-row:hover{transform:none;background:var(--li-bg)}
.ls-row.result-correct{border-color:var(--accent)}
.ls-row.result-wrong{border-color:var(--danger)}
.ls-row .speakable{color:var(--text-main)}
.ls-row .ls-top{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;flex:none}
.ls-row .ls-num{width:40px;height:26px;flex:0 0 40px;display:inline-flex;align-items:center;justify-content:center;border-radius:9px;background:rgba(82,102,216,.12);color:var(--accent);font-size:12px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.ls-row .ls-eng{flex:1 1 auto;min-width:0;text-align:left;word-break:break-word}
.ls-row .kor-mean{flex:0 0 auto;max-width:46%;text-align:right;font-weight:600;word-break:keep-all}
/* 목록학습의 뜻은 전역 body.hide-mean이 아니라 로컬 ls-hideMean만 따르도록 분리 */
#lsList .kor-mean{filter:none;background:transparent;padding:0}
#lsList.ls-hideMean .kor-mean:not(.peek){background:rgba(82,102,216,.07);filter:blur(7px);cursor:pointer;user-select:none;border-radius:6px;padding:0 6px;display:inline-block;width:76px;max-width:76px;flex:0 0 76px;overflow:hidden;white-space:nowrap}
#lsList.ls-hideMean .kor-mean.peek{filter:none;background:transparent}
.ls-chips{display:flex;gap:6px}
.ls-chip{flex:1;min-width:0;padding:8px 4px;border-radius:12px;border:1.5px solid var(--input-border);background:var(--li-bg);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;text-align:center;white-space:nowrap;box-shadow:none;line-height:1.3}
.ls-chip:hover{filter:none;transform:none;box-shadow:none;background:var(--li-bg-hover)}
.ls-chip.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 13%,transparent);color:var(--accent)}
.ls-chip .ls-c{display:block;font-size:14px;font-weight:800}
.ls-jump{display:flex;gap:6px;justify-content:safe center;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.ls-jump::-webkit-scrollbar{display:none}
.ls-jump button{flex:0 0 auto;padding:6px 12px;border-radius:999px;border:1.5px solid var(--input-border);background:var(--li-bg);color:var(--muted);font-size:12px;font-weight:800;cursor:pointer;box-shadow:none;line-height:1}
.ls-jump button:hover{filter:none;transform:none;box-shadow:none;background:var(--li-bg-hover)}
.ls-jump button.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 13%,transparent);color:var(--accent)}
.ls-bulk{display:flex;gap:6px;flex-wrap:wrap}
.ls-bulk button{flex:1 1 30%;min-width:0;padding:8px 4px;font-size:12px;white-space:nowrap;box-shadow:none}
.ls-empty{text-align:center;color:var(--muted);padding:48px 16px;font-size:15px;line-height:1.7}
/* 통합 검색 결과 */
#gSearchResults{margin-top:6px;border:1.5px solid var(--input-border);border-radius:14px;max-height:280px;overflow-y:auto;background:var(--li-bg);padding:4px 6px}
.gs-row{display:flex;align-items:center;gap:8px;padding:9px 8px;border-bottom:1px solid var(--input-border);font-size:14px}
.gs-row:last-child{border-bottom:none}
.gs-eng{font-weight:700;color:var(--text-main)}
.gs-kor{color:var(--muted);font-weight:600;margin-left:auto;text-align:right;flex-shrink:0;max-width:45%}
.gs-deck{flex-shrink:0;font-size:11px;font-weight:700;color:var(--accent);background:rgba(82,102,216,.10);border-radius:999px;padding:2px 8px;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis}
.gs-none{color:var(--muted);font-size:13px;padding:10px;text-align:center}
.dict-card{margin:6px;padding:12px 14px;border:1.5px solid var(--input-border);border-radius:12px;background:var(--container-bg)}
.gs-links{display:flex;gap:6px;padding:4px 6px 6px}
.gs-links a{flex:1;text-align:center;font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;padding:7px 4px;border:1.5px solid var(--input-border);border-radius:10px;background:var(--container-bg);white-space:nowrap}
.gs-links a:active{background:var(--h3-bg)}
.ls-scrolltop,.ls-scrollbottom{position:fixed;right:10px;z-index:50;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#5b6796,#4c5680);color:#fff;border:none;font-size:13px;box-shadow:0 3px 10px rgba(76,86,128,.22);cursor:pointer;display:none;padding:0;opacity:.85}
.ls-scrolltop{bottom:52px}
.ls-scrollbottom{bottom:12px}
.ls-scrolltop.show,.ls-scrollbottom.show{display:block}
.ls-searchfab{position:fixed;left:10px;bottom:12px;z-index:50;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#5b6796,#4c5680);color:#fff;border:none;box-shadow:0 3px 10px rgba(76,86,128,.22);cursor:pointer;display:none;padding:0;opacity:.85;align-items:center;justify-content:center}
.ls-searchfab.show{display:flex}
.ls-searchfab svg{width:16px;height:16px}
#lsSearchPanel{position:fixed;left:8px;right:8px;bottom:8px;z-index:60;background:var(--card-bg,var(--li-bg));border:1.5px solid var(--input-border);border-radius:16px;padding:10px;box-shadow:0 -6px 24px rgba(0,0,0,.18)}
#lsSearchResults{margin-top:6px;max-height:40vh;overflow-y:auto;border:1.5px solid var(--input-border);border-radius:12px;background:var(--li-bg);padding:4px 6px}

#updateBanner{position:fixed;left:50%;top:14px;transform:translateX(-50%) translateY(-80px);z-index:9999;
  padding:11px 20px;border-radius:999px;border:none;cursor:pointer;

  font-size:14px;font-weight:700;letter-spacing:.01em;white-space:nowrap;

</head>
<body>
<div id="studyView">
<div class="container">
<div class="row" style="justify-content:flex-end;margin-bottom:14px">
<button class="small" onclick="toggleSound()" id="soundBtn">소리 켜짐</button>
<button class="small" onclick="toggleDark()" id="darkBtn">다크모드</button>
</div>
<h2>민복이와 도형이의 영어 단어 연습장</h2>
<div id="recentDecksBar" style="display:flex;flex-wrap:nowrap;gap:8px;margin-top:8px;margin-bottom:2px;min-height:36px;overflow-x:auto;padding:3px 2px 6px;scroll-behavior:smooth"></div>

<div class="row">
<div class="input-clear">
<input type="text" id="sheetUrl" placeholder="구글 시트 공유 링크를 붙여넣으세요">
<button class="clear-x" onclick="clearInput('sheetUrl')" aria-label="지우기">✕</button>
</div>
</div>
<div class="row" style="flex-wrap:nowrap">
<button style="flex:1;min-width:0;padding:11px 6px;font-size:13px;white-space:nowrap;letter-spacing:-.3px" onclick="loadSheetTabs()">📑 시트 목록 불러오기</button>
<button class="danger" style="flex:1;min-width:0;padding:11px 6px;font-size:13px;white-space:nowrap;letter-spacing:-.3px" onclick="clearAll()">🗑 전체 초기화</button>
</div>
<div id="sheetTabs" style="margin-top:8px"></div>

<div style="margin-top:10px">
<div class="input-clear">
<input type="text" id="gSearch" placeholder="🔍 모든 단어장에서 검색" oninput="renderGlobalSearch()" autocomplete="off">
<button class="clear-x" onclick="clearInput('gSearch');renderGlobalSearch()" aria-label="지우기">✕</button>
</div>
<div id="gSearchResults" style="display:none"></div>
</div>
<div id="rangeWrap" style="display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:nowrap;overflow:hidden">
<span style="color:var(--muted);font-size:12px;white-space:nowrap;flex-shrink:0">범위</span>
<input type="number" id="rangeFrom" min="1" placeholder="처음" style="width:0;flex:1;min-width:0;padding:6px 6px;font-size:13px" onkeydown="if(event.key==='Enter')applyRange()">
<span style="color:var(--muted);font-size:12px;flex-shrink:0">~</span>
<input type="number" id="rangeTo" min="1" placeholder="끝" style="width:0;flex:1;min-width:0;padding:6px 6px;font-size:13px" onkeydown="if(event.key==='Enter')applyRange()">
<button class="small" onclick="applyRange()" style="flex-shrink:0;padding:7px 10px">적용</button>
<button class="small" onclick="clearRange()" style="flex-shrink:0;padding:7px 10px">전체</button>
<span id="rangeCnt" style="color:var(--muted);font-size:12px;flex-shrink:0"></span>
</div>
<div style="display:flex;align-items:center;gap:5px;margin-top:5px">
<button class="small" onclick="rangeStep(-1)" style="flex:1;padding:6px 4px;font-size:12px;box-shadow:none">◀ 이전</button>
<span id="rangeStepLabel" onclick="cycleRangeStep()" style="flex:2;text-align:center;font-size:12px;color:var(--muted);white-space:nowrap;cursor:pointer;user-select:none">단위 20</span>
<button class="small" onclick="rangeStep(1)" style="flex:1;padding:6px 4px;font-size:12px;box-shadow:none">다음 ▶</button>
</div>

<div class="modes">
<button onclick="randomMode('all')"><span class="ico"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg></span><span class="lbl">랜덤 단어</span></button>
<button onclick="randomMode('wrong')"><span class="ico"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></span><span class="lbl">오답노트</span></button>
<button onclick="toggleBothMode()" id="bothModeBtn"><span class="ico"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span><span class="lbl">영+한 보기</span></button>
</div>

<div class="flashcard" id="card" onclick="cardClick()">
<button id="cardDirBtn" onclick="event.stopPropagation();toggleCardDir()" title="영어/한글 먼저 보기 전환"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> <span class="lbl">영→한</span></button>
<div id="front">단어를 선택하세요</div>
<div id="back">뜻</div>
<div id="cardExample" style="display:none;margin-top:10px;font-size:13px;font-style:italic;color:rgba(255,255,255,.65);line-height:1.5;text-align:center"></div>
<div class="hint" id="cardHint">카드를 클릭하면 뜻이 표시됩니다</div>
</div>
<div id="cardActions" style="display:none;gap:8px;margin-top:10px;flex-wrap:nowrap;align-items:stretch">
<div id="cardSpeakBtn" onclick="event.stopPropagation()" style="flex:1;min-width:0;display:flex;border-radius:12px;overflow:hidden;border:1.5px solid var(--input-border);box-sizing:border-box">
  <button onclick="speakWord('eng')" id="speakSegEng" style="flex:1;padding:10px 4px;font-size:13px;border-radius:0;box-shadow:none;border:none;white-space:nowrap">🔊 영</button>
  <button onclick="speakWord('both')" id="speakSegBoth" style="flex:1;padding:10px 4px;font-size:13px;border-radius:0;box-shadow:none;border:none;border-left:1.5px solid var(--input-border);white-space:nowrap">한</button>
</div>
<button onclick="event.stopPropagation();toggleWrongFlag(currentIndex);showCardActions()" id="cardWrongBtn" style="flex:1;min-width:0;padding:10px 4px;font-size:13px;white-space:nowrap;display:flex;align-items:center;justify-content:center">❌ 오답등록</button>
<button onclick="event.stopPropagation();nextCard()" id="cardNextBtn" style="flex:1;min-width:0;padding:10px 4px;font-size:13px;white-space:nowrap;display:flex;align-items:center;justify-content:center">➡️ 다음 단어</button>
</div>
<div id="autoPlayBar" style="display:none;margin-top:8px;align-items:center;justify-content:center;gap:6px;flex-wrap:nowrap;overflow:hidden;box-sizing:border-box;width:100%">
<button id="autoSpeakBtn" onclick="event.stopPropagation();toggleAutoSpeak()" style="flex:1;padding:7px 4px;font-size:12px;white-space:nowrap;box-shadow:none;background:var(--h3-bg);color:var(--text-main)">자동읽기</button>
<button id="autoPlayBtn" onclick="event.stopPropagation();toggleAutoPlay()" style="flex:1;padding:7px 4px;font-size:12px;white-space:nowrap;box-shadow:none;background:var(--h3-bg);color:var(--text-main)">▶ 자동재생</button>
<div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
<span style="font-size:12px;color:var(--muted);white-space:nowrap">간격</span>
<select id="autoPlaySpeed" onchange="event.stopPropagation();setAutoPlaySpeed(this.value)" style="padding:5px 4px;font-size:12px;border-radius:10px;border:1.5px solid var(--input-border);background:var(--input-bg);color:var(--text-main);cursor:pointer;max-width:60px">
<option value="1">1초</option>
<option value="2">2초</option>
<option value="3" selected>3초</option>
<option value="4">4초</option>
<option value="5">5초</option>
<option value="6">6초</option>
<option value="7">7초</option>
<option value="8">8초</option>
<option value="9">9초</option>
<option value="10">10초</option>
</select>
</div>
</div>

<div id="quizPanel" style="display:none">
<div class="quiz-q-head">
<span class="quiz-q-tag" id="quizTag">알맞은 뜻을 골라보세요</span>
<button class="quiz-speak-inline" id="quizSpeakInline" onclick="speakWord()">🔊 발음</button>
</div>
<div class="quiz-opts" id="quizOpts"></div>
<button class="quiz-dunno" id="quizDunnoBtn" onclick="quizDontKnow()">🤔 모르겠어요 (오답노트에 담기)</button>
<div class="row" id="quizAfter">
<button id="quizSpeakBtn" onclick="speakWord()">🔊 발음 듣기</button>
<button id="quizNextBtn" onclick="nextQuiz()">➡️ 다음</button>
</div>
</div>

<div id="drawBoard" style="margin-top:12px;border-radius:18px;overflow:hidden;position:relative;display:none">
<canvas id="drawCanvas" style="display:block;width:100%;touch-action:none;background:#15171c;border-radius:18px;cursor:crosshair"></canvas>
<div style="position:absolute;top:8px;right:8px;display:flex;gap:6px">
<button onclick="event.stopPropagation();clearCanvas()" style="padding:5px 12px;font-size:12px;background:rgba(255,255,255,.15);color:#fff;box-shadow:none;border-radius:10px"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7l-4-4a1 1 0 0 1 0-1.4l9.6-9.6a1 1 0 0 1 1.4 0l6 6a1 1 0 0 1 0 1.4L13 19"/><line x1="6" y1="12" x2="12" y2="18"/></svg> 지우기</button>
</div>
</div>
<button onclick="toggleDrawBoard()" id="drawBoardBtn" style="width:100%;margin-top:8px;padding:8px;font-size:13px;background:var(--h3-bg);color:var(--text-main);box-shadow:none;border-radius:12px;border:1.5px solid var(--input-border)"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg> 칠판 열기</button>

<div class="progress-wrap">
<div class="progress-label" style="position:relative;display:flex;justify-content:center;align-items:center"><span style="display:inline-block;padding:0 56px"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> 학습 진도율: <b id="progressText">0 / 0</b> (<span id="progressPct">0%</span>)</span><button onclick="resetProgress()" class="small" style="box-shadow:none;padding:4px 16px;position:absolute;right:0;top:50%;transform:translateY(-50%)">리셋</button></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-label" style="margin-top:12px;position:relative;display:flex;justify-content:center;align-items:center"><span style="display:inline-block;padding:0 56px"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> 오답 학습률: <b id="wrongProgressText">0 / 0</b> (<span id="wrongProgressPct">0%</span>)</span><button onclick="resetWrongProgress()" class="small" style="box-shadow:none;padding:4px 16px;position:absolute;right:0;top:50%;transform:translateY(-50%)">리셋</button></div>
<div class="progress-bar"><div class="progress-fill" id="wrongProgressFill" style="background:linear-gradient(90deg,#a85f6b,#c08a80)"></div></div>
</div>

<div class="quiz-toggle-row">
<span class="label">🧩 객관식 퀴즈 모드</span>
<div class="quiz-modes">
<button class="qmode" data-m="off" onclick="setQuizMode('off')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> 카드</button>
<button class="qmode" data-m="e2k" onclick="setQuizMode('e2k')">영어</button>
<button class="qmode" data-m="k2e" onclick="setQuizMode('k2e')">한글</button>
<button class="qmode" data-m="random" onclick="setQuizMode('random')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg> 랜덤</button>
</div>
</div>

<h3 onclick="toggle('allWords',this)"><span><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> 전체 단어 <b id="cntAll" class="cnt"></b></span></h3>
<div id="allWords" class="section-content">
<div class="row" style="margin-top:10px">
<button class="small" style="flex:1;min-width:120px" onclick="bulkMaster(true)">✅ 전부 학습 완료</button>
<button class="small" style="flex:1;min-width:120px" onclick="bulkMaster(false)">⬜ 전부 학습 취소</button>
</div>
<div class="row" style="margin-top:8px">
<div class="input-clear">
<input type="text" id="searchBox" placeholder="🔍 단어 또는 뜻 검색" oninput="render()">
<button class="clear-x" onclick="clearInput('searchBox',true)" aria-label="지우기">✕</button>
</div>
<button class="danger small" onclick="clearAllWords()">🗑 전체 삭제</button>
</div>
<div class="row" style="margin-top:8px"><button class="small mean-toggle" style="flex:1" onclick="toggleMeaning()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg> 뜻 가리기</button></div>
<div id="allWordsList"></div>
<div class="list-scroll-btns">
  <button onclick="document.getElementById('allWordsList').scrollBy({top:-200,behavior:'smooth'})">▲ 위</button>
  <button onclick="document.getElementById('allWordsList').scrollBy({top:200,behavior:'smooth'})">▼ 아래</button>
</div>
<button class="fold-btn" onclick="closeSection('allWords')">∧ 접기</button>
</div>

<h3 onclick="toggle('wrongs',this)"><span><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> 오답노트 <b id="cntWrong" class="cnt"></b></span></h3>
<div id="wrongs" class="section-content">
<div class="row" style="margin-top:10px">
<button class="small" style="flex:1;min-width:120px" onclick="bulkWrong('correct')">⭕ 전부 외웠어요</button>
<button class="small" style="flex:1;min-width:120px" onclick="bulkWrong('wrong')">❌ 전부 재도전</button>
</div>
<div class="row" style="margin-top:8px">
<div class="input-clear">
<input type="text" id="wrongSearch" placeholder="🔍 오답노트 검색" oninput="render()">
<button class="clear-x" onclick="clearInput('wrongSearch',true)" aria-label="지우기">✕</button>
</div>
<button class="danger small" onclick="clearWrongs()">🗑 전체 삭제</button>
</div>
<div class="row" style="margin-top:8px"><button class="small mean-toggle" style="flex:1" onclick="toggleMeaning()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg> 뜻 가리기</button></div>
<div id="wrongsList"></div>
<div class="list-scroll-btns">
  <button onclick="document.getElementById('wrongsList').scrollBy({top:-200,behavior:'smooth'})">▲ 위</button>
  <button onclick="document.getElementById('wrongsList').scrollBy({top:200,behavior:'smooth'})">▼ 아래</button>
</div>
<button class="fold-btn" onclick="closeSection('wrongs')">∧ 접기</button>
</div>

<h3 onclick="toggle('mastered',this)"><span><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> 학습 완료 <b id="cntMastered" class="cnt"></b></span></h3>
<div id="mastered" class="section-content">
<div class="row" style="margin-top:10px">
<div class="input-clear">
<input type="text" id="masteredSearch" placeholder="🔍 학습 완료 검색" oninput="render()">
<button class="clear-x" onclick="clearInput('masteredSearch',true)" aria-label="지우기">✕</button>
</div>
<button class="danger small" onclick="clearMastered()">↩️ 전체 학습취소</button>
</div>
<div class="row" style="margin-top:8px"><button class="small mean-toggle" style="flex:1" onclick="toggleMeaning()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg> 뜻 가리기</button></div>
<div id="masteredList"></div>
<div class="list-scroll-btns">
  <button onclick="document.getElementById('masteredList').scrollBy({top:-200,behavior:'smooth'})">▲ 위</button>

</div>
<button class="fold-btn" onclick="closeSection('mastered')">∧ 접기</button>
</div>

<h3 onclick="toggle('dupeBox',this)"><span><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg> 중복 단어 <b id="cntDupes" class="cnt"></b></span></h3>
<div id="dupeBox" class="section-content">
<p style="color:var(--muted);font-size:13px;margin:10px 0 6px">여러 시트에 겹쳐서 불러와진 영단어예요. 시트에서 하나만 남기고 지우면 깔끔해요.</p>
<div class="row" style="margin-top:8px">
<div class="input-clear">
<input type="text" id="dupesSearch" placeholder="🔍 중복 단어 검색" oninput="render()">
<button class="clear-x" onclick="clearInput('dupesSearch',true)" aria-label="지우기">✕</button>
</div>
<button class="danger small" onclick="clearDupes()">🗑 비우기</button>
</div>
<div id="dupesList"></div>

lx:'<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>',moon:'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>',edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/>',branch:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',msg:'<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>',sun:'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'};
function icon(n){return '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(_ICONS[n]||'')+'</svg>';}
let words=JSON.parse(localStorage.getItem('words')||'[]');

  recentDeckIds=recentDeckIds.filter(x=>x!==id);
  recentDeckIds.unshift(id);
  if(recentDeckIds.length>3) recentDeckIds=recentDeckIds.slice(0,3);

// ===== 효과음 (Web Audio로 직접 합성, 음원 파일 없음) =====
let soundOn=localStorage.getItem('soundOn')!=='0'; // 기본 켜짐
let audioCtx=null;
function getCtx(){
let AC=window.AudioContext||window.webkitAudioContext;
if(!AC) return null;
if(!audioCtx) audioCtx=new AC();
if(audioCtx.state==='suspended') audioCtx.resume();
return audioCtx;
}
// 단일 톤 (부드러운 엔벨로프로 클릭음 방지)
function tone(freq,start,dur,type,vol){
let ctx=getCtx(); if(!ctx) return;
let t0=ctx.currentTime+start;
let osc=ctx.createOscillator(), g=ctx.createGain();
osc.type=type||'sine';
osc.frequency.value=freq;
g.gain.setValueAtTime(0.0001,t0);
g.gain.exponentialRampToValueAtTime(vol||0.18,t0+0.012);
g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
osc.connect(g); g.connect(ctx.destination);
osc.start(t0); osc.stop(t0+dur+0.03);
}
function playSound(name){
if(!soundOn) return;
if(!getCtx()) return;
switch(name){
case 'tap':      tone(420,0,0.07,'sine',0.10); break;
case 'add':      tone(620,0,0.10,'triangle',0.16); tone(880,0.07,0.13,'triangle',0.15); break;
case 'flip':     tone(320,0,0.08,'sine',0.10); tone(500,0.04,0.10,'sine',0.09); break;
case 'correct':  tone(523.25,0,0.12,'triangle',0.18); tone(659.25,0.09,0.12,'triangle',0.18); tone(783.99,0.18,0.18,'triangle',0.2); break;
case 'wrong':    tone(311.13,0,0.16,'sine',0.16); tone(233.08,0.13,0.22,'sine',0.16); break;
case 'complete': tone(523.25,0,0.13,'triangle',0.18); tone(659.25,0.11,0.13,'triangle',0.18); tone(783.99,0.22,0.13,'triangle',0.18); tone(1046.5,0.33,0.30,'triangle',0.22); break;
case 'delete':   tone(260,0,0.10,'sine',0.13); tone(180,0.07,0.14,'sine',0.13); break;
case 'toggle':   tone(500,0,0.06,'square',0.07); break;
}
}
function updateSoundBtn(){
let b=document.getElementById('soundBtn');
if(b) b.innerHTML=soundOn?icon('vol')+' 소리 켜짐':icon('volx')+' 소리 꺼짐';
}
function toggleSound(){
soundOn=!soundOn;
localStorage.setItem('soundOn',soundOn?'1':'0');
updateSoundBtn();
if(soundOn) playSound('add'); // 켤 때 확인음
}

function applyTheme(isDark){
document.documentElement.style.colorScheme=isDark?'dark':'light';
var m=document.querySelector('meta[name="theme-color"]');
if(m)m.setAttribute('content',isDark?'#101216':'#d9d4ca');
}
function toggleDark(){
document.body.classList.toggle('dark');
localStorage.setItem('darkMode',document.body.classList.contains('dark')?'1':'0');
applyTheme(document.body.classList.contains('dark'));

function parseCsvLine(line){
let out=[],cur='',inQ=false;
for(let i=0;i<line.length;i++){
let c=line[i];
if(inQ){
if(c==='"'){
if(line[i+1]==='"'){cur+='"';i++;}
else inQ=false;
}else cur+=c;
}else{
if(c==='"') inQ=true;
else if(c===',') {out.push(cur);cur='';}
else cur+=c;
}
}
out.push(cur);
return out;
}
// 전체 CSV 파서: 따옴표 안의 줄바꿈(여러 줄 셀)을 한 행으로 올바르게 처리
function parseCsv(text){
let rows=[],row=[],cur='',inQ=false;
text=text.replace(/\r/g,'');
for(let i=0;i<text.length;i++){
let c=text[i];
if(inQ){
if(c==='"'){
if(text[i+1]==='"'){cur+='"';i++;}
else inQ=false;
}else cur+=c;
}else{
if(c==='"') inQ=true;
else if(c===','){row.push(cur);cur='';}
else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
else cur+=c;
}
}
row.push(cur);
if(row.length>1||row[0].trim()!=='') rows.push(row);
return rows;
}
function addFromCsvText(text, srcLabel){
let added=0, updated=0;
let label=srcLabel||'시트';
let seen=new Map();      // 이번 시트에서 본 영단어(소문자) -> 행 번호
let dupMap=new Map();    // 소문자영단어 -> {eng, sheets:Set, rows:Set}
function flag(engL,eng,sheets,rows){
let e=dupMap.get(engL);
if(!e){ e={eng:eng,sheets:new Set(),rows:new Set()}; dupMap.set(engL,e); }
sheets.forEach(s=>{ if(s) e.sheets.add(s); });
(rows||[]).forEach(r=>e.rows.add(r));
}
// 따옴표 안 줄바꿈(여러 줄 셀)을 올바르게 처리하는 전체 파서 사용
let rows=parseCsv(text);
rows.forEach((p,idx)=>{
if(p.length<2) return;
let eng=p[0].trim();
let kor=(p[1]||'').trim();
let example=(p[2]||'').trim();
if(eng==='' || !kor) return;
let engL=eng.toLowerCase(), korL=kor.toLowerCase();
// 헤더 행 걸러내기(제목이 먼저 오면 헤더가 0번째가 아닐 수 있어 모든 행에서 검사)
// 영어열·뜻열 둘 다 머릿말일 때만 헤더로 간주 → "word/단어" 같은 실제 단어는 유지
let engHeaders=['영어','단어','english','word','vocabulary','vocab','no','번호','index','단어장'];
let korHeaders=['뜻','한글','의미','meaning','korean','definition','해석'];
if(engHeaders.includes(engL) && korHeaders.includes(korL)) return;
// 시트명이 그대로 단어로 들어오는 제목 행 걸러내기
if(engL===label.trim().toLowerCase()) return;
let ex=words.find(w=>w.eng.toLowerCase()===engL);
if(ex){
if(seen.has(engL)){
// 같은 시트 안에서 또 등장 → 시트 내부 중복(발견된 행 번호 함께 기록)
flag(engL,ex.eng,[label],[seen.get(engL),idx+1]);
}else if(ex.src && ex.src!==label){
// 다른 시트에 이미 있던 단어 → 시트 간 중복
flag(engL,ex.eng,[ex.src,label]);
// 출처를 현재 시트로 갱신 → 삭제/이름변경된 옛 시트가 계속 중복으로 잡히지 않게
ex.src=label;
}else if(!ex.src){
// 출처를 모르던 기존 단어 → 이번 시트를 출처로 채택(같은 시트 재불러오기 오탐 방지)
ex.src=label;
}
// 시트에서 뜻/예문이 바뀌었으면 반영(학습 진도·오답 기록은 유지)
if(ex.kor!==kor){ ex.kor=kor; updated++; }
if(example && ex.example!==example) ex.example=example;
seen.set(engL,idx+1);
return;
}
words.push({eng,kor,example:example||'',wrong:false,mastered:false,wrongResult:null,src:label});
added++;
seen.set(engL,idx+1);
});
save();
let dups=[...dupMap.values()].map(e=>({eng:e.eng,sheets:[...e.sheets],rows:[...e.rows].sort((a,b)=>a-b)}));
return {added,updated,dups};
}

function parseSheetId(url){let m=url.match(/\/d\/([a-zA-Z0-9-_]+)/);return m?m[1]:null;}
function parseSheetGid(url){let m=url.match(/[#&?]gid=([0-9]+)/);return m?m[1]:null;}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function speakAttr(s){return escapeHtml(String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"));}
// 캐시 무효화 파라미터 추가
function bustUrl(u){return u+(u.includes('?')?'&':'?')+'_cb='+Date.now()+'x'+Math.floor(Math.random()*1e6);}
// 직접 URL + 프록시 URL 목록 생성 (직접/프록시 분리 반환)
function withProxies(urls){
let bust=urls.map(bustUrl);
let proxied=[];
bust.forEach(u=>{
proxied.push('https://corsproxy.io/?url='+encodeURIComponent(u));
proxied.push('https://api.allorigins.win/raw?url='+encodeURIComponent(u));
});
return {direct:bust, proxied};
}
// 단일 URL fetch 시도 (타임아웃 포함)
async function tryFetch(u,validate,timeoutMs){
let ctrl=new AbortController();
let tid=setTimeout(()=>ctrl.abort(),timeoutMs||8000);
try{
let r=await fetch(u,{cache:'no-store',signal:ctrl.signal});
clearTimeout(tid);
if(!r.ok) throw new Error('status '+r.status);
let text=await r.text();
if(validate) validate(text);
return text;
}catch(e){clearTimeout(tid);throw e;}
}
// 직접 먼저 경쟁, 600ms 후 프록시도 병렬 합류 → 가장 빠른 성공 반환
async function fetchFirstOk(urlsOrObj,validate){
let direct,proxied;
if(urlsOrObj && typeof urlsOrObj==='object' && !Array.isArray(urlsOrObj)){
direct=urlsOrObj.direct; proxied=urlsOrObj.proxied;
} else {
// 이전 방식 호환: 배열이면 전부 직접으로 처리
direct=urlsOrObj; proxied=[];
}
return new Promise((resolve,reject)=>{
let done=false;
let errors=[];
let total=direct.length+proxied.length;
function onOk(text){if(!done){done=true;resolve(text);}}
function onErr(e){errors.push(e);if(errors.length>=total&&!done){done=true;reject(errors[errors.length-1]||new Error('all failed'));}}
direct.forEach(u=>tryFetch(u,validate,8000).then(onOk).catch(onErr));
// 직접 실패 가능성이 높을 때를 위해 프록시는 600ms 후 병렬 시작
setTimeout(()=>{
if(!done) proxied.forEach(u=>tryFetch(u,validate,12000).then(onOk).catch(onErr));
},600);
});
}

// HTML에서 시트 탭(gid, 이름) 추출
function parseSheetTabs(html){
let tabs=[],seen={};
try{
let doc=new DOMParser().parseFromString(html,'text/html');
doc.querySelectorAll('[id^="sheet-button-"]').forEach(function(li){
let gid=li.id.replace('sheet-button-','');
if(!/^\d+$/.test(gid)) return;
let name=(li.textContent||'').trim();
if(name&&!seen[gid]){seen[gid]=1;tabs.push({gid:gid,name:name});}
});
}catch(e){}
if(!tabs.length){
let re=/sheet-button-(\d+)[^>]*>\s*(?:<[^>]*>\s*)*([^<]+)/g,m;
while((m=re.exec(html))){
let gid=m[1];
let tmp=document.createElement('textarea');tmp.innerHTML=m[2];
let name=tmp.value.trim();
if(name&&!seen[gid]){seen[gid]=1;tabs.push({gid:gid,name:name});}
}
}
return tabs;
}

function importGoogleSheet(opts){
opts=opts||{};
let url=document.getElementById('sheetUrl').value.trim();
if(!url) return alert('구글 시트 링크를 입력해주세요');
let m=url.match(/\/d\/([a-zA-Z0-9-_]+)/);
if(!m) return alert('올바른 구글 시트 링크가 아닙니다');
let id=m[1];
let gm=url.match(/[#&?]gid=([0-9]+)/);
// gid 우선순위: 선택한 탭 > URL의 gid > 0(첫 시트)
let gid=opts.gid||(gm?gm[1]:null)||'0';
let sheetName=opts.sheet||null;
// 구글 직접 엔드포인트들
let directUrls=[];
// 수동으로 시트 이름만 입력한 경우(gid 없음): 이름 기반 URL만 사용 → 틀린 이름이면 폴백으로 엉뚱한 시트를 불러오지 않도록
let nameOnly=sheetName && !opts.gid;
if(sheetName){
directUrls.push(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&headers=0&sheet=${encodeURIComponent(sheetName)}`);
}
if(!nameOnly){
directUrls.push(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&headers=0&gid=${gid}`);
directUrls.push(`https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`);
directUrls.push(`https://docs.google.com/spreadsheets/d/${id}/pub?gid=${gid}&single=true&output=csv`);
}
let urls=withProxies(directUrls);
let label=sheetName?('"'+sheetName+'" 시트를'):'구글 시트를';
showToast(label+' 불러오는 중... ⏳');
(async()=>{
try{
let text=await fetchFirstOk(urls,function(t){
if(/^\s*</.test(t)||/<!DOCTYPE|<html/i.test(t.slice(0,200))) throw new Error('html returned');
// gviz가 잘못된 시트 이름 등으로 오류를 반환한 경우(JS 콜백/에러 응답)는 CSV가 아니므로 거름
if(/google\.visualization\.Query|\/\*O_o\*\/|"status"\s*:\s*"error"/.test(t.slice(0,400))) throw new Error('gviz error');
if(!t.trim()) throw new Error('empty');
});
let srcLabel=sheetName||('시트(gid '+gid+')');
let res=addFromCsvText(text,srcLabel);
let added=res.added,updated=res.updated,dups=res.dups||[];
if(dups.length) recordDupes(dups);
if(added>0||updated>0||dups.length>0){
if(added>0||updated>0) playSound('add');

const RANGE_STEPS=[20,40,60];
let rangeStepIdx=0;
function cycleRangeStep(){
  rangeStepIdx=(rangeStepIdx+1)%RANGE_STEPS.length;
  let step=RANGE_STEPS[rangeStepIdx];
  document.getElementById('rangeStepLabel').textContent='단위 '+step;
  showToast('단위를 '+step+'개로 변경했어요');
}
function rangeStep(dir){
  if(!words.length) return showToast('단어를 먼저 불러오세요');
  let step=RANGE_STEPS[rangeStepIdx];
  let total=words.length;
  let curFrom=rangeFrom||1;
  let block=rangeFrom!==null ? Math.floor((curFrom-1)/step) : -1;
  block+=dir;
  let maxBlock=Math.ceil(total/step)-1;
  if(block<0) block=maxBlock;
  if(block>maxBlock) block=0;
  let newFrom=block*step+1;
  let newTo=Math.min(newFrom+step-1,total);
  rangeFrom=newFrom; rangeTo=newTo;
  document.getElementById('rangeFrom').value=newFrom;
  document.getElementById('rangeTo').value=newTo;
  updateRangeCnt();
  document.getElementById('rangeStepLabel').textContent=newFrom+'~'+newTo+'번 (단위 '+step+')';
  showToast(newFrom+'~'+newTo+'번 단어');
}
function updateRangeCnt(){
let cnt=document.getElementById('rangeCnt');
if(!cnt) return;
if(rangeFrom||rangeTo){
  let total=words.filter((_,i)=>{
    let num=i+1;
    if(rangeFrom && num<rangeFrom) return false;
    if(rangeTo && num>rangeTo) return false;
    return true;
  }).length;
  cnt.innerText='(총 '+total+'개)';
}else cnt.innerText='';
}

function getDeck(mode){
let arr=words.map((w,i)=>({w,i,num:i+1}));
// 범위 지정 시 오답노트·일반 학습 모두 범위 내에서만 출제
if(rangeFrom) arr=arr.filter(x=>x.num>=rangeFrom);
if(rangeTo) arr=arr.filter(x=>x.num<=rangeTo);
if(mode==='wrong'){
return arr.filter(x=>x.w.wrong && x.w.wrongResult!=='correct');
}
return arr.filter(x=>!x.w.mastered);
}

const _ROOTKEYS=Object.keys(_ROOT).sort((a,b)=>b.length-a.length);
const _PREKEYS=Object.keys(_PRE).sort((a,b)=>b.length-a.length);
const _SUFKEYS=Object.keys(_SUF).sort((a,b)=>b.length-a.length);
function analyzeRoots(word){
  let w=String(word||'').toLowerCase().replace(/[^a-z]/g,'');
  if(w.length<4) return [];
  // core에서 접미어를 떼고, 남은 core의 '앞부분'에서만 어근을 찾는다(indexOf 노이즈 방지)
  function build(core, pre){
    let parts=[]; if(pre) parts.push(pre);
    let suf=null;
    for(let k of _SUFKEYS){ if(core.endsWith(k)&&core.length-k.length>=3){ suf={t:'suf',p:k,g:_SUF[k]}; core=core.slice(0,core.length-k.length); break; } }
    let root=null;
    for(let k of _ROOTKEYS){ if(k.length>=3&&core.startsWith(k)){ root={t:'root',p:k,g:_ROOT[k]}; break; } }
    if(!root) return null;
    parts.push(root); if(suf) parts.push(suf);
    return parts;
  }
  let pre=null, rest=w;
  for(let k of _PREKEYS){ if(w.startsWith(k)&&w.length-k.length>=3){ pre={t:'pre',p:k,g:_PRE[k]}; rest=w.slice(k.length); break; } }
  let r=build(rest,pre); if(r) return r;
  // 접두어를 잘못 뗀 경우(예: biography의 'bi' vs 'bio') 접두어 없이 재시도
  if(pre){ let r2=build(w,null); if(r2) return r2; }
  return [];
}
function rootsHtml(word){
  let parts=analyzeRoots(word);
  if(!parts.length) return '';
  let seg=parts.map(x=>'<b style="color:#ffe9a8">'+escapeHtml(x.p)+'</b><span style="opacity:.75">('+escapeHtml(x.g)+')</span>').join(' + ');
  return '<div style="margin-top:8px;font-size:12.5px;font-style:normal;color:rgba(255,255,255,.85)">🧩 '+seg+'</div>';
}

// ===== 기본형(원형) 단어 찾기 — 어근이 안 잡히는 파생어용 (예: confidential→confide, dangerous→danger) =====
let _baseCache=new Map(); // word -> {eng,kor} | null
const _INFLECT=['s','es','ed','ing','er','est','en','y','ly','ies','ive','ious','eous'];
// 잘라낸 꼬리(rem)가 접미사처럼 보이는지 — 엉뚱한 절단(carpet→carp) 방지
function _isSuffixLike(rem){
  if(!rem) return true;
  if(_INFLECT.includes(rem)) return true;
  for(let k of _SUFKEYS){ if(k.length>=2 && (rem===k || rem.startsWith(k))) return true; }
  return false;
}
// 원단어에 가까운(=가장 긴) 후보부터, 간단한 철자 복원 포함
function _baseCandidates(w){
  let cands=[], seen=new Set();
  for(let len=w.length-1; len>=3; len--){
    let p=w.slice(0,len), rem=w.slice(len);
    if(!_isSuffixLike(rem)) continue;
    let forms=[p, p+'e'];                                   // confid→confide, us→use
    if(p.endsWith('i')) forms.push(p.slice(0,-1)+'y');      // beauti→beauty, happi→happy
    if(/([a-z])\1$/.test(p)) forms.push(p.slice(0,-1));     // runn→run, bigg→big
    for(let c of forms){ if(c.length>=3 && c!==w && !seen.has(c)){ seen.add(c); cands.push({c,len}); } }
  }
  return cands; // 이미 len 내림차순
}
// 내 단어장에 이미 있는 더 짧은 동족어 우선(오프라인·즉시)
function _baseFromDecks(w){
  let best=null;
  try{
    for(let d of decks){ for(let x of d.words){
      let e=(x.eng||'').toLowerCase().replace(/[^a-z]/g,'');
      if(e.length<4 || e.length>=w.length || e===w) continue;
      let rem=null;
      if(w.startsWith(e)) rem=w.slice(e.length);
      else if(e.endsWith('e') && w.startsWith(e.slice(0,-1))) rem=w.slice(e.length-1);        // confide→confidential
      else if(e.endsWith('y') && w.startsWith(e.slice(0,-1)+'i')) rem=w.slice(e.length);      // beauty→beautiful
      if(rem!=null && _isSuffixLike(rem)){ if(!best || e.length>best._len) best={eng:x.eng,kor:x.kor,_len:e.length}; }
    }}
  }catch(err){}
  return best?{eng:best.eng,kor:best.kor}:null;
}
async function _quickKor(word){
  try{
    let r=await fetchT('https://api.mymemory.translated.net/get?q='+encodeURIComponent(word)+'&langpair=en|ko',2500);
    let j=await r.json();
    let k=(j&&j.responseData&&j.responseData.translatedText||'').trim();
    if(/^[a-z\s'.-]+$/i.test(k)) return ''; // 번역 실패로 영어가 그대로 온 경우
    return k;
  }catch(err){ return ''; }
}
async function findBaseWord(word){
  let w=String(word||'').toLowerCase().replace(/[^a-z]/g,'');
  if(w.length<5) return null;
  if(_baseCache.has(w)) return _baseCache.get(w);
  if(_baseCache.size>500) _baseCache.clear(); // 메모리 상한
  let mine=_baseFromDecks(w);
  if(mine){ _baseCache.set(w,mine); return mine; }
  let cands=_baseCandidates(w).slice(0,6);
  if(!cands.length){ _baseCache.set(w,null); return null; }
  let checks=await Promise.all(cands.map(async o=>{
    try{ let r=await fetchT('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(o.c),2500); return r.ok?o:null; }
    catch(err){ return null; }
  }));
  let valid=checks.filter(Boolean).sort((a,b)=>b.len-a.len);
  if(!valid.length){ _baseCache.set(w,null); return null; }
  let base=valid[0].c;
  let kor=await _quickKor(base);
  let res={eng:base,kor:kor};
  _baseCache.set(w,res); return res;
}
// 어근이 있으면 어근 표시, 없으면 기본형을 비동기로 채울 자리 반환
function morphHtml(word){
  let r=rootsHtml(word);
  if(r) return r;
  let dw=String(word||'').toLowerCase().replace(/[^a-z]/g,'');
  return '<div id="baseWordLine" data-w="'+escapeHtml(dw)+'" style="display:none;margin-top:8px;font-size:12.5px;font-style:normal;color:rgba(255,255,255,.78)"></div>';
}
function baseWordFill(word){
  let line=document.getElementById('baseWordLine');
  if(!line) return; // 어근이 이미 있어서 자리 없음
  let dw=String(word||'').toLowerCase().replace(/[^a-z]/g,'');
  findBaseWord(word).then(b=>{
    let el2=document.getElementById('baseWordLine');
    if(!el2 || el2.dataset.w!==dw) return; // 카드가 바뀌었으면 무시
    if(!b){ el2.style.display='none'; return; }
    let kor=b.kor?(' <span style="opacity:.8">('+escapeHtml(b.kor)+')</span>')

// ===== 예문 찾기 (Free Dictionary + Tatoeba) =====
let _exCache=new Map(); // word -> [{en,ko}]
// 시간제한 fetch (기본 3초) — 느린 소스는 포기하고 빠른 결과 우선
function fetchT(url,ms){
  let c=new AbortController(); let t=setTimeout(()=>c.abort(),ms||3000);
  return fetch(url,{signal:c.signal}).finally(()=>clearTimeout(t));
}
// CORS 프록시 경유 JSON 가져오기 (네이버 사전 등 직접 호출이 막힌 곳용)
async function fetchViaProxy(url){
  let ps=['https://corsproxy.io/?url='+encodeURIComponent(url),'https://api.allorigins.win/raw?url='+encodeURIComponent(url)];
  for(let u of ps){
    try{ let r=await fetchT(u,3000); if(r.ok){ let t=await r.text(); return JSON.parse(t); } }catch(e){}
  }
  return null;
}
function _stripTags(x){ return String(x||'').replace(/<[^>]*>/g,'').trim(); }
// 네이버 사전 예문 (영어 예문 + 한글 번역)
async function naverExamples(word){
  let out=[];
  try{
    let j=await fetchViaProxy('https://en.dict.naver.com/api3/enko/search?query='+encodeURIComponent(word)+'&range=example&page=1');
    let items=j&&j.searchResultMap&&j.searchResultMap.searchResultListMap&&j.searchResultMap.searchResultListMap.EXAMPLE&&j.searchResultMap.searchResultListMap.EXAMPLE.items||[];
    items.slice(0,6).forEach(it=>{
      let en=_stripTags(it.expExample1), ko=_stripTags(it.expExample2);
      if(en&&en.length<160) out.push({en:en,ko:ko});
    });
  }catch(e){}
  return out;
}
// 간단 어간 추출 (plagues→plague, running→run 등 시도용)
function _stems(word){
  let c=[];
  if(/ies$/.test(word)) c.push(word.replace(/ies$/,'y'));
  if(/es$/.test(word)) c.push(word.slice(0,-2));
  if(/s$/.test(word)&&!/ss$/.test(word)) c.push(word.slice(0,-1));
  if(/ing$/.test(word)&&word.length>5){ c.push(word.slice(0,-3)); c.push(word.slice(0,-3)+'e'); }
  if(/ed$/.test(word)&&word.length>4){ c.push(word.slice(0,-2)); c.push(word.slice(0,-1)); }
  return [...new Set(c)].filter(x=>x.length>2&&x!==word);
}
function _tatParse(j,out){
  if(!j||!Array.isArray(j.results)) return;
  j.results.slice(0,10).forEach(r=>{
    let ko='';
    (r.translations||[]).forEach(g=>(g||[]).forEach(t=>{ if(t.lang==='kor'&&!ko) ko=t.text; }));
    if(r.text && r.text.length<140 && !out.some(x=>x.en===r.text)) out.push({en:r.text,ko:ko});
  });
}
async function getExamples(word){
  if(_exCache.has(word)) return _exCache.get(word);
  if(_exCache.size>500) _exCache.clear(); // 장시간 세션 메모리 상한

  return new Promise(resolve=>{
    let out=[],done=false,pending=3,safety=null;
    function finish(){ if(done) return; done=true; if(safety) clearTimeout(safety); out=out.slice(0,2); if(out.length) _exCache.set(word,out); resolve(out); }
    function got(list){
      (list||[]).forEach(x=>{ if(x.en&&!out.some(y=>y.en===x.en)) out.push(x); });
      out.sort((a,b)=>(b.ko?1:0)-(a.ko?1:0));
      pending--;
      if(out.length>=2 || pending<=0) finish(); // 2개 모이면 즉시, 아니면 전부 끝나는 대로
    }
    // 한글 번역 예문 소스(네이버) 우선, 나머지는 보조 — 전부 동시에
    naverExamples(word).then(got).catch(()=>got([]));
    fetchT('https://tatoeba.org/eng/api_v0/search?from=eng&to=kor&query='+encodeURIComponent(word),3000)
      .then(r=>r.ok?r.json():null).then(j=>{ let a=[]; _tatParse(j,a); got(a); }).catch(()=>got([]));
    fetchT('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word),3000)
      .then(r=>r.ok?r.json():null).then(j=>{
        let a=[]; if(Array.isArray(j)) (j[0].meanings||[]).forEach(m=>(m.definitions||[]).forEach(d=>{ if(d.example&&d.example.length<140) a.push({en:d.example,ko:''}); }));
        got(a);
      }).catch(()=>got([]));
    safety=setTimeout(finish,3500); // 안전 타임아웃
  });
}

function loadQuizQuestion(){
clearTimeout(quizTimer);
quizAnswered=false;
document.getElementById('quizAfter').style.display='none';
let deck=getDeck(lastMode);
if(!deck.length){ quizDeckComplete(); return; }
// 선택한 모드에 맞는 출제 방향
function dirsFor(){
if(quizDir==='e2k') return ['e2k'];
if(quizDir==='k2e') return ['k2e'];
return Math.random()<0.5?['e2k','k2e']:['k2e','e2k']; // 랜덤: 우선/보정 방향
}
// 보기를 만들 수 있는 단어를 찾을 때까지 여러 단어를 시도
let order=shuffle(deck.slice());
let chosen=null;
for(let p=0;p<order.length && !chosen;p++){
let i=order[p].i, dirs=dirsFor();
for(let d=0;d<dirs.length;d++){
let built=buildOptions(i,dirs[d]);
if(built){ chosen={i:i,dir:dirs[d],correct:built.correct,opts:built.opts}; break; }
}
}
if(!chosen){
// 현재 방향으로 보기를 만들 단어가 부족 → 일반 카드로 대체
let pick=deck[Math.floor(Math.random()*deck.length)];
quizState=null;
document.getElementById('quizPanel').style.display='none';
document.getElementById('cardHint').style.display='';
showWord(words[pick.i],pick.i);
let why=quizDir==='e2k'?'영어 문제로 낼 보기가 부족해요 (뜻이 겹치지 않는 단어가 더 필요해요)'
:quizDir==='k2e'?'한글 문제로 낼 보기가 부족해요 (뜻이 겹치지 않는 단어가 더 필요해요)'
:'객관식 보기를 만들 단어가 부족해요 (뜻이 겹치지 않는 단어가 더 필요해요)';
showToast(why);
return;
}
currentIndex=chosen.i; // 발음 듣기에서 사용
quizState=chosen;
renderQuiz();
}

// 방향에 맞는 정답 1개 + 오답 3개(다른 단어들에서) 만들기. 실패 시 null
// 보기끼리 겹치거나, 문제의 정답이 여러 개가 되는 상황(뜻이 같은 동의어 등)을 방지
function buildOptions(i,dir){
let w=words[i];
let qField=dir==='e2k'?'eng':'kor'; // 문제(지문)로 보여줄 쪽
let aField=dir==='e2k'?'kor':'eng'; // 보기로 고를 쪽
let promptVal=(w[qField]||'').trim();
let correct=(w[aField]||'').trim();
if(!promptVal||!correct) return null;
let cP=promptVal.toLowerCase(), cA=correct.toLowerCase();
let seen=new Set([cA]); // 이미 쓰인 보기 텍스트(정답 포함) → 보기끼리 중복 방지
let pool=[];
words.forEach((ww,idx)=>{
if(idx===i) return;
let p=(ww[qField]||'').trim().toLowerCase();
let a=(ww[aField]||'').trim();
if(!a) return;
let al=a.toLowerCase();
if(al===cA) return;       // 정답과 같은 보기 제외 (예: 뜻이 같은 '큰')
if(p===cP) return;        // 문제 글자가 같은 단어 제외 (정답이 여러 개가 되는 동의어 방지)
if(seen.has(al)) return;  // 보기끼리 중복 텍스트 제외
seen.add(al);
pool.push(a);
});
shuffle(pool);
let distract=pool.slice(0,3);
if(distract.length<3) return null;
return {correct:correct,opts:shuffle([correct].concat(distract))};
}

// ===== '오답노트' 단어장 자동 수집 =====
// 어느 단어장에서든 오답 등록 시 '오답노트' 이름의 단어장에 복사(없으면 생성).
// 복사본은 독립적 — 오답노트 단어장 안에서만 삭제·관리하며 원본과 동기화하지 않음.
function getWrongDeck(){
  let d=decks.find(x=>(x.name||'').trim()==='오답노트');
  if(!d){ d={id:'deck_wrong_'+Date.now(),name:'오답노트',words:[],stats:{},dupes:[]}; decks.push(d); }
  return d;
}
function addToWrongDeck(w){
  try{
    if(!w||!w.eng) return;
    let d=getWrongDeck();
    if(d.id===activeDeckId) return; // 오답노트 단어장 안에서의 오답 표시는 복사 불필요
    let eng=w.eng.toLowerCase();
    if(d.words.some(x=>(x.eng||'').toLowerCase()===eng)) return; // 이미 있으면 중복 방지
    d.words.push({eng:w.eng,kor:w.kor,example:w.example||'',wrong:false,mastered:false,lastResult:null,wrongResult:null});
    saveDecks();
    renderRecentDecks();
    renderDeckPanel();
  }catch(e){}
}

words[i].lastResult='correct';
words[i].mastered=true;

}
function markWrong(i){
words[i].wrong=true;
words[i].wrongResult=null;
words[i].lastResult='wrong';
addToWrongDeck(words[i]);
save();
}

function bulkDelete(items){

function del(i){

function restoreBackup(){
let raw=document.getElementById('backupBox').value.trim();
if(!raw) return alert('복원할 백업 데이터를 붙여넣어 주세요');
let data;
try{data=JSON.parse(raw);}catch(e){return alert('백업 데이터 형식이 올바르지 않습니다');}
let mapWord=w=>({eng:w.eng||'',kor:w.kor||'',example:w.example||'',wrong:!!w.wrong,mastered:!!w.mastered,lastResult:w.lastResult,wrongResult:w.wrongResult||null,src:w.src});
// 신형(v2): 모든 단어장 복원
if(data&&Array.isArray(data.decks)&&data.decks.length){
  if(!confirm('모든 단어장을 백업 데이터로 덮어쓸까요? (지금 단어장들은 사라집니다)')) return;
  decks=data.decks.map(d=>({
    // 외부 백업 id는 안전한 문자만 허용(따옴표/역슬래시 등 주입 차단)
    id:(typeof d.id==='string'?d.id.replace(/[^a-zA-Z0-9_-]/g,''):'')||('deck_'+Math.random().toString(36).slice(2)),
    name:d.name||'단어장',
    words:Array.isArray(d.words)?d.words.map(mapWord):[],
    stats:(d.stats&&typeof d.stats==='object')?d.stats:{},
    dupes:Array.isArray(d.dupes)?d.dupes:[]
  }));
  activeDeckId=(data.activeDeckId&&decks.find(d=>d.id===data.activeDeckId))?data.activeDeckId:decks[0].id;
  let d=decks.find(x=>x.id===activeDeckId);
  words=d.words; stats=d.stats; dupes=d.dupes;
  editIndex=-1;currentIndex=-1;cardHistory=[];recentSeen=[];lsPeeked.clear();
  recentDeckIds=[]; pushRecentDeck(activeDeckId);
  saveDecks(); render(); renderDeckPanel(); renderRecentDecks();
  showToast(decks.length+'개 단어장을 복원했어요! ♻️');
  return;
}
// 구형: 활성 단어장만 복원
if(!data||!Array.isArray(data.words)) return alert('백업 데이터에 단어가 없습니다');
if(!confirm('현재 단어를 백업 데이터로 덮어쓸까요? (지금 단어는 사라집니다)')) return;
words=data.words.map(mapWord);
if(data.stats&&typeof data.stats==='object'){stats=data.stats;}
dupes=[]; // 복원된 단어와 어긋난 옛 중복 기록 제거
editIndex=-1;currentIndex=-1;cardHistory=[];recentSeen=[];lsPeeked.clear();
save();
showToast('백업을 복원했어요! ♻️');
}

// ===== 외부 사전 조회 (MyMemory 번역 + Free Dictionary) =====
let _dictLast=null; // {eng,kor}
let _dictSeq=0;      // 동시 조회 경합 방지 토큰
async function dictLookup(){
let q=(document.getElementById('gSearch')?.value||'').trim();
if(!q) return;
let box=document.getElementById('gSearchResults');
let area=document.getElementById('dictResult');
if(!area){ area=document.createElement('div'); area.id='dictResult'; box.appendChild(area); }
area.innerHTML='<div class="gs-none">사전에서 찾는 중... ⏳</div>';
let word=q.toLowerCase();
let myseq=++_dictSeq;
try{
let [tr,dic]=await Promise.allSettled([
fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(word)+'&langpair=en|ko').then(r=>r.json()),
fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word)).then(r=>r.ok?r.json():null)
]);
if(myseq!==_dictSeq) return; // 더 최근 조회가 시작됐으면 이 결과는 버림
let kor=(tr.status==='fulfilled'&&tr.value&&tr.value.responseData&&tr.value.responseData.translatedText)?tr.value.responseData.translatedText.trim():'';
if(/^[a-z\s'-]+$/i.test(kor)) kor=''; // 번역 실패로 영어가 그대로 돌아온 경우
let d=(dic.status==='fulfilled'&&Array.isArray(dic.value))?dic.value[0]:null;
let phon=d&&(d.phonetic||((d.phonetics||[]).find(x=>x.text)||{}).text)||'';
let audio=d&&(((d.phonetics||[]).find(x=>x.audio)||{}).audio)||'';
let mean=d&&d.meanings&&d.meanings[0];
let defObj=mean&&mean.definitions&&mean.definitions[0];
let def=defObj?defObj.definition:'';
let exam=defObj&&defObj.example?defObj.example:'';
let pos=mean?mean.partOfSpeech:'';
if(!kor&&!def){ area.innerHTML='<div class="gs-none">사전에서 찾지 못했어요 😥 철자를 확인해 주세요</div>'; return; }
_dictLast={eng:word,kor:kor||def};
let h='<div class="dict-card">';
h+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
h+='<b style="font-size:17px">'+escapeHtml(word)+'</b>';
if(phon) h+='<span style="color:var(--muted);font-size:13px">'+escapeHtml(phon)+'</span>';
h+='<button class="small" style="box-shadow:none;padding:4px 10px" onclick="'+(audio?('new Audio(\''+speakAttr(audio)+'\').play()'):('speakText(\''+speakAttr(word)+'\')'))+'">🔊 발음</button>';
h+='</div>';

function dictAddWord(){

// 통일된 단어 행 카드 (전체단어/오답노트/학습완료 공용)
